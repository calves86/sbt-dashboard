function tc(t){let h=0;for(let i=0;i<t.length;i++)h=t.charCodeAt(i)+((h<<5)-h);return COLORS[Math.abs(h)%COLORS.length]}

// APP STATE & RENDERING
// ══════════════════════════════════════════════════
let state={tab:'Overview',subTab:'standings',selWeek:1,recIdx:0,draftYear:2025,draftRound:1,selSeason:2025,sortCol:'winpct',sortDir:'asc'};

function toggleSort(col){if(state.sortCol===col){state.sortDir=state.sortDir==='desc'?'asc':'desc';}else{state.sortCol=col;state.sortDir='desc';}render();}
function sortArrow(col){if(state.sortCol!==col)return' ↕';return state.sortDir==='desc'?' ▼':' ▲';}
function sortStandings(rows){
  const dir=state.sortDir==='desc'?-1:1;
  return[...rows].sort((a,b)=>{
    const ag=a.wins+a.losses+(a.ties||0),bg=b.wins+b.losses+(b.ties||0);
    switch(state.sortCol){
      case'record':const aw=ag>0?a.wins/ag:0,bw=bg>0?b.wins/bg:0;return aw!==bw?(bw-aw)*dir:(b.wins-a.wins)*dir;
      case'winpct':const ap=ag>0?a.wins/ag:0,bp=bg>0?b.wins/bg:0;return(bp-ap)*dir;
      case'pf':return((b.points_for||0)-(a.points_for||0))*dir;
      case'pa':return((b.points_against||0)-(a.points_against||0))*dir;
      default:return 0;
    }
  });
}

function initApp(){
  renderTabs();
  render();
}

function renderTabs(){
  const tabs=['Overview','Teams','Champions','Seasons','Record Book','Draft History','Head-to-Head','Fun Facts','Rules'];
  document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="tab ${state.tab===t?'active':''}" onclick="state.tab='${t}';render()">${t}</button>`).join('');
}

function secTitle(title,accent){return `<div class="section-title"><h2>${title}</h2>${accent?`<span class="badge">${accent}</span>`:''}<div class="line"></div></div>`;}

function matchupCard(a,as,h,hs){
  const aw=as>hs;
  return `<div class="matchup-card"><div class="matchup-team ${aw?'winner':'loser'}"><span style="color:${aw?'#e2e8f0':'#64748b'};font-weight:${aw?700:400}">${a}</span><span style="color:${aw?'#10b981':'#64748b'};font-weight:700">${as}</span></div><div class="matchup-div"></div><div class="matchup-team ${!aw?'winner':'loser'}"><span style="color:${!aw?'#e2e8f0':'#64748b'};font-weight:${!aw?700:400}">${h}</span><span style="color:${!aw?'#10b981':'#64748b'};font-weight:700">${hs}</span></div></div>`;
}

function render(){
  renderTabs();
  const el=document.getElementById('content');
  if(state.tab==='Overview')el.innerHTML=renderOverview();
  else if(state.tab==='Champions')el.innerHTML=renderChampions();
  else if(state.tab==='Seasons')el.innerHTML=renderSeasons();
  else if(state.tab==='Record Book')el.innerHTML=renderRecords();
  else if(state.tab==='Draft History')el.innerHTML=renderDraft();
  else if(state.tab==='Head-to-Head')el.innerHTML=renderH2H();
  else if(state.tab==='Fun Facts')el.innerHTML=renderFunFacts();
  else if(state.tab==='Teams')el.innerHTML=renderTeams();
  else if(state.tab==='Rules')el.innerHTML=renderRules();
}


function renderRules(){

  html+=`<div class="sub-tabs">

        <span style="font-size:13px;font-weight:600;color:#e2e8f0;text-align:right">${r.setting}</span>
      </div>`;
    });
    h+='</div>';
    return h;
  }

  function sectionTitle(t){
    return `<div style="font-size:16px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;color:${AC};margin:24px 0 12px">${t}</div>`;
  }

  if(rt==='rules'){
    // League Identity
    html+=sectionTitle('LEAGUE IDENTITY');

    // Roster

    statusRows.forEach((r,i)=>{
      html+=`<div style="display:flex;justify-content:space-between;padding:10px 16px;${i%2===0?'background:rgba(255,255,255,0.015)':''}"><span style="font-size:13px;color:#e2e8f0;font-weight:600">${r.description}</span><span style="font-size:13px;color:#94a3b8">${r.setting}</span></div>`;
    });

    const posColors={QB:'#f472b6',RB:'#22d3ee',WR:'#34d399',TE:'#fb923c',K:'#facc15',DST:'#a78bfa'};
    const posRows=(R['Roster Limits']||[]).filter(r=>['QB','RB','WR','TE','RB-WR-TE','K','DST'].includes(r.description));
    html+=`<div class="data-table" style="margin-bottom:24px">
      <div style="display:flex;justify-content:space-between;padding:8px 16px;font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,0.06)"><span>Position</span><span>Starters</span></div>`;
    posRows.forEach((r,i)=>{
      const col=posColors[r.description]||'#94a3b8';
      html+=`<div style="display:flex;justify-content:space-between;padding:10px 16px;${i%2===0?'background:rgba(255,255,255,0.015)':''}"><span style="font-size:13px;color:${col};font-weight:700">${r.description==='RB-WR-TE'?'RB/WR/TE (Flex)':r.description}</span><span style="font-size:13px;color:#94a3b8">${r.setting}</span></div>`;
    });
    html+=`</div>`;

    // Draft
    html+=sectionTitle('DRAFT SETTINGS');
    html+=ruleTable(R['Draft Settings']||[],['Draft Robot']);

    // Transactions
    html+=sectionTitle('TRANSACTION SETTINGS');
    const txSkip=['Lineup Policy','Add/Drop Policy','Waivers Run'];
    const txRows=(R['Transaction Settings']||[]).map(r=>{
      if(r.description==='Lineup Deadline')return{description:'Lineup Deadline',setting:'5 min before gametime for each player'};
      if(r.description==='Add/Drop Deadline')return{description:'Add/Drop Deadline',setting:'Locks 5 min before first Sunday game'};
      if(r.description==='FAB Budget')return{description:'FAB Budget',setting:r.setting};
      return r;
    }).filter(r=>!txSkip.includes(r.description)&&r.setting);
    html+=ruleTable(txRows);

    // Player Policies
    html+=sectionTitle('PLAYER POLICIES & KEEPERS');
    html+=ruleTable(R['Player Policies and Keepers']||[]);

    // Schedule & Playoffs
    html+=sectionTitle('SCHEDULE & PLAYOFFS');
    html+=ruleTable(R['Schedule & Playoffs']||[]);

    // Scoring Policies
    html+=sectionTitle('SCORING POLICIES');
    html+=ruleTable(R['Scoring Policies']||[]);

  } else if(rt==='scoring'){

      const rows=scoring.filter(r=>r.group===sec&&r.code&&r.name);
      html+=`<div class="data-table" style="margin-bottom:24px">
        <div style="display:grid;grid-template-columns:70px 1fr auto;padding:8px 16px;font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,0.06)">

        </div>`;
      rows.forEach((r,i)=>{

          <div style="font-size:13px;color:#e2e8f0">${r.name}</div>

        </div>`;

      html+=`</div>`;
    });
    html+=sectionTitle('BONUS SCORING');
    html+=`<div class="data-table" style="margin-bottom:24px">
      <div style="padding:14px 16px;font-size:13px;color:#e2e8f0;line-height:1.6">
        <span style="color:${AC};font-weight:700">+3 point bonus</span> when your QB throws a TD to one of your own WR/TE/RB who plays for the same NFL team as the QB.
      </div>
    </div>`;

    } else if(rt==='constitution'){
    function block(title,items,color){
      color=color||AC;
      let h=`<div style="margin-bottom:28px"><div style="font-size:16px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;color:${color};margin-bottom:12px">${title}</div>`;
      h+=`<div class="data-table">`;
      items.forEach((item,i)=>{
        h+=`<div style="padding:12px 16px;font-size:13px;color:#e2e8f0;line-height:1.6;${i%2===0?'background:rgba(255,255,255,0.015)':''}${i<items.length-1?';border-bottom:1px solid rgba(255,255,255,0.04)':''}">${item}</div>`;

      h+=`</div></div>`;

    }

    html+=block('DRAFT',[
      'Draft order determined by Playoff and Loser Bowl results.',

    html+=block('ENTRY FEE & WINNINGS',[
      '<strong style="color:'+AC+'">Entry Fee:</strong> $500 per team',
      '🏆 <strong>1st Place:</strong> 70%',
      '🥈 <strong>2nd Place:</strong> 20%',
      '🥉 <strong>3rd Place:</strong> 10%',
      '🏅 <strong>Division Winners:</strong> $100 each',
      '📊 <strong>Most Points/Year:</strong> $100',
      '📋 <strong>Best Record:</strong> $100',
      '🚫 <strong>Injured Reserve:</strong> Gone — because you scallywags are always scheming some shit up.',
    ]);

    html+=block('PLAYOFFS',[
      '<strong style="color:'+AC+'">8-Team Playoff</strong> starting Week 15 (3 weeks).',
      'Top 3 teams in each Division are seeded 1–3 based on record (tiebreakers: Head-to-Head → Division Record → Total Points). Remaining seeds 7–8 go to best record regardless of division.',

    html+=block('NEW FOR 2026',[
      'The team with the <strong style="color:#f87171">Least Total Points</strong> (including playoffs) is responsible for paying for and handling all logistics to get the trophy engraved and shipped to the new Champion.',
    ],'#f87171');
  }

  return html;
}

  };

  const owners={};
  DATA.standings.forEach(r=>{

    const o=owners[owner];
    o.w+=r.wins;o.l+=r.losses;o.t+=r.ties||0;o.pf+=r.points_for;o.pa+=r.points_against;o.seasons++;
    o.years.push(r.season);
    o.franchises.add(r.team_name);

      mgr:`${minY}-${maxY} (${d.seasons}yr)`,franchise:[...d.franchises].join(', '),seasons:d.seasons};

  let html=secTitle('League Stats','Database');

  </div>`;

  html+=secTitle('Multiple Championship Owners','Dynasty');

  html+=secTitle('Never Won a Championship','Ringless');

  if(allTime.length){
    // Group by owner — same owner = same franchise; use most recent team name as the franchise label
    const franchiseData={};
    DATA.standings.forEach(r=>{
      const key=normOwner(r.owner);
      if(!franchiseData[key])franchiseData[key]={w:0,l:0,t:0,pf:0,pa:0,seasons:0,latestSeason:0,latestName:r.team_name,mgr:r.owner};
      const f=franchiseData[key];
      f.w+=r.wins;f.l+=r.losses;f.t+=r.ties||0;f.pf+=r.points_for;f.pa+=r.points_against;f.seasons++;
      if(r.season>f.latestSeason){f.latestSeason=r.season;f.latestName=r.team_name;}
    });
    const franchiseList=Object.values(franchiseData).map(d=>({
      team_name:d.latestName,wins:d.w,losses:d.l,ties:d.t,points_for:d.pf,points_against:d.pa,mgr:d.mgr,seasons:d.seasons
    }));

    const mode=state.standingsMode||'franchise';

    html+=`<div class="data-table"><div class="standings-grid header-row"><div>#</div><div>${colLabel}</div><div style="text-align:center;cursor:pointer" onclick="toggleSort('record')">Record${sortArrow('record')}</div><div style="text-align:center;cursor:pointer" onclick="toggleSort('winpct')">Win%${sortArrow('winpct')}</div><div style="text-align:right;cursor:pointer" class="hide-mobile" onclick="toggleSort('pf')">PF${sortArrow('pf')}</div><div style="text-align:right;cursor:pointer" class="hide-mobile" onclick="toggleSort('pa')">PA${sortArrow('pa')}</div><div style="text-align:right;padding-right:8px" class="hide-mobile">${lastCol}</div></div>`;
    sortedList.forEach((r,i)=>{

    });
    html+=`</div>`;
  }
  return html;
}

    html+=`</div>`;
  }

    const divView=state.standingsView||'overall';

        html+=`<div class="scroll-wrap"><div class="scroll-inner"><div class="data-table"><div style="display:grid;grid-template-columns:26px 160px 170px 65px 55px 70px 70px;align-items:center;padding:8px 12px" class="header-row"><div>#</div><div>Team</div><div>Owner</div><div style="text-align:center;cursor:pointer" onclick="toggleSort('record')">Record${sortArrow('record')}</div><div style="text-align:center;cursor:pointer" onclick="toggleSort('winpct')">Win%${sortArrow('winpct')}</div><div style="text-align:right;cursor:pointer" onclick="toggleSort('pf')">PF${sortArrow('pf')}</div><div style="text-align:right;cursor:pointer" class="hide-mobile" onclick="toggleSort('pa')">PA${sortArrow('pa')}</div></div>`;
        stYr.forEach((r,i)=>{const gm=r.wins+r.losses+(r.ties||0);const p=gm>0?(r.wins/gm).toFixed(3):'—';html+=`<div style="display:grid;grid-template-columns:26px 160px 170px 65px 55px 70px 70px;align-items:center;padding:8px 12px;${i%2===0?'background:rgba(255,255,255,0.02)':''}"><div style="font-size:13px;color:#64748b;font-weight:700;text-align:center">${i+1}</div><div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.team_name}</div><div style="font-size:12px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.owner||''}</div><div style="font-size:12px;color:#94a3b8;text-align:center">${r.wins}-${r.losses}${r.ties>0?'-'+r.ties:''}</div><div style="font-size:12px;color:#94a3b8;text-align:center">${p}</div><div style="font-size:12px;color:#10b981;text-align:right;font-weight:600">${r.points_for>0?r.points_for.toFixed(1):'—'}</div><div style="font-size:12px;color:#64748b;text-align:right" class="hide-mobile">${r.points_against>0?r.points_against.toFixed(1):'—'}</div></div>`;});
        html+=`</div></div></div>`;
      } else {
        const divMeta=(DATA.divisions||[]).filter(d=>d.season===yr);
        const divDef=[{name:'Sigma',color:'#60a5fa'},{name:'Beta',color:'#34d399'},{name:'Tau',color:'#f97316'}];
        html+=`<div style="display:flex;flex-direction:column;gap:24px">`;
        divDef.forEach(({name:dn,color:dc})=>{

          });
          html+=`</div></div>`;
        });
        html+=`</div>`;
      }
    } else {
      html+=`<div style="padding:40px;text-align:center;color:#64748b">No standings data for ${yr}</div>`;
    }
  }

    if(state.subTab==='weekly'){
    const mYr=DATA.matchups.filter(r=>r.season===yr&&r.matchup_type==='regular');

      html+=`<div style="padding:40px;text-align:center;color:#64748b">No playoff data for ${yr}</div>`;
    }
  }
  return html;
}

function renderRecords(){
  let html=secTitle('Record Book','All-Time');
  html+=`<div style="margin-bottom:24px"><select class="dropdown" onchange="state.recIdx=Number(this.value);render()">${REC_CATS.map((c,i)=>`<option value="${i}" ${state.recIdx===i?'selected':''}>${c}</option>`).join('')}</select></div>`;
  html+=`<div style="font-size:22px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;margin-bottom:16px">${REC_CATS[state.recIdx]}</div>`;
  const data=REC[REC_CATS[state.recIdx]]||[];
  html+=`<div class="data-table">${data.map((r,i)=>{const mc=i<3?['medal-1','medal-2','medal-3'][i]:'medal-other';return`<div class="record-row"><div class="medal ${mc}">${i+1}</div><div style="flex:2;font-size:13px;font-weight:600;line-height:1.4">${r.t}</div><div style="flex:0.7;font-size:14px;font-weight:800;color:${i<3?'#10b981':'#94a3b8'};text-align:right;font-family:'Bebas Neue',sans-serif;letter-spacing:1px">${typeof r.v==='number'?r.v.toFixed(1):r.v}</div><div style="flex:1;font-size:12px;color:#475569;text-align:right">${r.d}</div></div>`;}).join('')}</div>`;
  return html;
}

function renderDraft(){
  const picks=DATA.draft_picks;
  const years=[...new Set(picks.map(p=>p.season))].sort((a,b)=>b-a);
  if(!years.length)return secTitle('Draft History','No Data')+'<div style="padding:40px;text-align:center;color:#64748b">Draft data available for 2019-2025 only. CBS does not store pick-by-pick data for older seasons.</div>';
  if(!years.includes(state.draftYear))state.draftYear=years[0];
  const yrPicks=picks.filter(p=>p.season===state.draftYear);
  const rounds=[...new Set(yrPicks.map(p=>p.round))].sort((a,b)=>a-b);
  if(!rounds.includes(state.draftRound))state.draftRound=rounds[0]||1;
  const rdPicks=yrPicks.filter(p=>p.round===state.draftRound);

  let html=secTitle('Draft History',`${picks.length} Total Picks`);
  html+=`<div style="padding:10px 16px;margin-bottom:16px;border-radius:10px;background:rgba(251,146,60,0.06);border:1px solid rgba(251,146,60,0.15);font-size:12px;color:#94a3b8">Draft data available for <strong style="color:#fb923c">2019, 2020, 2023, 2024, 2025</strong> only. CBS Sports does not store pick-by-pick HTML for older seasons (2012-2018, 2021-2022).</div>`;

  html+=`<div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center">`;
  html+=`<div style="font-size:13px;color:#64748b;font-weight:700">YEAR:</div>`;
  html+=`<select class="dropdown" style="width:auto;min-width:120px" onchange="state.draftYear=Number(this.value);state.draftRound=1;render()">${years.map(y=>`<option value="${y}" ${state.draftYear===y?'selected':''}>${y}</option>`).join('')}</select>`;
  html+=`<div style="font-size:13px;color:#64748b;font-weight:700;margin-left:12px">ROUND:</div>`;
  html+=`<div class="week-btns">${rounds.map(r=>`<button class="week-btn ${state.draftRound===r?'active':''}" onclick="state.draftRound=${r};render()">${r}</button>`).join('')}</div>`;
  html+=`</div>`;

  html+=`<div style="font-size:18px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;margin-bottom:16px">${state.draftYear} DRAFT — ROUND ${state.draftRound}</div>`;

  html+=`<div class="data-table"><div class="header-row" style="display:grid;grid-template-columns:50px 50px 1fr 60px 1fr"><div>Pick</div><div>Rd</div><div>Player</div><div>Pos</div><div>Team</div></div>`;
  rdPicks.forEach((p,i)=>{
    const posClass=`pos-${p.position||''}`;
    html+=`<div class="draft-row"><div style="font-size:15px;color:#64748b;font-weight:700;font-family:'Bebas Neue',sans-serif">${p.pick}</div><div style="font-size:13px;color:#475569">${p.round}</div><div style="font-size:14px;font-weight:700">${p.player_name}</div><div><span class="pos-badge ${posClass}">${p.position||'—'}</span></div><div style="font-size:13px;color:#64748b">${p.team_name}</div></div>`;
  });
  html+=`</div>`;

  if(yrPicks.length){
    const posCounts={};
    yrPicks.forEach(p=>{const pos=p.position||'?';posCounts[pos]=(posCounts[pos]||0)+1;});
    html+=`<div style="margin-top:20px;padding:16px;border-radius:10px;background:rgba(16,185,129,0.05);border:1px solid rgba(16,185,129,0.15);font-size:13px;color:#94a3b8">`;
    html+=`<strong style="color:#10b981">${state.draftYear} Draft Summary:</strong> ${yrPicks.length} picks across ${rounds.length} rounds. `;
    html+=`Position breakdown: ${Object.entries(posCounts).sort((a,b)=>b[1]-a[1]).map(([p,c])=>`${p}: ${c}`).join(', ')}`;
    html+=`</div>`;
  }

  return html;
}

function renderH2H(){
  const h2h=DATA.head_to_head;
  if(!h2h.length)return'<div style="padding:40px;text-align:center;color:#64748b">No head-to-head data available</div>';
  const franchises=[...new Set(h2h.map(r=>r.franchise))].sort();
  const sel=state.h2hTeam||franchises[0];
  let html=secTitle('Head-to-Head Records','All-Time');
  html+=`<div class="sub-tabs"><button class="sub-tab ${state.h2hView!=='detail'?'active':''}" onclick="state.h2hView='matrix';render()">Matrix</button><button class="sub-tab ${state.h2hView==='detail'?'active':''}" onclick="state.h2hView='detail';render()">Team Detail</button></div>`;

  if(state.h2hView==='detail'){
    html+=`<div style="margin-bottom:20px"><select class="dropdown" onchange="state.h2hTeam=this.value;render()">${franchises.map(f=>`<option value="${f}" ${sel===f?'selected':''}>${f}</option>`).join('')}</select></div>`;
    const teamH2H=h2h.filter(r=>r.franchise===sel).sort((a,b)=>{const ap=a.wins/(a.wins+a.losses||1);const bp=b.wins/(b.wins+b.losses||1);return bp-ap;});
    const totalW=teamH2H.reduce((s,r)=>s+r.wins,0);const totalL=teamH2H.reduce((s,r)=>s+r.losses,0);
    html+=`<div style="font-size:18px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;margin-bottom:16px">${sel} <span style="color:#94a3b8;font-size:14px">${totalW}-${totalL} overall</span></div>`;
    html+=`<div class="data-table"><div style="display:grid;grid-template-columns:1fr 80px 60px 80px;padding:10px 16px;font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:1px;font-weight:700;border-bottom:1px solid rgba(255,255,255,0.06)"><div>Opponent</div><div style="text-align:center">Record</div><div style="text-align:center">Win%</div><div style="text-align:center">Streak</div></div>`;
    teamH2H.forEach((r,i)=>{
      const gm=r.wins+r.losses+(r.ties||0);const pct=gm>0?(r.wins/gm).toFixed(3):'—';
      const domColor=parseFloat(pct)>=0.6?'#34d399':parseFloat(pct)>=0.5?'#10b981':parseFloat(pct)>=0.4?'#fb923c':'#f87171';
      const streak=r.streak||'';const streakColor=streak.startsWith('W')?'#34d399':'#f87171';
      html+=`<div style="display:grid;grid-template-columns:1fr 80px 60px 80px;align-items:center;padding:10px 16px;${i%2===0?'background:rgba(255,255,255,0.015)':''}"><div style="font-size:13px;font-weight:600;color:#e2e8f0">${r.opponent}</div><div style="font-size:13px;color:#94a3b8;text-align:center">${r.wins}-${r.losses}${r.ties>0?'-'+r.ties:''}</div><div style="font-size:13px;font-weight:700;color:${domColor};text-align:center">${pct}</div><div style="font-size:12px;font-weight:700;color:${streakColor};text-align:center">${streak}</div></div>`;
    });
    html+=`</div>`;
  } else {
    const lookup={};
    h2h.forEach(r=>{if(!lookup[r.franchise])lookup[r.franchise]={};lookup[r.franchise][r.opponent]={w:r.wins,l:r.losses};});
    const abbrMap={
      'Bear Exposures':'BEXP','Bear exposures':'BXPS',
      'Big Fat Chubby':'BFC','Clitsburgh Feelers':'CLTS',
      'Cooked To Perfection':'CTP',"Gordon's Bombay's":'GORD',
      'Gotham Rogues':'GOTH','Smease Appeasers':'SMSE',
      'Trump Train':'TRMP','Comeback Kid':'CBK',
      "Drunk Dancin' Donkeys":'DDD','Team Freesh':'FRSH',
      'The MUFF Divers':'MUFF','skoot':'SKOT',
      'Ceaser Salad Tossers':'CSTR'
    };

    html+=`<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:24px">`;
    html+=`<table style="border-collapse:collapse;font-size:11px;min-width:${franchises.length*52+120}px">`;
    html+=`<tr><td style="padding:6px 8px;font-weight:700;color:#64748b;position:sticky;left:0;background:#0b1120;z-index:1"></td>`;
    franchises.forEach(f=>{
      const abbr=abbrMap[f]||f.substring(0,5);
      html+=`<td style="padding:4px 2px;text-align:center;font-weight:700;color:#64748b;writing-mode:vertical-lr;transform:rotate(180deg);height:70px;font-size:10px;letter-spacing:0.5px">${abbr}</td>`;
    });
    html+=`</tr>`;
    franchises.forEach((f,fi)=>{
      const abbr=abbrMap[f]||f.substring(0,5);
      html+=`<tr>`;
      html+=`<td style="padding:6px 8px;font-weight:700;color:#e2e8f0;white-space:nowrap;position:sticky;left:0;background:#0b1120;z-index:1;font-size:11px;border-right:1px solid rgba(255,255,255,0.06)">${abbr}</td>`;
      franchises.forEach((opp,oi)=>{
        if(f===opp){
          html+=`<td style="padding:4px;text-align:center;background:rgba(255,255,255,0.03);font-size:10px;color:#334155">—</td>`;
        } else {
          const rec=lookup[f]&&lookup[f][opp];
          if(rec){
            const total=rec.w+rec.l;
            const pct=total>0?rec.w/total:0.5;
            let bg,fg;
            if(pct>=0.7){bg='rgba(34,197,94,0.3)';fg='#34d399';}
            else if(pct>=0.55){bg='rgba(16,185,129,0.2)';fg='#10b981';}
            else if(pct>=0.45){bg='rgba(255,255,255,0.03)';fg='#94a3b8';}
            else if(pct>=0.3){bg='rgba(251,146,60,0.2)';fg='#fb923c';}
            else{bg='rgba(248,113,113,0.25)';fg='#f87171';}
            html+=`<td style="padding:3px;text-align:center;background:${bg};font-size:10px;font-weight:700;color:${fg};cursor:default" title="${f} vs ${opp}: ${rec.w}-${rec.l}">${rec.w}-${rec.l}</td>`;
          } else {
            html+=`<td style="padding:4px;text-align:center;font-size:10px;color:#1e293b">—</td>`;
          }
        }
      });
      html+=`</tr>`;
    });
    html+=`</table></div>`;
    html+=`<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:#64748b;margin-top:8px"><span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:rgba(34,197,94,0.3);vertical-align:middle;margin-right:4px"></span>Dominant (70%+)</span><span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:rgba(16,185,129,0.2);vertical-align:middle;margin-right:4px"></span>Winning (55%+)</span><span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:rgba(255,255,255,0.03);vertical-align:middle;margin-right:4px"></span>Even</span><span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:rgba(251,146,60,0.2);vertical-align:middle;margin-right:4px"></span>Losing (30-45%)</span><span><span style="display:inline-block;width:12px;height:12px;border-radius:3px;background:rgba(248,113,113,0.25);vertical-align:middle;margin-right:4px"></span>Dominated (&lt;30%)</span></div>`;
  }
  return html;
}

function renderFunFacts(){
  const facts=[
    {emoji:'🏆',cat:'Dynasty',fact:`Trump Train (Chris Alves / John Phillips) won back-to-back championships in 2020 and 2021 — the only repeat champion in SBT history. The dynasty started just weeks after being blown out 205.8–47.5 by the Comeback Kids in Week 12 of 2020. They came back and won the title 259.0–112.2 — still the highest championship score ever.`},
    {emoji:'😤',cat:'Heartbreak',fact:`The MUFF Divers (Matt Skepner) have appeared in 4 championship games — more than any other team in SBT history — and only walked away with 1 ring (2017). They lost the 2014 title 102.5–172.0, lost the 2022 title 100.4–107.9, and lost the 2024 title 106.0–187.1. So close, so many times.`},
    {emoji:'📈',cat:'Record Book',fact:`The all-time single-game scoring record belongs to Yaz (Team Freesh / Josh Katz / Yazan Barqawi) who dropped 285.0 points in Week 8 of 2014. That's 76 points more than the opponent (The Comeback Kids, 172.5) — and still stands as the highest score in 14 seasons of SBT.`},
    {emoji:'😰',cat:'Nail-Biter',fact:`Two SBT regular season games were decided by just 0.1 points: Bear exposures 142.2 vs Teenage Newton Ninja Turtles 142.1 (Week 1, 2019) and Gotham Rogues 102.8 vs Trump Train 102.7 (Week 7, 2024). The league has never seen a regular season margin smaller than 0.1.`},
    {emoji:'🔥',cat:'Rivalry',fact:`The 2020 season featured the most dramatic head-to-head in SBT history. In Week 12, the Comeback Kids demolished Trump Train 205.8–47.5 — a 158-point blowout. Trump Train's 47.5 remains the lowest score by any team in a real game. Then in Week 16 (the championship), Trump Train returned the favor: 259.0–112.2. Revenge is a dish best served in the title game.`},
    {emoji:'🤝',cat:'Ties',fact:`There has been exactly ONE tie in 14 seasons of SBT play: The Big Gronkowski 127.0 vs The MUFF Divers 127.0 in Week 12 of 2014. The league has never seen another tie since — 1,500+ games and counting.`},
    {emoji:'🏈',cat:'Draft',fact:`Christian McCaffrey was the #1 overall pick in BOTH the 2020 and 2024 drafts — the only player to go #1 overall twice in SBT history. He went to Trump Train in 2020 (who won the title) and to skoot in 2024 (who went 10-7). Other #1 picks: Saquon Barkley (2019), Justin Jefferson (2023), Bijan Robinson (2025).`},
    {emoji:'🎯',cat:'Season',fact:`Andrew Mitchell's The Big Gronkowski put together the greatest regular season in SBT history in 2015: 14-2 record and 2,584 total points — still the most points scored in a single season. Despite all that, they fell in the championship game to Smease Appeasers, 168.5–193.5.`},
    {emoji:'📉',cat:'Futility',fact:`Bear exposures (Chris Kinnevy / Jesse Phillips) finished last in back-to-back seasons in 2021 (4–13) and 2022 (4–13) — the most losses ever in a single SBT season, done twice in a row. To add insult to injury, they've also won the league's Biggest Loser trophy 4 times — more than any other team in league history.`},
    {emoji:'💔',cat:'Arc',fact:`Clitsburgh Feelers (Steve Danek / T Ruf) went 2–13 in 2015 — the worst single-season record in SBT history. Eight years later, in 2023, they made it all the way to the championship game. They lost, 127.4–198.9 to Gotham Rogues. From worst to runner-up. The comeback arc.`},
    {emoji:'😩',cat:'Futility',fact:`C4 (Ryan Zayne / Bryan Silver) is the longest-tenured franchise without a championship — 12 seasons (2012–2023) and counting without a title. They've won the Booty Bowl once (2018) and made multiple playoffs, but the ring remains elusive. They left the league after 2023.`},
    {emoji:'😂',cat:'Drama',fact:`Michael Colacicco owned the Drunk Dancin' Donkeys for exactly one season (2012) before being kicked out of the league. He remains the only member in SBT history to be booted. No word on what exactly went down.`},
    {emoji:'📜',cat:'History',fact:`The MUFF Divers didn't start out as the MUFF Divers. In 2012, Matt Skepner and TJ Bevere entered the league under the name "Skep & TJ." They rebranded to The MUFF Divers in 2013 — and the name has stuck for 13 seasons. TJ left after 2016 and was replaced by Adam Cohen.`},
    {emoji:'🎭',cat:'Team Names',fact:`The Ceaser Salad Tossers franchise (Christian Ceaser / Jeffrey Herman) went through 5 different team names in 8 seasons: Oh Saquon You See (2018), Crispy McChicken (2019–2020), The LightSkin Legend & BearJew (2021), The Philly Special (2022–2024), and finally Ceaser Salad Tossers (2025). They won the championship in 2022 as The Philly Special in just their 5th season.`},
    {emoji:'📊',cat:'Scoring',fact:`2024 was the highest-scoring regular season in SBT history — teams combined for 22,110.7 total points across all regular season matchups. That's 1,372 more points than the lowest-scoring season, 2019 (20,736.7). Scoring is up across the league.`},
    {emoji:'🏛️',cat:'Legacy',fact:`Only two franchises have been in the league for all 14 seasons since 2012: Gotham Rogues (Jake Mason / Eric Mendes) and Smease Appeasers (John Schieda / Steve DeStefano). Every other current team either joined later or has changed franchise hands.`},
    {emoji:'🎪',cat:'Dynasty',fact:`Smease Appeasers (John Schieda / Steve DeStefano) may be the most decorated franchise in SBT history. Two championships (2014, 2016), two Booty Bowl titles (2013, 2018), and a runner-up finish (2013). The only team with multiple wins in both the winners' and losers' brackets.`},
    {emoji:'💣',cat:'Scoring',fact:`The highest-scoring single game in SBT history combined for 457.5 points: Yaz 285.0 vs The Comeback Kids 172.5 in Week 8 of 2014. Both teams were on fire that season — Clitsburgh Feelers also dropped 232.5 points in Week 10 of that year, the 4th-highest score all-time.`},
    {emoji:'🐻',cat:'Record Book',fact:`Bear Exposures (Chris Kinnevy) dropped 254.5 points in Week 13 of 2014 — the second-highest single-game score in SBT history, trailing only Yaz's 285.0 from that same wild season. If 2014 was a movie, it'd be an action film.`},
    {emoji:'👑',cat:'Dominant',fact:`Gotham Rogues' 2023 championship run was historic. They scored 198.9 points in the title game — the highest winning score in a championship game in SBT history. They also won their semifinal. Jake Mason had been waiting since 2013 for a second ring. He finally got it.`},
    {emoji:'🎲',cat:'Comebacks',fact:`Comeback Kid (Joe Gannon / Stephen Allen) might be the most aptly-named franchise ever. After winning in 2019, they posted the league's best record in 2020 (12–4) only to lose the title to Trump Train. They came back to finish 1st in the 2025 regular season.`},
    {emoji:'🔄',cat:'Rivalry',fact:`The 2020 season's Trump Train turnaround is one of the greatest stories in SBT history. They hit a season low of 47.5 points in Week 12 — lowest real score in league history — then reeled off wins in the playoffs culminating in a 259-point championship performance. From league laughingstock to champion in 4 weeks.`},
    {emoji:'🏅',cat:'Futility',fact:`skoot (Skooter Williams) has been in the league since 2013 — 13 seasons — without a championship. His team names over the years say it all: "Show Up To The Fucking Draft" (2019–2020), "no one goes to the draft" (2021–2022), then eventually just... "skoot." He did win the Biggest Loser trophy once.`},
    {emoji:'⚔️',cat:'Closest Playoff',fact:`The closest playoff game in SBT history was decided by just 0.3 points: Bear exposures 116.9 beat Smease Appeasers 116.6 in the 2023 Consolation Round 1. Three other playoff games were decided by 0.5 points or less — including the 2020 3rd Place game (118.5–118.0) and the 2012 Quarterfinal (133.5–133.0).`},
    {emoji:'🏗️',cat:'History',fact:`Gordon's Bombay's franchise (Jesse Phillips) won the very first SBT championship in 2012 under the name Woodchucks. They remained in the league through 2017 under various names before disappearing from the CBS records entirely. The 2012 banner is all that remains.`},
  ];

  let html=secTitle('Fun Facts','25 Things You Didn\'t Know');
  html+=`<div style="display:grid;gap:12px">`;
  facts.forEach((f,i)=>{
    const colors=['rgba(16,185,129,0.08)','rgba(167,139,250,0.08)','rgba(244,114,182,0.08)','rgba(52,211,153,0.08)','rgba(251,146,60,0.08)','rgba(248,113,113,0.08)'];
    const borders=['rgba(16,185,129,0.2)','rgba(167,139,250,0.2)','rgba(244,114,182,0.2)','rgba(52,211,153,0.2)','rgba(251,146,60,0.2)','rgba(248,113,113,0.2)'];
    const ci=i%colors.length;
    html+=`<div style="padding:18px 20px;border-radius:12px;background:${colors[ci]};border:1px solid ${borders[ci]};display:flex;gap:14px;align-items:flex-start">`;
    html+=`<div style="font-size:28px;flex-shrink:0;line-height:1">${f.emoji}</div>`;
    html+=`<div><div style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:4px">#${i+1} — ${f.cat}</div>`;
    html+=`<div style="font-size:14px;color:#e2e8f0;line-height:1.6">${f.fact}</div></div></div>`;
  });
  html+=`</div>`;
  return html;
}
