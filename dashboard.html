<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#10b981">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SBT Fantasy">
  <link rel="apple-touch-icon" href="sbt-logo.png">
<title>2025 Season — SBT Fantasy Football</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="leftnav.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;background:#080e1c;color:#e2e8f0;font-family:'DM Sans','Segoe UI',sans-serif;min-height:100vh}
#shell{display:flex;flex:1;min-height:100vh}
#main{flex:1;min-width:0;width:0;overflow-y:auto;background:#080e1c}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#0b1120}::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px}
a{color:#10b981;text-decoration:none}

#ln-topbar{display:none;background:#080f1e;border-bottom:1px solid rgba(255,255,255,0.06);padding:10px 16px;align-items:center;gap:12px}
#ln-mobile-btn{background:none;border:none;color:#94a3b8;font-size:20px;cursor:pointer;padding:2px 6px}
.ln-topbar-title{font-size:13px;font-weight:700;color:#94a3b8}
@media(max-width:700px){#ln-topbar{display:flex}}

#dash-loading{padding:80px;text-align:center;color:#94a3b8;font-size:14px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(16,185,129,0.2);border-top-color:#10b981;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

.season-banner{background:linear-gradient(135deg,#0d1b2e 0%,#0f2339 50%,#0d1b2e 100%);border-bottom:1px solid rgba(16,185,129,0.15);padding:20px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.banner-left{display:flex;align-items:center;gap:16px}
.banner-logo{height:52px;width:52px;object-fit:contain;border-radius:10px}
.banner-title{font-size:32px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:3px;background:linear-gradient(135deg,#10b981,#6ee7b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.banner-sub{font-size:11px;color:#64748b;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-top:3px}
.badge-pill{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.5px;border:1px solid}
.badge-season{background:rgba(16,185,129,0.1);border-color:rgba(16,185,129,0.3);color:#10b981}

.dash-page{padding:20px 24px;max-width:1500px;margin:0 auto}

.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:16px 18px;position:relative;overflow:hidden;transition:border-color .2s}
.stat-card:hover{border-color:rgba(16,185,129,0.25)}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-card.green::after{background:linear-gradient(90deg,#10b981,transparent)}
.stat-card.gold::after{background:linear-gradient(90deg,#facc15,transparent)}
.stat-card.blue::after{background:linear-gradient(90deg,#60a5fa,transparent)}
.stat-card.purple::after{background:linear-gradient(90deg,#a78bfa,transparent)}
.sc-label{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1.2px;font-weight:700;margin-bottom:10px}
.sc-team{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.sc-logo{width:28px;height:28px;border-radius:7px;object-fit:contain;background:#0f172a;flex-shrink:0}
.sc-name{font-size:15px;font-weight:800;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-value{font-size:26px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;color:#e2e8f0;line-height:1}
.sc-sub{font-size:11px;color:#64748b;margin-top:4px}

.main-grid{display:grid;grid-template-columns:1fr 330px;gap:16px;align-items:start}
.left-col{display:flex;flex-direction:column;gap:16px}

.panel{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:14px;overflow:hidden}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(0,0,0,0.15)}
.ph-title{font-size:12px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;color:#94a3b8;text-transform:uppercase}
.ph-badge{font-size:10px;font-weight:700;color:#10b981;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);padding:2px 9px;border-radius:10px}

.week-nav-btns{display:flex;align-items:center;gap:6px}
.wn-btn{width:26px;height:26px;border-radius:6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#94a3b8;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:inherit}
.wn-btn:hover:not(:disabled){background:rgba(16,185,129,0.12);border-color:rgba(16,185,129,0.3);color:#10b981}
.wn-btn:disabled{opacity:.3;cursor:default}
.wn-label{font-size:12px;font-weight:700;color:#e2e8f0;min-width:52px;text-align:center}

.matchup-grid{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.mu-card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:10px 14px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;transition:all .15s;cursor:pointer}
.mu-card:hover{border-color:rgba(16,185,129,0.3);background:rgba(16,185,129,0.04)}
.mu-card.playoff{border-color:rgba(250,204,21,0.15);background:rgba(250,204,21,0.03)}
.mu-card.playoff:hover{border-color:rgba(250,204,21,0.35)}
.mu-team{display:flex;align-items:center;gap:8px;min-width:0}
.mu-team.right{flex-direction:row-reverse}
.mu-tlogo{width:32px;height:32px;border-radius:8px;object-fit:contain;flex-shrink:0;background:#0f172a}
.mu-tname{font-size:12px;font-weight:700;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mu-team.right .mu-tname{text-align:right}
.mu-scores{text-align:center;flex-shrink:0}
.mu-score-row{display:flex;gap:6px;align-items:center;justify-content:center}
.mu-score{font-size:22px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;line-height:1}
.mu-score.win{color:#10b981}
.mu-score.loss{color:#64748b}
.mu-vs{font-size:10px;font-weight:700;color:#64748b;margin:0 2px}
.mu-type{font-size:9px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.mu-type.playoff-label{color:#facc15}
.mu-click-hint{font-size:9px;color:#334155;text-align:center;margin-top:2px}

.stand-body{max-height:520px;overflow-y:auto}
.stand-hdr{display:grid;grid-template-columns:22px 1fr 58px 50px;gap:6px;padding:7px 14px;background:rgba(0,0,0,0.25);font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.8px}
.stand-row{display:grid;grid-template-columns:22px 1fr 58px 50px;gap:6px;align-items:center;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,0.03);transition:background .1s}
.stand-row:hover{background:rgba(255,255,255,0.02)}
.stand-row:last-child{border-bottom:none}
.sr-rank{font-size:11px;font-weight:800;color:#64748b;text-align:center}
.sr-team{display:flex;align-items:center;gap:7px;min-width:0}
.sr-tlogo{width:24px;height:24px;border-radius:5px;object-fit:contain;flex-shrink:0;background:#0f172a}
.sr-tname{font-size:12px;font-weight:700;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-record{font-size:11px;font-weight:700;color:#94a3b8;text-align:center}
.sr-pts{font-size:11px;font-weight:700;color:#10b981;text-align:right}
.po-badge{font-size:8px;font-weight:800;padding:1px 4px;border-radius:3px;background:rgba(16,185,129,0.12);color:#10b981;border:1px solid rgba(16,185,129,0.2);flex-shrink:0}
.stand-tabs{display:flex;gap:0;padding:0 14px;background:rgba(0,0,0,0.2);border-bottom:1px solid rgba(255,255,255,0.06);overflow-x:auto;scrollbar-width:thin}
.stand-tabs::-webkit-scrollbar{height:3px}
.stand-tabs::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px}
.stand-tab{padding:8px 14px;border:none;background:transparent;color:#64748b;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0}
.stand-tab.on{color:#10b981;border-bottom-color:#10b981}

.feed-wrap{padding:12px 14px;display:flex;flex-direction:column;gap:0;max-height:420px;overflow-y:auto}
.feed-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.04);align-items:flex-start}
.feed-item:last-child{border-bottom:none}
.fi-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.fi-add{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2)}
.fi-drop{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15)}
.fi-trade{background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.2)}
.fi-waiver{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.15)}
.fi-body{flex:1;min-width:0}
.fi-team{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.fi-tlogo{width:18px;height:18px;border-radius:4px;object-fit:contain;background:#0f172a}
.fi-tname{font-size:12px;font-weight:700;color:#e2e8f0}
.fi-detail{font-size:11px;color:#94a3b8;line-height:1.7;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.fi-ts{font-size:10px;color:#64748b;margin-top:3px}
.pill{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border-radius:5px;font-size:10px;font-weight:700;white-space:nowrap}
.p-add{background:rgba(16,185,129,0.12);color:#10b981}
.p-drop{background:rgba(239,68,68,0.1);color:#ef4444}
.p-trade{background:rgba(167,139,250,0.1);color:#a78bfa}
.p-waiver{background:rgba(245,158,11,0.1);color:#f59e0b}
.nfl-logo{width:14px;height:14px;object-fit:contain;vertical-align:middle;display:inline-block}

.news-section{margin-top:20px}
.section-ttl{font-size:20px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;color:#e2e8f0;margin-bottom:4px}
.section-sub{font-size:11px;color:#64748b;margin-bottom:14px}
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
.news-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px 16px;transition:border-color .15s}
.news-card:hover{border-color:rgba(16,185,129,0.2)}
.nc-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.nc-photo{width:38px;height:38px;border-radius:50%;object-fit:cover;background:#0f172a;border:1px solid rgba(255,255,255,0.08);flex-shrink:0}
.nc-nfl{width:22px;height:22px;object-fit:contain;flex-shrink:0}
.nc-info{flex:1;min-width:0}
.nc-name{font-size:12px;font-weight:800;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nc-meta{display:flex;align-items:center;gap:5px;margin-top:2px}
.nc-pos{font-size:9px;font-weight:800;padding:1px 5px;border-radius:4px}
.nc-team{font-size:10px;color:#64748b;font-weight:600}
.nc-fantasy{font-size:10px;color:#475569;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.nc-headline{font-size:12px;font-weight:700;color:#e2e8f0;line-height:1.5;margin-bottom:5px}
.nc-body{font-size:11px;color:#94a3b8;line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.nc-date{font-size:10px;color:#64748b;margin-top:8px}
.pos-QB{color:#f472b6}.pos-RB{color:#22d3ee}.pos-WR{color:#34d399}.pos-TE{color:#fb923c}.pos-K{color:#facc15}.pos-DST{color:#a78bfa}
.bg-QB{background:rgba(244,114,182,0.12)}.bg-RB{background:rgba(34,211,238,0.12)}.bg-WR{background:rgba(52,211,153,0.12)}.bg-TE{background:rgba(251,146,60,0.12)}.bg-K{background:rgba(250,204,21,0.12)}.bg-DST{background:rgba(167,139,250,0.12)}

/* Matchup Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal-overlay.hidden{display:none}
.modal-box{background:#0d1626;border:1px solid rgba(255,255,255,0.1);border-radius:18px;width:100%;max-width:860px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0}
.modal-title{font-size:13px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;color:#94a3b8;text-transform:uppercase}
.modal-close{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#94a3b8;width:28px;height:28px;border-radius:8px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-close:hover{background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.3);color:#f87171}
.modal-score-bar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(0,0,0,0.2);flex-shrink:0}
.msb-team{display:flex;align-items:center;gap:10px;min-width:0}
.msb-team.right{flex-direction:row-reverse}
.msb-logo{width:40px;height:40px;border-radius:10px;object-fit:contain;background:#0f172a;flex-shrink:0}
.msb-name{font-size:14px;font-weight:800;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msb-score-block{text-align:center}
.msb-scores{display:flex;align-items:center;gap:10px;justify-content:center}
.msb-score{font-size:36px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;line-height:1}
.msb-score.win{color:#10b981}
.msb-score.loss{color:#64748b}
.msb-vs{font-size:14px;font-weight:700;color:#475569}
.msb-type{font-size:10px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.modal-body{overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:0}
.lineup-col{padding:12px 16px}
.lineup-col.right{border-left:1px solid rgba(255,255,255,0.05)}
.lc-head{font-size:10px;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:1px;padding:6px 0 8px;border-bottom:1px solid rgba(255,255,255,0.05);margin-bottom:4px}
.lc-section{font-size:9px;font-weight:800;color:#334155;text-transform:uppercase;letter-spacing:.8px;padding:8px 0 4px;margin-top:4px}
.player-row{display:grid;grid-template-columns:26px 26px 1fr auto;align-items:center;gap:6px;padding:5px 2px;border-bottom:1px solid rgba(255,255,255,0.03)}
.player-row:last-child{border-bottom:none}
.pr-photo{width:26px;height:26px;border-radius:50%;object-fit:cover;background:#0f172a;flex-shrink:0}
.pr-nfl{width:20px;height:20px;object-fit:contain;flex-shrink:0}
.pr-info{min-width:0}
.pr-name{font-size:11px;font-weight:700;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pr-meta{display:flex;align-items:center;gap:4px;margin-top:1px}
.pr-slot{font-size:8px;font-weight:700;color:#475569;background:rgba(255,255,255,0.05);padding:1px 4px;border-radius:3px}
.pr-pos{font-size:8px;font-weight:800;padding:1px 4px;border-radius:3px}
.pr-pts{font-size:13px;font-weight:800;font-family:'Bebas Neue',sans-serif;color:#e2e8f0;text-align:right;white-space:nowrap}
.pr-pts.good{color:#10b981}
.pr-pts.bench{color:#475569}

.bk-section{margin-top:16px}
.bk-wrap{display:flex;gap:0;overflow-x:auto}
.bk-sub{min-width:0;padding:14px 16px;border-right:1px solid rgba(255,255,255,0.05)}
.bk-sub:last-child{border-right:none}
.bk-sub-title{font-size:10px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:2px}
.bk-sub-sub{font-size:9px;font-weight:600;color:#475569;margin-bottom:12px}
.bk-rounds{display:flex;gap:8px;align-items:stretch}
.bk-round{flex:1;min-width:120px;display:flex;flex-direction:column}
.bk-rlabel{font-size:9px;font-weight:800;color:#334155;text-transform:uppercase;letter-spacing:.8px;text-align:center;padding:0 0 8px}
.bk-games{display:flex;flex-direction:column;justify-content:space-evenly;flex:1;gap:8px}
.bk-game{background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.06);border-radius:8px;overflow:hidden}
.bk-game-lbl{font-size:8px;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:.5px;text-align:center;padding:4px;background:rgba(0,0,0,0.2);border-bottom:1px solid rgba(255,255,255,0.04)}
.bk-team{display:flex;align-items:center;gap:5px;padding:5px 8px;border-bottom:1px solid rgba(255,255,255,0.04);min-width:0}
.bk-team:last-child{border-bottom:none}
.bk-team.bk-w{background:rgba(16,185,129,0.06)}
.bk-logo{width:18px;height:18px;border-radius:4px;object-fit:contain;flex-shrink:0;background:#0f172a}
.bk-name{font-size:10px;font-weight:700;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.bk-team.bk-l .bk-name,.bk-team.bk-l .bk-score{color:#475569}
.bk-score{font-size:10px;font-weight:800;font-family:'Bebas Neue',sans-serif;color:#64748b;flex-shrink:0;margin-left:2px}
.bk-team.bk-w .bk-score{color:#10b981}
.bk-pick{font-size:8px;font-weight:800;padding:1px 5px;border-radius:3px;flex-shrink:0;white-space:nowrap;margin-left:3px}
@media(max-width:1100px){.main-grid{grid-template-columns:1fr}}
@media(max-width:800px){.stat-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.modal-body{grid-template-columns:1fr}.lineup-col.right{border-left:none;border-top:1px solid rgba(255,255,255,0.05)}.bk-wrap{flex-direction:column}}
@media(max-width:500px){.stat-row{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="shell">
<nav id="leftnav"></nav>
<div id="main">
<div id="ln-topbar">
  <button id="ln-mobile-btn" onclick="lnToggleMobile()">&#9776;</button>
  <span class="ln-topbar-title">Sigma Beta Tau Fantasy Football</span>
</div>

<div class="season-banner">
  <div class="banner-left">
    <img src="sbt-logo.png" class="banner-logo" alt="SBT" onerror="this.style.display='none'">
    <div>
      <div class="banner-title">2025 Season</div>
      <div class="banner-sub">Sigma Beta Tau Fantasy Football &nbsp;·&nbsp; 14th Season &nbsp;·&nbsp; 12 Teams</div>
    </div>
  </div>
  <div>
    <span class="badge-pill badge-season">&#127942; Season Complete</span>
  </div>
</div>

<div class="dash-page">
  <div id="dash-loading"><span class="spinner"></span>Loading season data...</div>
  <div id="dash-content" style="display:none"></div>
</div>
</div><!-- /#main -->
</div><!-- /#shell -->

<!-- Matchup Modal -->
<div class="modal-overlay hidden" id="mu-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-hdr">
      <span class="modal-title" id="mu-modal-title">Matchup</span>
      <button class="modal-close" onclick="closeModal()">&#10005;</button>
    </div>

<script>
const SEASON = 2025;
const PLAYOFF_SPOTS = 6;
const NFL_LOGO = team => `https://a.espncdn.com/i/teamlogos/nfl/500/${(team||'').toLowerCase()}.png`;
const FRANCHISE_LOGOS = {
  "Bear Exposures":"bearexposures-logo.jpg","Big Fat Chubby":"bigfatchubby-logo.jpg",
  "Ceaser Salad Tossers":"ceaser-logo.jpg","Clitsburgh Feelers":"clitsburg-logo.jpg",
  "Comeback Kid":"comebackkid-logo.jpg","Cooked To Perfection":"cookedtoperfection-logo.jpg",
  "Gotham Rogues":"gotham-logo.gif","Smease Appeasers":"smease-logo.png",
  "Team Freesh":"freesh-logo.jpg","The MUFF Divers":"muff-logo.png",
  "Trump Train":"trumptrain-logo.jpg","skoot":"skoot-logo.jpg"
};
function tLogo(name){
  if(!name) return '';
  if(FRANCHISE_LOGOS[name]) return `team-logo/${FRANCHISE_LOGOS[name]}`;
  const lower=name.toLowerCase();
  for(const[k,v] of Object.entries(FRANCHISE_LOGOS)){
    if(lower.includes(k.toLowerCase().split(' ')[0].replace(/[^a-z0-9]/g,''))) return `team-logo/${v}`;
  }
  return '';
}
function tLogoImg(name,cls='mu-tlogo'){
  const src=tLogo(name);
  return src
    ?`<img src="${src}" class="${cls}" alt="" onerror="this.style.display='none'">`
    :`<div class="${cls}" style="background:rgba(16,185,129,0.1);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#10b981">${(name||'?')[0]}</div>`;
}

let D={};
let selWeek=null;
let stTab='regular';
const DIVS={};
let PHOTO_MAP={};

function dbCommishRowToTx(row){
  const p=row.payload||{};
  const kindToType={drop:'commissioner_drop',add:'commissioner_add',reverse:'commissioner_reversal'};
  return {
    season: SEASON,
    week: p.week||'Commish',
    timestamp: p.timestamp_str||'',
    type: kindToType[p.kind]||'commissioner_drop',
    team: p.team_name||'',
    adds: p.adds||[],
    drops: p.drops||[],
    _comm: true,
  };
}

async function loadAll(){
  try{
    const slug=window.COMM_AUTH?.leagueSlug;
    const [standings,matchups,transactions,divisions,newsRaw,weeklyScores,playoffGamesRaw,dbCommish]=await Promise.all([
      fetch('data/standings.json').then(r=>r.json()),
      fetch('data/matchups.json').then(r=>r.json()),
      fetch('data/transactions.json').then(r=>r.json()),
      fetch('data/divisions.json').then(r=>r.json()).catch(()=>[]),
      fetch('data/player_news_2025.json').then(r=>r.json()).catch(()=>({})),
      fetch('data/weekly_scores_2025.json').then(r=>r.json()).catch(()=>[]),
      fetch('data/playoff_games.json').then(r=>r.json()).catch(()=>[]),
      (window.loadLeagueCommishActions&&slug)?window.loadLeagueCommishActions(slug).catch(()=>null):Promise.resolve(null)
    ]);
    D.standings=standings.filter(s=>s.season===SEASON).sort((a,b)=>a.rank-b.rank);
    D.matchups=matchups.filter(m=>m.season===SEASON);
    const commTxs=Array.isArray(dbCommish)?dbCommish.map(dbCommishRowToTx):[];
    D.tx=[...transactions.filter(t=>t.season===SEASON), ...commTxs];
    D.divs=divisions.filter(d=>d.season===SEASON);
    D.divs.forEach(d=>{DIVS[d.team_name]=d.division;});
    D.news=newsRaw.teams||newsRaw||{};
    D.weekly=weeklyScores;
    D.playoffGames=Array.isArray(playoffGamesRaw)?playoffGamesRaw:[];
    // build photo map from player_news
    Object.values(D.news).forEach(players=>{
      (players||[]).forEach(p=>{
        if(p.name&&p.photo_url) PHOTO_MAP[p.name.toLowerCase()]=p.photo_url;
      });
    });
    const wks=[...new Set(D.matchups.map(m=>m.week))].sort((a,b)=>a-b);
    selWeek=wks[wks.length-1]||1;
    document.getElementById('dash-loading').style.display='none';
    document.getElementById('dash-content').style.display='';
    render();
  }catch(e){
    document.getElementById('dash-loading').innerHTML=`<span style="color:#ef4444">Error loading data: ${e.message}</span>`;
  }
}

function render(){
  document.getElementById('dash-content').innerHTML=`
    ${renderStatCards()}
    <div class="main-grid">
      <div class="left-col">${renderMatchups()}${renderFeed()}</div>
      <div>${renderStandings()}</div>
    </div>
    ${renderBracket()}
    ${renderNews()}`;
}

/* ── Stat Cards ── */
function renderStatCards(){
  const leader=D.standings[0]||{};
  const topScorer=[...D.standings].sort((a,b)=>b.points_for-a.points_for)[0]||{};
  const wks=[...new Set(D.matchups.map(m=>m.week))].sort((a,b)=>a-b);
  const topWpg=D.standings.map(s=>({...s,wpg:s.points_for/(s.wins+s.losses||1)})).sort((a,b)=>b.wpg-a.wpg)[0]||{};

    <div class="stat-card green">
      <div class="sc-label">League Leader</div>
      <div class="sc-team">${tLogoImg(leader.team_name,'sc-logo')}<span class="sc-name">${leader.team_name||'—'}</span></div>
      <div class="sc-sub">${leader.wins||0}–${leader.losses||0} &nbsp;·&nbsp; ${(leader.points_for||0).toFixed(1)} PF</div>
    </div>
    <div class="stat-card gold">
      <div class="sc-label">Top Scorer</div>
      <div class="sc-team">${tLogoImg(topScorer.team_name,'sc-logo')}<span class="sc-name">${topScorer.team_name||'—'}</span></div>
      <div class="sc-sub">${(topScorer.points_for||0).toFixed(1)} total points</div>
    </div>

      <div class="sc-label">Highest Avg / Game</div>
      <div class="sc-team">${tLogoImg(topWpg.team_name,'sc-logo')}<span class="sc-name">${topWpg.team_name||'—'}</span></div>
      <div class="sc-sub">${topWpg.wpg?(topWpg.wpg.toFixed(1)+' pts/game'):'—'}</div>
    </div>
    <div class="stat-card purple">
      <div class="sc-label">Season Length</div>
      <div class="sc-value">${wks.length}</div>
      <div class="sc-sub">Weeks · ${D.standings.length} teams</div>
    </div>
  </div>`;
}

/* ── Week Nav ── */
function navWeek(delta){
  const wks=[...new Set(D.matchups.map(m=>m.week))].sort((a,b)=>a-b);
  const idx=wks.indexOf(selWeek);
  const ni=idx+delta;
  if(ni<0||ni>=wks.length) return;
  selWeek=wks[ni];
  reMatchups();
}

/* ── Matchups ── */
function buildMatchupCards(){
  const wks=[...new Set(D.matchups.map(m=>m.week))].sort((a,b)=>a-b);
  const wkIdx=wks.indexOf(selWeek);
  const hasPrev=wkIdx>0, hasNext=wkIdx<wks.length-1;
  const wkGames=D.matchups.filter(m=>m.week===selWeek);
  const typeLabel={regular:'Regular Season',playoff:'Playoff',consolation:'Consolation'};
  const cards=wkGames.map(m=>{
    const t1w=m.team1_score>m.team2_score,t2w=m.team2_score>m.team1_score;
    const isPO=m.matchup_type==='playoff';
    return`<div class="mu-card ${isPO?'playoff':''}" onclick="location.href='matchup.html?week='+selWeek" style="cursor:pointer">
      <div class="mu-team">
        ${tLogoImg(m.team1_name)}
        <div style="min-width:0"><div class="mu-tname">${m.team1_name}</div></div>
      </div>
      <div class="mu-scores">
        <div class="mu-score-row">
          <span class="mu-score ${t1w?'win':t2w?'loss':''}">${m.team1_score??'—'}</span>
          <span class="mu-vs">–</span>
          <span class="mu-score ${t2w?'win':t1w?'loss':''}">${m.team2_score??'—'}</span>
        </div>
        <div class="mu-type ${isPO?'playoff-label':''}">${typeLabel[m.matchup_type]||''}</div>
      </div>
      <div class="mu-team right">
        ${tLogoImg(m.team2_name)}
        <div style="min-width:0"><div class="mu-tname">${m.team2_name}</div></div>
      </div>
    </div>`;
  }).join('');
  return{cards,hasPrev,hasNext};
}
function renderMatchups(){
  const{cards,hasPrev,hasNext}=buildMatchupCards();
  return`<div class="panel">
    <div class="panel-hdr">
      <span class="ph-title">Matchups</span>
      <div class="week-nav-btns">
        <button class="wn-btn" id="wn-prev" ${!hasPrev?'disabled':''} onclick="navWeek(-1)">&#8249;</button>
        <span class="wn-label" id="wn-lbl">Week ${selWeek}</span>
        <button class="wn-btn" id="wn-next" ${!hasNext?'disabled':''} onclick="navWeek(1)">&#8250;</button>
      </div>
    </div>
    <div class="matchup-grid" id="mu-body">${cards||'<div style="padding:20px;text-align:center;color:#64748b">No matchup data</div>'}</div>
  </div>`;
}
function reMatchups(){
  const{cards,hasPrev,hasNext}=buildMatchupCards();
  document.getElementById('wn-prev').disabled=!hasPrev;
  document.getElementById('wn-lbl').textContent=`Week ${selWeek}`;
  document.getElementById('wn-next').disabled=!hasNext;

}

/* ── Matchup Modal ── */
const SLOT_ORDER={QB:1,RB:2,WR:3,TE:4,'RB-WR-TE':5,K:6,DST:7};
function openMatchup(week,t1,t2,s1,s2,type){
  const t1Entry=D.weekly.find(e=>e.week===week&&e.team_name===t1)||
    D.weekly.find(e=>e.week===week&&t1.toLowerCase().startsWith(e.team_name.toLowerCase().split(' ')[0]));
  const t2Entry=D.weekly.find(e=>e.week===week&&e.team_name===t2)||
    D.weekly.find(e=>e.week===week&&t2.toLowerCase().startsWith(e.team_name.toLowerCase().split(' ')[0]));

    <div class="msb-team">

      <span class="msb-name">${t1}</span>
    </div>
    <div class="msb-score-block">
      <div class="msb-scores">
        <span class="msb-score ${t1w?'win':t2w?'loss':''}">${s1??'—'}</span>
        <span class="msb-vs">–</span>
        <span class="msb-score ${t2w?'win':t1w?'loss':''}">${s2??'—'}</span>
      </div>
      <div class="msb-type">${typeLabel[type]||''}</div>
    </div>
    <div class="msb-team right">
      ${tLogoImg(t2,'msb-logo')}
      <span class="msb-name">${t2}</span>
    </div>`;
  document.getElementById('mu-modal-body').innerHTML=
    buildLineupCol(t1Entry,t1,false)+buildLineupCol(t2Entry,t2,true);

function closeModal(){
  document.getElementById('mu-modal').classList.add('hidden');
  document.body.style.overflow='';
}
function buildLineupCol(entry,teamName,isRight){
  if(!entry||!entry.players){
    return`<div class="lineup-col ${isRight?'right':''}">
      <div style="padding:20px;text-align:center;color:#475569;font-size:12px">No lineup data</div>
    </div>`;
  }
  const starters=entry.players.filter(p=>p.status==='A').sort((a,b)=>(SLOT_ORDER[a.slot]||99)-(SLOT_ORDER[b.slot]||99));
  const bench=entry.players.filter(p=>p.status!=='A').sort((a,b)=>(SLOT_ORDER[a.slot]||99)-(SLOT_ORDER[b.slot]||99));
  const starterTotal=starters.reduce((s,p)=>s+(p.points||0),0);
  const rows=(players,isBench)=>players.map(p=>{
    const photo=PHOTO_MAP[p.name.toLowerCase()]
      ?`<img src="${PHOTO_MAP[p.name.toLowerCase()]}" class="pr-photo" alt="" onerror="this.outerHTML='<div class=\\'pr-photo\\' style=\\'background:#0f172a;display:flex;align-items:center;justify-content:center;font-size:10px\\'>'+p.name[0]+'</div>'">`
      :`<div class="pr-photo" style="background:#0f172a;display:flex;align-items:center;justify-content:center;font-size:10px;color:#475569">${(p.name||'?')[0]}</div>`;
    const nfl=p.nfl_team?`<img src="${NFL_LOGO(p.nfl_team)}" class="pr-nfl" alt="${p.nfl_team}" onerror="this.style.display='none'">`:
      `<div class="pr-nfl"></div>`;
    const pts=p.points??0;
    const ptsClass=isBench?'bench':pts>=15?'good':'';
    const pc=p.position||'';
    return`<div class="player-row">
      ${photo}
      ${nfl}
      <div class="pr-info">
        <div class="pr-name">${p.name}</div>
        <div class="pr-meta">
          <span class="pr-slot">${p.slot}</span>
          <span class="pr-pos pos-${pc} bg-${pc}">${pc}</span>
        </div>
      </div>
      <div class="pr-pts ${ptsClass}">${isBench?'':pts.toFixed(1)}</div>
    </div>`;
  }).join('');
  return`<div class="lineup-col ${isRight?'right':''}">
    <div class="lc-head">Starters &nbsp;·&nbsp; ${starterTotal.toFixed(1)} pts</div>
    ${rows(starters,false)}
    ${bench.length?`<div class="lc-section">Bench</div>${rows(bench,true)}`:''}

}

/* ── Standings ── */
function renderStandings(){
  const DIV_ORDER=['Sigma','Beta','Tau'];
  const divNames=DIV_ORDER.filter(d=>[...new Set(D.divs.map(x=>x.division))].includes(d));
  const hasDivs=divNames.length>0;
  const tabs=`<div class="stand-tabs">
    <button class="stand-tab ${stTab==='regular'?'on':''}" onclick="stTab='regular';reStand()">Regular Season</button>
    ${hasDivs?divNames.map(d=>`<button class="stand-tab ${stTab===d?'on':''}" onclick="stTab='${d}';reStand()">${d}</button>`).join(''):''}
    <button class="stand-tab ${stTab==='final'?'on':''}" onclick="stTab='final';reStand()">Final</button>
  </div>`;
  return`<div class="panel">
    <div class="panel-hdr"><span class="ph-title">Standings</span><span class="ph-badge">2025</span></div>
    ${tabs}
    <div class="stand-hdr"><div></div><div>Team</div><div style="text-align:center">W–L</div><div style="text-align:right">PF</div></div>
    <div class="stand-body" id="stand-body">${buildStandRows()}</div>
  </div>`;
}
/* Compute standings from regular-season matchups only (excludes playoff weeks) */
function getRegSeasonStandings(){
  const reg=D.matchups.filter(m=>m.matchup_type!=='playoff');
  const stats={};
  reg.forEach(m=>{
    [m.team1_name,m.team2_name].forEach(t=>{if(!stats[t])stats[t]={wins:0,losses:0,pf:0};});
    stats[m.team1_name].pf+=m.team1_score||0;
    stats[m.team2_name].pf+=m.team2_score||0;
    if(m.team1_score>m.team2_score){stats[m.team1_name].wins++;stats[m.team2_name].losses++;}
    else if(m.team2_score>m.team1_score){stats[m.team2_name].wins++;stats[m.team1_name].losses++;}
    else{stats[m.team1_name].wins+=0.5;stats[m.team2_name].wins+=0.5;}
  });
  return Object.entries(stats)
    .map(([t,s])=>({team_name:t,wins:s.wins,losses:s.losses,points_for:Math.round(s.pf*10)/10}))
    .sort((a,b)=>(b.wins-a.wins)||(b.points_for-a.points_for))
    .map((s,i)=>({...s,rank:i+1}));
}
function getFinalStandings(){
  const pg=D.playoffGames.filter(g=>g.season===SEASON);
  const wG=pg.filter(g=>g.bracket==='playoff');
  const cG=pg.filter(g=>g.bracket==='consolation');
  if(!wG.length) return [];
  const maxWR=Math.max(...wG.map(g=>g.round));
  const picks={};
  wG.filter(g=>g.round===maxWR).forEach(g=>{
    const loser=g.winner===g.team1?g.team2:g.team1;
    const n=g.round_name.toLowerCase();
    if(n.includes('champ')){picks[g.winner]=12;picks[loser]=11;}
    else{picks[g.winner]=10;picks[loser]=9;}
  });
  const maxCR=cG.length?Math.max(...cG.map(g=>g.round)):0;
  cG.filter(g=>g.round===maxCR).forEach(g=>{
    const loser=g.winner===g.team1?g.team2:g.team1;
    const n=g.round_name.toLowerCase();
    if(n.includes('booty')){picks[g.winner]=4;picks[loser]=3;}
    else{picks[g.winner]=2;picks[loser]=1;}
  });
  const r1L=new Set(wG.filter(g=>g.round===1).map(g=>g.winner===g.team1?g.team2:g.team1));
  const allWks=[...new Set(D.matchups.filter(m=>m.matchup_type==='playoff').map(m=>m.week))].sort((a,b)=>a-b);
  const lbRounds=[];let lbR1W=new Set();
  for(const wk of allWks){
    if(lbRounds.length>=maxWR-1) break;
    const gms=D.matchups.filter(m=>m.week===wk&&r1L.has(m.team1_name)&&r1L.has(m.team2_name));
    if(!gms.length) continue;
    const mapped=gms.map(g=>({team1:g.team1_name,s1:g.team1_score,team2:g.team2_name,s2:g.team2_score,winner:g.team1_score>g.team2_score?g.team1_name:g.team2_name}));
    if(!lbRounds.length) mapped.forEach(g=>lbR1W.add(g.winner));
    lbRounds.push(mapped);
  }
  if(lbRounds.length){
    lbRounds[lbRounds.length-1].forEach(g=>{
      const f=lbR1W.has(g.team1)&&lbR1W.has(g.team2);
      const loser=g.winner===g.team1?g.team2:g.team1;
      picks[g.winner]=f?5:7;picks[loser]=f?6:8;
    });
  }
  return Object.entries(picks).sort((a,b)=>b[1]-a[1]).map(([team,pick],i)=>({team,pick,rank:i+1}));
}
function buildStandRows(){
  const regRows=getRegSeasonStandings();
  // Division leaders (for regular season tab)
  const divGroups={};
  regRows.forEach(r=>{const d=DIVS[r.team_name];if(d){if(!divGroups[d])divGroups[d]=[];divGroups[d].push(r);}});
  const divLeaderSet=new Set(Object.values(divGroups).map(g=>g[0]?.team_name).filter(Boolean));

  const leagueMaxW=Math.max(...regRows.map(r=>r.wins||0));
  const leagueMaxPF=Math.max(...regRows.map(r=>r.points_for||0));

  function badges(team, rows, isDivView){
    const tw=rows.find(r=>r.team_name===team); if(!tw) return '';
    const isDivLeader=isDivView?rows[0]?.team_name===team:divLeaderSet.has(team);
    let b='';
    if(isDivLeader) b+=`<span style="font-size:9px;font-weight:700;color:#60a5fa;border:1px solid rgba(96,165,250,0.3);border-radius:3px;padding:1px 4px;margin-left:4px">DIV</span>`;
    if(tw.wins===leagueMaxW) b+=`<span style="font-size:9px;font-weight:700;color:#facc15;border:1px solid rgba(250,204,21,0.3);border-radius:3px;padding:1px 4px;margin-left:4px">WINS</span>`;
    if(tw.points_for===leagueMaxPF) b+=`<span style="font-size:9px;font-weight:700;color:#f97316;border:1px solid rgba(249,115,22,0.3);border-radius:3px;padding:1px 4px;margin-left:4px">PF</span>`;
    return b;
  }

  if(stTab==='final'){
    const rows=getFinalStandings();
    if(!rows.length) return '<div style="padding:20px;text-align:center;color:#475569">No playoff data</div>';
    let out='';
    rows.forEach(({team,rank})=>{
      const s=regRows.find(x=>x.team_name===team)||{};
      out+=`<div class="stand-row">
        <div class="sr-rank">${rank}</div>
        <div class="sr-team">${tLogoImg(team,'sr-tlogo')}<span class="sr-tname">${team}</span></div>
        <div class="sr-record">${s.wins??'—'}–${s.losses??'—'}</div>
        <div class="sr-pts">${s.points_for!=null?s.points_for.toFixed(1):'—'}</div>
      </div>`;
    });
    return out;
  }
  const rows=stTab==='regular'?regRows:regRows.filter(s=>DIVS[s.team_name]===stTab).map((s,i)=>({...s,rank:i+1}));
  const isDivView=stTab!=='regular';
  let out='';
  rows.forEach((s,i)=>{
    const rank=isDivView?i+1:s.rank;
    out+=`<div class="stand-row">
      <div class="sr-rank">${rank}</div>
      <div class="sr-team">${tLogoImg(s.team_name,'sr-tlogo')}<span class="sr-tname">${s.team_name}</span>${badges(s.team_name,rows,isDivView)}</div>
      <div class="sr-record">${s.wins}–${s.losses}</div>
      <div class="sr-pts">${(s.points_for||0).toFixed(1)}</div>
    </div>`;
  });
  return out||'<div style="padding:20px;text-align:center;color:#475569">No data</div>';
}
function reStand(){
  document.querySelectorAll('.stand-tab').forEach(t=>{
    const lbl=t.textContent.trim();
    t.classList.toggle('on',
      (stTab==='regular'&&lbl==='Regular Season')||
      (stTab==='final'&&lbl==='Final')||
      (stTab!=='regular'&&stTab!=='final'&&lbl===stTab)
    );
  });
  document.getElementById('stand-body').innerHTML=buildStandRows();
}

/* ── Activity Feed ── */
function renderFeed(){
  const recent=[...D.tx].sort((a,b)=>(b.week||0)-(a.week||0)||(b.timestamp||'').localeCompare(a.timestamp||'')).slice(0,30);
  const iMap={trade:'⇄',waiver:'📋',add_drop:'🔄',add:'✚',drop:'✖'};
  const iCls={trade:'fi-trade',waiver:'fi-waiver',add_drop:'fi-add',add:'fi-add',drop:'fi-drop'};
  const items=recent.map(tx=>{
    let detail='';
    if(tx.type==='trade'){
      detail=(tx.sides||[]).map(s=>`<strong style="color:#c4b5fd">${s.team}</strong> gets ${(s.receives||[]).map(p=>`<span class="pill p-trade">${p.pos} ${p.name}</span>`).join(' ')}`).join(' &nbsp;·&nbsp; ');
    } else {
      const adds=(tx.adds||[]).map(p=>{
        const nfl=NFL_LOGO(p.nfl_team||'');
        return`<span class="pill ${tx.type==='waiver'?'p-waiver':'p-add'}"><img src="${nfl}" class="nfl-logo" onerror="this.style.display='none'"> +${p.pos} ${p.name}</span>`;
      }).join('');
      const drops=(tx.drops||[]).map(p=>{
        const nfl=p.nfl_team?NFL_LOGO(p.nfl_team):'';
        return`<span class="pill p-drop">${nfl?`<img src="${nfl}" class="nfl-logo" onerror="this.style.display='none'"> `:''}−${p.pos} ${p.name}</span>`;
      }).join('');
      detail=[adds,drops].filter(Boolean).join(' ');
    }
    const teamLine=tx.type==='trade'
      ?`<span class="fi-tname">Trade</span>`
      :`${tLogoImg(tx.team,'fi-tlogo')}<span class="fi-tname">${tx.team}</span>`;
    return`<div class="feed-item">
      <div class="fi-icon ${iCls[tx.type]||'fi-add'}">${iMap[tx.type]||'🔄'}</div>
      <div class="fi-body">
        <div class="fi-team">${teamLine}</div>
        <div class="fi-detail">${detail}</div>
        <div class="fi-ts">Week ${tx.week}${tx.timestamp?' &nbsp;·&nbsp; '+tx.timestamp:''}</div>
      </div>
    </div>`;
  }).join('');
  return`<div class="panel">
    <div class="panel-hdr"><span class="ph-title">League Activity</span><span class="ph-badge">${D.tx.length} moves</span></div>
    <div class="feed-wrap">${items||'<div style="padding:20px;text-align:center;color:#64748b">No activity</div>'}</div>
  </div>`;
}

/* ── Player News ── */
function renderNews(){
  const cards=[];
  Object.entries(D.news).forEach(([teamName,players])=>{
    (players||[]).forEach(p=>{
      const arts=p.articles||[];
      if(!arts.length||!arts[0].headline) return;
      cards.push({...arts[0],playerName:p.name,pos:p.position,nflTeam:p.nfl_team,photoUrl:p.photo_url||'',fantasyTeam:teamName});
    });
  });
  if(!cards.length) return '';
  cards.sort(()=>Math.random()-.5);
  const html=cards.slice(0,12).map(c=>{
    const pc=c.pos||'';
    const nflSrc=NFL_LOGO(c.nflTeam||'');
    const photo=c.photoUrl?`<img src="${c.photoUrl}" class="nc-photo" alt="" onerror="this.style.display='none';">`:`<div class="nc-photo" style="display:flex;align-items:center;justify-content:center;font-size:16px">🏈</div>`;
    return`<div class="news-card">
      <div class="nc-header">
        ${photo}
        <img src="${nflSrc}" class="nc-nfl" alt="${c.nflTeam||''}" onerror="this.style.display='none'">
        <div class="nc-info">
          <div class="nc-name">${c.playerName}</div>
          <div class="nc-meta">
            <span class="nc-pos pos-${pc} bg-${pc}">${pc}</span>
            <span class="nc-team">${c.nflTeam||''}</span>
          </div>
        </div>
        <div class="nc-fantasy">${c.fantasyTeam}</div>
      </div>
      <div class="nc-headline">${c.headline}</div>
      ${c.story?`<div class="nc-body">${c.story}</div>`:''}
      <div class="nc-date">${c.date||''}</div>
    </div>`;
  }).join('');
  return`<div class="news-section">
    <div class="section-ttl">Player News</div>
    <div class="section-sub">Latest updates for players on 2025 rosters — <a onclick="location.reload()" href="#">Shuffle ↻</a></div>
    <div class="news-grid">${html}</div>
  </div>`;
}

function renderBracket(){
  const pg=(D.playoffGames||[]).filter(g=>g.season===SEASON);
  if(!pg.length) return '';
  const wG=pg.filter(g=>g.bracket==='playoff');
  const cG=pg.filter(g=>g.bracket==='consolation');
  if(!wG.length) return '';
  const maxWR=Math.max(...wG.map(g=>g.round));
  // R1 playoff losers
  const r1L=new Set(wG.filter(g=>g.round===1).map(g=>g.winner===g.team1?g.team2:g.team1));
  // Build losers bracket from matchups where both teams are R1 playoff losers
  const allWks=[...new Set(D.matchups.filter(m=>m.matchup_type==='playoff').map(m=>m.week))].sort((a,b)=>a-b);
  const lbRounds=[];
  let lbR1W=new Set();
  for(const wk of allWks){
    if(lbRounds.length>=maxWR-1) break;
    const gms=D.matchups.filter(m=>m.week===wk&&r1L.has(m.team1_name)&&r1L.has(m.team2_name));
    if(!gms.length) continue;
    const mapped=gms.map(g=>({team1:g.team1_name,s1:g.team1_score,team2:g.team2_name,s2:g.team2_score,winner:g.team1_score>g.team2_score?g.team1_name:g.team2_name}));
    if(!lbRounds.length) mapped.forEach(g=>lbR1W.add(g.winner));
    lbRounds.push(mapped);
  }
  if(lbRounds.length>1) lbRounds[lbRounds.length-1].sort((a,b)=>(lbR1W.has(b.team1)&&lbR1W.has(b.team2)?1:0)-(lbR1W.has(a.team1)&&lbR1W.has(a.team2)?1:0));
  const maxCR=cG.length?Math.max(...cG.map(g=>g.round)):0;

  function pStyle(n){
    if(n===12) return 'background:rgba(250,204,21,.15);color:#facc15;border:1px solid rgba(250,204,21,.25)';
    if(n===11) return 'background:rgba(148,163,184,.12);color:#94a3b8;border:1px solid rgba(148,163,184,.2)';
    if(n===10) return 'background:rgba(180,130,10,.15);color:#d97706;border:1px solid rgba(180,130,10,.25)';
    if(n>=9)   return 'background:rgba(100,116,139,.1);color:#64748b;border:1px solid rgba(100,116,139,.15)';
    if(n>=5)   return 'background:rgba(96,165,250,.1);color:#60a5fa;border:1px solid rgba(96,165,250,.15)';
    if(n===1)  return 'background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.15)';
    return 'background:rgba(100,116,139,.08);color:#64748b;border:1px solid rgba(100,116,139,.12)';
  }
  function gc(g,wp,lp){
    const t1=g.team1||g.team1_name,t2=g.team2||g.team2_name;
    const s1=g.score1??g.s1,s2=g.score2??g.s2;
    const w=g.winner; const isT1W=w===t1;
    function row(nm,sc,isW,pk){
      const src=tLogo(nm);
      const logo=src?`<img src="${src}" class="bk-logo" alt="" onerror="this.style.display='none'">`:`<div class="bk-logo" style="display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:#10b981">${(nm||'?')[0]}</div>`;
      return`<div class="bk-team ${isW?'bk-w':'bk-l'}">${logo}<span class="bk-name" title="${nm}">${nm}</span><span class="bk-score">${sc!=null?sc.toFixed(1):''}</span>${pk!=null?`<span class="bk-pick" style="${pStyle(pk)}">P${pk}</span>`:''}</div>`;
    }
    return`<div class="bk-game">${row(t1,s1,isT1W,isT1W?wp:lp)}${row(t2,s2,!isT1W,!isT1W?wp:lp)}</div>`;
  }
  function wRnd(r){
    const gms=[...wG.filter(g=>g.round===r)].sort((a,b)=>(b.round_name.toLowerCase().includes('champ')?1:0)-(a.round_name.toLowerCase().includes('champ')?1:0));
    const last=r===maxWR;
    const lbl=r===1?'Quarterfinals':r===maxWR?'Finals':'Semifinals';
    return`<div class="bk-round"><div class="bk-rlabel">${lbl}</div><div class="bk-games">${gms.map(g=>{
      let wp=null,lp=null;
      if(last){const n=g.round_name.toLowerCase();if(n.includes('champ')){wp=12;lp=11;}else{wp=10;lp=9;}}
      return(last?`<div class="bk-game-lbl">${g.round_name}</div>`:'')+gc(g,wp,lp);
    }).join('')}</div></div>`;
  }
  function lbRnd(idx){
    const gms=lbRounds[idx]; if(!gms) return '';
    const last=idx===lbRounds.length-1;
    const lbl=`Round ${idx+1}`;
    return`<div class="bk-round"><div class="bk-rlabel">${lbl}</div><div class="bk-games">${gms.map(g=>{
      let wp=null,lp=null;
      if(last){const f=lbR1W.has(g.team1)&&lbR1W.has(g.team2);wp=f?5:7;lp=f?6:8;}
      return(last?`<div class="bk-game-lbl">${wp===5?'Picks 5/6':'Picks 7/8'}</div>`:'')+gc(g,wp,lp);
    }).join('')}</div></div>`;
  }
  function cRnd(r){
    const gms=cG.filter(g=>g.round===r); const last=r===maxCR;
    const lbl=`Round ${r}`;
    return`<div class="bk-round"><div class="bk-rlabel">${lbl}</div><div class="bk-games">${gms.map(g=>{
      let wp=null,lp=null;
      if(last){const n=g.round_name.toLowerCase();if(n.includes('booty')){wp=4;lp=3;}else{wp=2;lp=1;}}
      return(last?`<div class="bk-game-lbl">${g.round_name}</div>`:'')+gc(g,wp,lp);
    }).join('')}</div></div>`;
  }
  const wHtml=Array.from({length:maxWR},(_,i)=>wRnd(i+1)).join('');
  const lbHtml=lbRounds.map((_,i)=>lbRnd(i)).join('');
  const cHtml=Array.from({length:maxCR},(_,i)=>cRnd(i+1)).join('');
  return`<div class="bk-section">
    <div class="panel">
      <div class="panel-hdr">
        <span class="ph-title">2025 Playoff Bracket</span>
        <span class="ph-badge">Draft Pick Order</span>
      </div>
      <div class="bk-wrap">
        <div class="bk-sub" style="flex:${maxWR}">
          <div class="bk-sub-title">Winners Bracket</div>
          <div class="bk-sub-sub">Picks 9–12 &nbsp;·&nbsp; Champion picks last</div>
          <div class="bk-rounds">${wHtml}</div>
        </div>
        ${lbRounds.length?`<div class="bk-sub" style="flex:${lbRounds.length}">
          <div class="bk-sub-title">Picks 5–8</div>
          <div class="bk-sub-sub">First-Round Playoff Losers</div>
          <div class="bk-rounds">${lbHtml}</div>
        </div>`:''}
        ${cHtml?`<div class="bk-sub" style="flex:${maxCR}">
          <div class="bk-sub-title">Booty Bowl</div>
          <div class="bk-sub-sub">Picks 1–4 &nbsp;·&nbsp; Champ picks first</div>
          <div class="bk-rounds">${cHtml}</div>
        </div>`:''}
      </div>
    </div>
  </div>`;
}
