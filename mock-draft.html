<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#10b981">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SBT Fantasy">
  <link rel="apple-touch-icon" href="sbt-logo.png">
<title>Mock Draft — SBT Fantasy Football</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="leftnav.css">
<script src="data/player_stats_2025.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;background:#0b1120;color:#e2e8f0;font-family:'DM Sans','Segoe UI',sans-serif;min-height:100vh}
#shell{display:flex;flex:1;min-height:100vh}
#app{display:block;flex:unset}
#main{flex:1;min-width:0;overflow-y:auto}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0f172a}::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px}
a{color:#10b981;text-decoration:none}
.header{background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);border-bottom:1px solid rgba(16,185,129,0.15);padding:20px 24px}
.header-inner{max-width:1300px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px}
.header-left{display:flex;align-items:center;gap:14px}
.page-title{font-size:26px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:3px;background:linear-gradient(135deg,#10b981,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.page-sub{font-size:11px;color:#94a3b8;letter-spacing:1px}
.back-btn{padding:8px 16px;border-radius:8px;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);color:#10b981;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;white-space:nowrap}
.page{max-width:1300px;margin:0 auto;padding:24px}
.sec-title{font-size:22px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;color:#e2e8f0;margin-bottom:16px}
.sec-title em{color:#10b981;font-style:normal}
.panel{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:22px}
.panel-title{font-size:14px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;color:#10b981;margin-bottom:16px}
.field{margin-bottom:18px}
.field-label{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px}
select.sel,input.inp{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:9px;color:#e2e8f0;font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 13px;width:100%;outline:none;transition:border-color .2s}
select.sel:focus,input.inp:focus{border-color:rgba(16,185,129,0.4)}
select.sel option{background:#1e293b}
.speed-row{display:flex;gap:6px}
.speed-btn{flex:1;padding:7px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#94a3b8;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;text-align:center}
.speed-btn.on{background:rgba(16,185,129,0.12);border-color:rgba(16,185,129,0.3);color:#10b981}
.info-box{background:rgba(16,185,129,0.05);border:1px solid rgba(16,185,129,0.12);border-radius:10px;padding:14px;font-size:12px;color:#94a3b8;line-height:1.7;margin-bottom:16px}
.info-box b{color:#e2e8f0}
.start-btn{width:100%;padding:15px;border-radius:12px;background:linear-gradient(135deg,#10b981,#059669);border:none;color:#fff;font-size:16px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:3px;cursor:pointer;transition:all .2s}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(16,185,129,0.35)}
.start-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
/* Keeper rows */
.keeper-section{display:flex;flex-direction:column;gap:0}
.keeper-row{display:grid;grid-template-columns:170px 1fr;gap:12px;align-items:start;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.keeper-row:last-child{border-bottom:none}
.keeper-team-name{font-size:13px;font-weight:700;color:#e2e8f0;padding-top:8px;word-break:break-word}
.keeper-you{font-size:10px;color:#10b981;font-weight:700;display:block}
.chips-wrap{display:flex;flex-wrap:wrap;gap:5px;min-height:30px;align-items:center;margin-bottom:6px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);color:#10b981}
.chip-x{background:none;border:none;color:#64748b;cursor:pointer;font-size:13px;line-height:1;padding:0 1px;font-weight:700}
.chip-x:hover{color:#ef4444}
.ki-wrap{position:relative;display:flex;gap:7px}
.ki-wrap input{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:7px;color:#e2e8f0;font-size:12px;padding:6px 11px;outline:none;font-family:'DM Sans',sans-serif}
.ki-wrap input:focus{border-color:rgba(16,185,129,0.35)}
.ki-add{padding:6px 11px;border-radius:7px;background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.25);color:#10b981;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.sugg-box{position:absolute;top:100%;left:0;right:40px;z-index:200;background:#1a2540;border:1px solid rgba(255,255,255,0.12);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,0.6);max-height:170px;overflow-y:auto;margin-top:3px;display:none}
.sugg-box.open{display:block}
.sugg-item{padding:7px 11px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:7px}
.sugg-item:hover{background:rgba(255,255,255,0.06)}
/* Draft screen */
.draft-bar{background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.14);border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.last-pick-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:8px 12px;min-width:180px}
.last-pick-empty{min-height:62px;display:flex;flex-direction:column;justify-content:center}
.d-round{font-size:30px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;color:#10b981}
.d-pick-info{font-size:12px;color:#64748b;margin-top:2px}
.d-clock-label{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;text-align:right}
.d-clock-team{font-size:12px;font-weight:800;color:#e2e8f0;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px}
.d-clock-team.my-turn{color:#10b981;animation:pgn 1.2s ease-in-out infinite}
@keyframes pgn{0%,100%{color:#10b981}50%{color:#4ade80}}
.draft-layout{display:grid;grid-template-columns:1fr 310px;gap:14px}
.search-inp{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:9px;color:#e2e8f0;font-size:13px;padding:9px 13px;outline:none;font-family:'DM Sans',sans-serif;margin-bottom:10px}
.search-inp:focus{border-color:rgba(16,185,129,0.35)}
.pos-btns{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.pos-btn{padding:5px 13px;border-radius:20px;border:1px solid rgba(255,255,255,0.09);background:transparent;color:#64748b;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.pos-btn.on{border-color:rgba(16,185,129,0.35);background:rgba(16,185,129,0.1);color:#10b981}
.plist{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:11px;overflow:hidden;max-height:calc(100vh - 300px);overflow-y:auto}
.plist-hdr{display:grid;grid-template-columns:34px 40px 1fr 46px 36px 70px 52px 68px;gap:6px;padding:8px 12px;font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:1px;font-weight:700;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(0,0,0,0.2)}
.pitem{display:grid;grid-template-columns:34px 40px 1fr 46px 36px 70px 52px 68px;gap:6px;align-items:center;padding:7px 12px;border-bottom:1px solid rgba(255,255,255,0.025);transition:background .12s}
.pitem:hover{background:rgba(255,255,255,0.025)}
.p-rank{font-size:12px;color:#475569;font-weight:700;text-align:center}
.p-photo{width:34px;height:34px;border-radius:50%;object-fit:cover;background:#1e293b;border:1px solid rgba(255,255,255,0.08);display:block}
.p-photo-ph{width:34px;height:34px;border-radius:50%;background:#1e293b;border:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:9px;color:#475569}
.p-name{font-size:12px;font-weight:700;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-team{font-size:10px;color:#475569;margin-top:1px}
.pos-badge{font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;text-align:center;white-space:nowrap}
.pos-QB{color:#f472b6;background:rgba(244,114,182,0.12)}
.pos-RB{color:#22d3ee;background:rgba(34,211,238,0.12)}
.pos-WR{color:#34d399;background:rgba(52,211,153,0.12)}
.pos-TE{color:#fb923c;background:rgba(251,146,60,0.12)}
.pos-K{color:#facc15;background:rgba(250,204,21,0.12)}
.pos-DST{color:#a78bfa;background:rgba(167,139,250,0.12)}
.p-pts{font-size:12px;font-weight:700;color:#94a3b8;text-align:right}
.draft-btn{padding:4px 11px;border-radius:6px;background:rgba(16,185,129,0.14);border:1px solid rgba(16,185,129,0.28);color:#10b981;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;white-space:nowrap}
.draft-btn:hover{background:rgba(16,185,129,0.25)}
.cpu-badge{padding:4px 10px;border-radius:6px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:#475569;font-size:10px;font-weight:600;text-align:center}
/* Roster sidebar */
.r-panel{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:11px;padding:14px;margin-bottom:12px}
.r-title{font-size:11px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:1.5px;color:#64748b;margin-bottom:10px}
.r-pick{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:11px}
.r-pick:last-child{border-bottom:none}
.r-rnd{color:#475569;font-size:10px;font-weight:700;width:20px;flex-shrink:0}
.r-empty{flex:1;text-align:center;color:#1e3a3a;font-size:10px;background:rgba(255,255,255,0.01);border:1px dashed rgba(255,255,255,0.04);border-radius:4px;padding:3px 6px}
.sched-item{display:flex;justify-content:space-between;padding:4px 8px;border-radius:5px;font-size:11px;background:rgba(255,255,255,0.02);margin-bottom:3px}
.sched-item.next{background:rgba(16,185,129,0.08);color:#10b981}
.sched-item.done{color:#475569}
.hist-panel{padding-bottom:8px}
.hist-scroll{max-height:280px;overflow-y:auto;margin-top:2px}
.hist-scroll::-webkit-scrollbar{width:4px}.hist-scroll::-webkit-scrollbar-track{background:transparent}.hist-scroll::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
.hist-round-hdr{font-size:9px;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:1px;padding:6px 0 3px;border-top:1px solid rgba(255,255,255,0.04);margin-top:2px}
.hist-round-hdr:first-child{border-top:none;margin-top:0}
.hist-row{display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.025)}
.hist-row:last-child{border-bottom:none}
.hist-pick{font-size:9px;color:#334155;font-weight:700;min-width:22px;flex-shrink:0}
/* Board */
.board-toggle{width:100%;padding:9px;border-radius:8px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);color:#64748b;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:7px}
.board-wrap{margin-top:10px;overflow-x:auto}
.board-tbl{border-collapse:collapse;font-size:10px;white-space:nowrap}
.board-tbl th{padding:5px 7px;background:#0d1526;color:#475569;font-weight:700;text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid rgba(255,255,255,0.07);min-width:80px;text-align:center}
.board-tbl th.rnd-th{min-width:36px;color:#94a3b8}
.bc{padding:4px 7px;border:1px solid rgba(255,255,255,0.03);text-align:center;vertical-align:middle;min-width:80px}
.bc.mine{background:rgba(16,185,129,0.06);border-color:rgba(16,185,129,0.12)}
.bc.cur{background:rgba(16,185,129,0.14);border-color:rgba(16,185,129,0.35);animation:blink .9s ease-in-out infinite}
@keyframes blink{0%,100%{background:rgba(16,185,129,0.1)}50%{background:rgba(16,185,129,0.22)}}
/* Results */
.grades-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;margin-bottom:28px}
.grade-card{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.06);border-radius:13px;padding:16px;position:relative;overflow:hidden}
.grade-card.mine{border-color:rgba(16,185,129,0.25);background:rgba(16,185,129,0.03)}
.g-letter{position:absolute;top:12px;right:14px;font-size:42px;font-weight:800;font-family:'Bebas Neue',sans-serif;line-height:1;opacity:.85}
.g-team{font-size:13px;font-weight:800;color:#e2e8f0;margin-bottom:3px;padding-right:52px}
.g-pts{font-size:11px;color:#64748b;margin-bottom:8px}
.g-best{font-size:11px;color:#94a3b8}
.g-best b{color:#e2e8f0}
.rosters-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.rc{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:12px;overflow:hidden}
.rc.mine{border-color:rgba(16,185,129,0.22)}
.rc-hdr{padding:11px 14px;background:rgba(255,255,255,0.025);border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between}
.rc-name{font-size:13px;font-weight:800;color:#e2e8f0}
.rc-pick{display:flex;align-items:center;gap:7px;padding:6px 14px;border-bottom:1px solid rgba(255,255,255,0.025);font-size:11px}
.rc-rnd{color:#475569;font-size:10px;font-weight:700;width:52px;flex-shrink:0}
.k-tag{font-size:9px;background:rgba(250,204,21,0.1);color:#facc15;border:1px solid rgba(250,204,21,0.18);border-radius:3px;padding:1px 4px;font-weight:700;margin-right:3px}
.res-btn{padding:9px 18px;border-radius:9px;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);color:#10b981;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
.res-btn:hover{background:rgba(16,185,129,0.16)}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,0.08);border-top-color:#10b981;border-radius:50%;animation:spin .65s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:60px;color:#64748b;font-size:14px}
.setup-grid{display:grid;grid-template-columns:280px 1fr;gap:20px;align-items:start}
@media(max-width:960px){
  .setup-grid{grid-template-columns:1fr}
  .draft-layout{grid-template-columns:1fr}
  .plist{max-height:50vh}
}
.team-logo{width:16px;height:16px;object-fit:contain;flex-shrink:0;vertical-align:middle}
.p-stat{font-size:11px;font-weight:700;color:#e2e8f0;text-align:right;line-height:1.3}
.p-stat-sub{font-size:10px;color:#475569;text-align:right}
.p-adp{font-size:11px;font-weight:700;color:#64748b;text-align:center}
@media(max-width:600px){
  .plist-hdr,.pitem{grid-template-columns:26px 1fr 44px 58px;gap:4px}
  .plist-hdr>:nth-child(2),.pitem>:nth-child(2){display:none}
  .plist-hdr>:nth-child(5),.pitem>:nth-child(5),.plist-hdr>:nth-child(6),.pitem>:nth-child(6),.plist-hdr>:nth-child(7),.pitem>:nth-child(7){display:none}
}
/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:1000;overflow-y:auto;padding:20px 16px;backdrop-filter:blur(6px)}
.modal-card{max-width:720px;margin:0 auto;background:#0d1526;border:1px solid rgba(255,255,255,0.1);border-radius:20px;overflow:hidden}
.modal-topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.02)}
.modal-close{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#94a3b8;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif}
.modal-close:hover{background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.3);color:#ef4444}
.modal-body{padding:20px}
.modal-header{display:flex;gap:20px;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap}
.modal-photo{width:96px;height:96px;border-radius:14px;object-fit:cover;background:rgba(255,255,255,0.05);flex-shrink:0;border:2px solid rgba(255,255,255,0.08)}
.modal-photo-ph{width:96px;height:96px;border-radius:14px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0;border:2px solid rgba(255,255,255,0.06)}
.modal-name{font-size:24px;font-weight:800;color:#f1f5f9;margin-bottom:5px}
.modal-team-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.modal-bio{font-size:12px;color:#64748b;display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.modal-bio span{display:flex;align-items:center;gap:4px}
.modal-stat-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:22px}
.modal-stat{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:10px 14px;text-align:center;flex:1;min-width:70px}
.modal-stat-val{font-size:18px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:1px}
.modal-stat-lbl{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.modal-section{margin-bottom:22px}
.modal-sec-title{font-size:12px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;color:#475569;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.05)}
.news-item{padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.news-item:last-child{border-bottom:none}
.news-title{font-size:13px;font-weight:700;color:#e2e8f0;text-decoration:none;line-height:1.45;display:block}
.news-title:hover{color:#10b981}
.news-date{font-size:10px;color:#475569;white-space:nowrap;flex-shrink:0;padding-top:2px}
.news-desc{font-size:11px;color:#64748b;margin-top:4px;line-height:1.55}
.news-src{font-size:10px;color:#334155;margin-top:5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.modal-table{width:100%;border-collapse:collapse;font-size:12px}
.modal-table th{padding:6px 8px;text-align:right;font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.8px;font-weight:700;border-bottom:1px solid rgba(255,255,255,0.07)}
.modal-table th:first-child,.modal-table td:first-child{text-align:left}
.modal-table td{padding:6px 8px;text-align:right;border-bottom:1px solid rgba(255,255,255,0.03);color:#94a3b8;vertical-align:middle}
.modal-table tr:hover td{background:rgba(255,255,255,0.02)}
.modal-table .pts-cell{font-weight:800;color:#e2e8f0}
.modal-table .best-week td{background:rgba(16,185,129,0.06)!important}
.pts-bar-wrap{display:flex;align-items:center;gap:6px}

<div id="shell">
<nav id="leftnav"></nav>
<div id="main">
<div id="ln-topbar">
  <button id="ln-mobile-btn" onclick="lnToggleMobile()">&#9776;</button>
  <span class="ln-topbar-title">Sigma Beta Tau Fantasy Football</span>
</div>
<div id="p-modal" style="display:none" class="modal-overlay" onclick="if(event.target===this)closePlayerModal()">
  <div class="modal-card">
    <div class="modal-topbar">
      <div id="p-modal-label" style="font-size:12px;color:#475569;font-weight:700;text-transform:uppercase;letter-spacing:1px"></div>
      <button class="modal-close" onclick="closePlayerModal()">✕</button>
    </div>

  </div>
</div>
<div class="header">
  <div class="header-inner">
    <div class="header-left">
      <img src="sbt-logo.png" alt="SBT" style="height:42px;width:auto">
      <div>
        <div class="page-title">MOCK DRAFT SIMULATOR</div>
        <div class="page-sub">SIGMA BETA TAU FANTASY FOOTBALL</div>
      </div>
    </div>
    <a href="index.html" class="back-btn">← Dashboard</a>
  </div>
</div>
<div class="page" id="app"><div class="loading"><span class="spinner"></span> Loading player data...</div></div>

<script>
/* ===== LEAGUE CONFIG ===== */
const LEAGUE = {
  name: "Sigma Beta Tau Fantasy Football",
  short: "SBT",
  accent: "#10b981",
  rounds: 16,
  nTeams: 12,
  starters: {QB:1,RB:1,WR:2,TE:1,FLEX:2,K:1,DST:1},
  flexPos: ['RB','WR','TE'],
  bench: 6,
  teamNames: ["skoot","Gotham Rogues","Big Fat Chubby","The MUFF Divers","Comeback Kid","Cooked To Perfection","Bear Exposures","Ceaser Salad Tossers","Smease Appeasers","Clitsburgh Feelers","Trump Train","Team Freesh"],
  franchiseLogos: {"Bear Exposures":"bearexposures-logo.jpg","Big Fat Chubby":"bigfatchubby-logo.jpg","Ceaser Salad Tossers":"ceaser-logo.jpg","Clitsburgh Feelers":"clitsburg-logo.jpg","Comeback Kid":"comebackkid-logo.jpg","Cooked To Perfection":"cookedtoperfection-logo.jpg","Gotham Rogues":"gotham-logo.gif","Smease Appeasers":"smease-logo.png","Team Freesh":"freesh-logo.jpg","The MUFF Divers":"muff-logo.png","Trump Train":"trumptrain-logo.jpg","skoot":"skoot-logo.jpg"},
  statsUrl: "data/player_stats_2025.json",
  metaUrl: "https://calves86.github.io/nfl-stats-data/player_meta.json",
};
const N = LEAGUE.nTeams;
const TOTAL = LEAGUE.rounds * N;

/* ===== STATE ===== */
let S = {
  screen: 'setup',
  loaded: false,
  players: [],
  meta: {},
  available: new Set(),
  draftSpot: 1,
  keepers: Array.from({length:N},()=>[]),
  rosters: Array.from({length:N},()=>[]),
  currentPick: 0,
  search: '',
  filterPos: 'ALL',
  showBoard: false,
  speed: 900,
  cpuTimer: null,
  autoPick: false,
  teamLogos: {},
  weeklyStats: {},
  teamOrder: [...LEAGUE.teamNames],
  queue: [],
  mainTab: 'players',
};
let CAREER_STATS = null; // null=not loaded, false=loading, object=loaded
let MODAL_PID = null;
let NEWS_CACHE = {};
let LOCAL_NEWS = null; // null=not loaded, {}=loaded (name.lower -> articles[])

/* ===== DATA ===== */
async function loadData() {
  // Load local stats from preloaded script tag (works with file:// protocol)
  const sd = window.PLAYER_STATS_DATA;
  if(sd){
    const raw = [];
    for (const [id,p] of Object.entries(sd)) {
      if (!['QB','RB','WR','TE','K','DST'].includes(p.position)) continue;
      const weeks = Object.values(p.stats||{});
      const pts = weeks.reduce((s,w)=>s+(w.fpts||0),0);
      const gp = weeks.filter(w=>w.fpts>0).length;
      const ppg = gp>0 ? Math.round(pts/gp*10)/10 : 0;
      S.weeklyStats[id] = p.stats || {};
      const byeWk=Object.entries(p.stats||{}).find(([,w])=>w.opp==='-');
      const bye=byeWk?+byeWk[0]:null;
      raw.push({id,name:p.name,pos:p.position,team:p.nfl_team||'',totalPts:Math.round(pts*10)/10,gp,ppg,bye});
    }
    S.players = computeVOR(raw);
    S.available = new Set(S.players.map(p=>p.id));
    S.loaded = true;
  }
  // Load remote meta (photos, NFL logos) — best-effort
  try {
    const mr = await fetch(LEAGUE.metaUrl);
    if(mr.ok){const md=await mr.json();if(md.team_logos)S.teamLogos=md.team_logos;const src=md.players&&typeof md.players==='object'?md.players:md;for(const [name,m] of Object.entries(src)){if(typeof m==='object'&&m&&m.photo_url)S.meta[name]=m;}}
  } catch(e){ /* photos/logos optional */ }
  render();
}

function computeVOR(players) {
  const rep = {QB:13,RB:36,WR:36,TE:13,K:13,DST:13};
  const byPos = {};
  for (const p of players) { (byPos[p.pos]||(byPos[p.pos]=[])).push(p); }
  for (const pos of Object.keys(byPos)) {
    byPos[pos].sort((a,b)=>b.totalPts-a.totalPts);
    const rv = byPos[pos][rep[pos]-1];
    const rp = rv?rv.totalPts:0;
    byPos[pos].forEach(p=>p.vor=p.totalPts-rp);
  }
  players.sort((a,b)=>b.vor-a.vor);
  players.forEach((p,i)=>p.rank=i+1);
  return players;
}

/* ===== DRAFT LOGIC ===== */
function pickToTeam(idx) {
  const r=Math.floor(idx/N), pos=idx%N;
  return r%2===0?pos:N-1-pos;
}
function fl(name,sz=20){
  const logo=LEAGUE.franchiseLogos[name];
  if(!logo)return'';
  return`<img src="team-logo/${logo}" onerror="this.style.display='none'" style="height:${sz}px;width:auto;max-width:${Math.round(sz*1.6)}px;object-fit:contain;border-radius:3px;flex-shrink:0">`;
}

/* ===== QUEUE DRAG-AND-DROP ===== */
let _qDragId=null;
function qDragStart(e,id){_qDragId=id;e.dataTransfer.effectAllowed='move';}
function qDragOver(e,id){e.preventDefault();const el=document.getElementById('qi-'+id);if(el&&_qDragId!==id)el.classList.add('drag-over');}
function qDragLeave(id){const el=document.getElementById('qi-'+id);if(el)el.classList.remove('drag-over');}
function qDrop(e,id){
  e.preventDefault();
  document.querySelectorAll('.q-item').forEach(el=>el.classList.remove('drag-over'));
  if(_qDragId&&_qDragId!==id){
    const from=S.queue.indexOf(_qDragId),to=S.queue.indexOf(id);
    if(from>=0&&to>=0){S.queue.splice(from,1);S.queue.splice(to,0,_qDragId);}
  }
  _qDragId=null;
  refreshQueuePanel();
}
function toggleQueue(pid){
  if(S.queue.includes(pid))S.queue=S.queue.filter(x=>x!==pid);
  else S.queue.push(pid);
  updatePlayerList();
  refreshQueuePanel();
}
function removeFromQueue(pid){
  S.queue=S.queue.filter(x=>x!==pid);
  refreshQueuePanel();
}
function refreshQueuePanel(){
  const sb=document.getElementById('sidebar');
  if(sb)sb.innerHTML=buildRosterSidebar(S.draftSpot-1)+buildDraftHistory()+buildQueue();
}

/* ===== DRAFT ORDER DRAG-AND-DROP ===== */
let _oDragIdx=null;
function orderDragStart(e,i){_oDragIdx=i;e.dataTransfer.effectAllowed='move';document.getElementById('oi-'+i).classList.add('dragging');}
function orderDragOver(e,i){e.preventDefault();const el=document.getElementById('oi-'+i);if(el&&_oDragIdx!==i)el.classList.add('drag-over');}
function orderDragLeave(i){const el=document.getElementById('oi-'+i);if(el)el.classList.remove('drag-over');}
function orderDrop(e,i){
  e.preventDefault();
  document.querySelectorAll('.order-item').forEach(el=>{el.classList.remove('drag-over');el.classList.remove('dragging');});
  if(_oDragIdx!==null&&_oDragIdx!==i){
    const myName=S.teamOrder[S.draftSpot-1];
    const moved=S.teamOrder.splice(_oDragIdx,1)[0];
    S.teamOrder.splice(i,0,moved);
    S.draftSpot=S.teamOrder.indexOf(myName)+1;
    _oDragIdx=null;
    render();
  } else {_oDragIdx=null;}
}
function orderDragEnd(i){document.querySelectorAll('.order-item').forEach(el=>{el.classList.remove('dragging');el.classList.remove('drag-over');});}
function myPicks() {
  const me=S.draftSpot-1,picks=[];
  for(let i=0;i<TOTAL;i++) if(pickToTeam(i)===me) picks.push(i);
  return picks;
}
function done(){ return S.currentPick>=TOTAL; }

function draftPlayer(player) {
  const ti=pickToTeam(S.currentPick);
  const rnd=Math.floor(S.currentPick/N)+1;
  S.rosters[ti].push({...player,round:rnd,pick:S.currentPick+1,isKeeper:false});
  S.available.delete(player.id);
  S.queue=S.queue.filter(id=>id!==player.id);
  S.currentPick++;
}

function cpuPick(ti) {
  const rnd=Math.floor(S.currentPick/N)+1;
  const all=[...S.keepers[ti],...S.rosters[ti]];
  const filled={};
  for(const p of all) filled[p.pos]=(filled[p.pos]||0)+1;
  const st=LEAGUE.starters;
  const needs={};
  for(const pos of ['QB','RB','WR','TE','K','DST']) {
    const need=Math.max(0,(st[pos]||0)-(filled[pos]||0));
    if(rnd<=10&&pos==='K'){needs[pos]=0.05;continue;}
    if(rnd<=10&&pos==='DST'){needs[pos]=0.07;continue;}
    if(rnd<=2&&pos==='QB'){needs[pos]=0.55;continue;}
    needs[pos]=need>0?1.18+need*0.08:0.82;
  }
  // FLEX bonus
  const flexFilled=LEAGUE.flexPos.reduce((s,p)=>s+(filled[p]||0),0);
  const flexTarget=(st.FLEX||0)+(st.RB||0)+(st.WR||0)+(st.TE||0);
  if(flexFilled<flexTarget) LEAGUE.flexPos.forEach(p=>needs[p]=(needs[p]||1)*1.08);

  const avail=S.players.filter(p=>S.available.has(p.id));
  if(!avail.length) return null;
  const scored=avail.map(p=>({p,s:(p.vor+60)*(needs[p.pos]||1)*(0.80+Math.random()*0.40)}));
  scored.sort((a,b)=>b.s-a.s);
  return scored[0].p;
}

function scheduleNext() {
  clearTimer();
  S.cpuTimer=setTimeout(advanceCpu, S.speed);
}
function clearTimer(){ if(S.cpuTimer){clearTimeout(S.cpuTimer);S.cpuTimer=null;} }

function advanceCpu() {
  if(done()){S.screen='results';S.cpuTimer=null;render();return;}
  const ti=pickToTeam(S.currentPick);
  const me=S.draftSpot-1;
  if(ti===me&&!S.autoPick){clearTimer();updateDraftUI();return;}
  const p=cpuPick(ti);
  if(p) draftPlayer(p);
  scheduleNext();
  updateDraftUI();
}

function startDraft() {
  S.rosters=Array.from({length:N},()=>[]);
  S.available=new Set(S.players.map(p=>p.id));
  for(let i=0;i<N;i++) for(const k of S.keepers[i]) S.available.delete(k.id);
  S.currentPick=0;
  S.search='';S.filterPos='ALL';S.showBoard=false;
  S.screen='draft';
  render();
  const me=S.draftSpot-1;
  if(pickToTeam(0)!==me||S.autoPick) scheduleNext();
}

/* ===== GRADING ===== */
function starterPts(ti) {
  const roster=[...S.keepers[ti],...S.rosters[ti]];
  const st=LEAGUE.starters;
  const byPos={};
  for(const p of roster)(byPos[p.pos]||(byPos[p.pos]=[])).push(p.totalPts);
  for(const pos of Object.keys(byPos)) byPos[pos].sort((a,b)=>b-a);
  let pts=0;
  const used={};
  for(const pos of ['QB','K','DST']) {
    const slots=st[pos]||0,avail=byPos[pos]||[];
    for(let s=0;s<slots&&s<avail.length;s++) pts+=avail[s];
    used[pos]=Math.min(slots,avail.length);
  }
  for(const pos of ['RB','WR','TE']) {
    const slots=st[pos]||0,avail=byPos[pos]||[];
    let u=0;
    for(let s=0;s<slots&&s<avail.length;s++){pts+=avail[s];u++;}
    used[pos]=u;
  }
  const flexSlots=st.FLEX||0;
  const fc=[];
  for(const pos of LEAGUE.flexPos){
    const avail=byPos[pos]||[];
    for(let i=used[pos]||0;i<avail.length;i++) fc.push(avail[i]);
  }
  fc.sort((a,b)=>b-a);
  for(let s=0;s<flexSlots&&s<fc.length;s++) pts+=fc[s];
  return Math.round(pts*10)/10;
}

function grade(ti) {
  const allPts=Array.from({length:N},(_,i)=>starterPts(i));
  const avg=allPts.reduce((a,b)=>a+b,0)/N;
  const pct=avg>0?(allPts[ti]-avg)/avg:0;
  if(pct>=0.14) return 'A+';
  if(pct>=0.08) return 'A';
  if(pct>=0.03) return 'B+';
  if(pct>=-0.03) return 'B';
  if(pct>=-0.08) return 'C+';
  if(pct>=-0.14) return 'C';
  if(pct>=-0.22) return 'D';
  return 'F';
}
const GRADE_COLOR={'A+':'#10b981','A':'#34d399','B+':'#22d3ee','B':'#3b82f6','C+':'#fb923c','C':'#f59e0b','D':'#f87171','F':'#ef4444'};

/* ===== KEEPER UI (partial DOM updates) ===== */
function addKeeperById(ti, pid) {
  const player=S.players.find(p=>p.id===pid);
  if(!player) return;
  if(S.keepers.some(ks=>ks.some(k=>k.id===pid))) return;
  S.keepers[ti].push(player);
  const inp=document.getElementById('ki-'+ti);
  if(inp) inp.value='';
  const sugg=document.getElementById('sg-'+ti);
  if(sugg){sugg.innerHTML='';sugg.classList.remove('open');}
  refreshChips(ti);
}

function removeKeeperById(ti, pid) {
  S.keepers[ti]=S.keepers[ti].filter(k=>k.id!==pid);
  refreshChips(ti);
}

function refreshChips(ti) {
  const el=document.getElementById('chips-'+ti);
  if(!el) return;
  el.innerHTML=S.keepers[ti].map(k=>`
    <span class="chip">
      <span class="pos-badge pos-${k.pos}" style="font-size:9px;padding:1px 5px">${k.pos}</span>
      ${k.name}
      <button class="chip-x" onclick="removeKeeperById(${ti},'${k.id}')">×</button>
    </span>`).join('');
}

function onKeeperInput(ti,val) {
  const sugg=document.getElementById('sg-'+ti);
  if(!sugg) return;
  if(val.length<2){sugg.innerHTML='';sugg.classList.remove('open');return;}
  const taken=new Set(S.keepers.flat().map(k=>k.id));
  const matches=S.players.filter(p=>!taken.has(p.id)&&p.name.toLowerCase().includes(val.toLowerCase())).slice(0,7);
  if(!matches.length){sugg.innerHTML='';sugg.classList.remove('open');return;}
  sugg.innerHTML=matches.map(p=>`
    <div class="sugg-item" onclick="addKeeperById(${ti},'${p.id}')">
      <span class="pos-badge pos-${p.pos}" style="font-size:9px;padding:1px 5px">${p.pos}</span>
      <span>${p.name}</span>
      <span style="color:#475569;margin-left:auto;font-size:10px">${p.team}</span>
    </div>`).join('');
  sugg.classList.add('open');
}

function addKeeperFromInput(ti) {
  const inp=document.getElementById('ki-'+ti);
  if(!inp) return;
  const val=inp.value.trim();
  if(!val) return;
  const taken=new Set(S.keepers.flat().map(k=>k.id));
  const match=S.players.find(p=>!taken.has(p.id)&&p.name.toLowerCase()===val.toLowerCase());
  if(match) addKeeperById(ti,match.id);
}

/* ===== RENDER ===== */
function render() {
  const app=document.getElementById('app');
  if(!S.loaded){app.innerHTML=`<div class="loading"><span class="spinner"></span> Loading player data...</div>`;return;}
  if(S.screen==='setup') app.innerHTML=renderSetup();
  else if(S.screen==='draft') app.innerHTML=renderDraft();
  else app.innerHTML=renderResults();
}

/* ===== SETUP ===== */
function renderSetup() {
  const posOpts=S.teamOrder.map((name,i)=>`<option value="${i+1}" ${S.draftSpot===i+1?'selected':''}>${i+1} — ${name}</option>`).join('');
  const keeperRows=S.teamOrder.map((name,i)=>{
    const isMe=i===S.draftSpot-1;
    const chips=S.keepers[i].map(k=>`
      <span class="chip">
        <span class="pos-badge pos-${k.pos}" style="font-size:9px;padding:1px 5px">${k.pos}</span>
        ${k.name}
        <button class="chip-x" onclick="removeKeeperById(${i},'${k.id}')">×</button>
      </span>`).join('');
    return `
      <div class="keeper-row">
        <div class="keeper-team-name" style="display:flex;align-items:center;gap:7px">${fl(name,22)}${name}${isMe?`<span class="keeper-you">★ YOU</span>`:''}</div>
        <div>
          <div class="chips-wrap" id="chips-${i}">${chips}</div>
          <div class="ki-wrap">
            <div style="position:relative;flex:1">
              <input id="ki-${i}" type="text" placeholder="Type player name..." style="width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:7px;color:#e2e8f0;font-size:12px;padding:6px 11px;outline:none;font-family:'DM Sans',sans-serif"
                oninput="onKeeperInput(${i},this.value)"
                onkeydown="if(event.key==='Enter'){addKeeperFromInput(${i})}">
              <div id="sg-${i}" class="sugg-box"></div>
            </div>
            <button class="ki-add" onclick="addKeeperFromInput(${i})">Add</button>
          </div>
        </div>
      </div>`;
  }).join('');

  const orderRows=S.teamOrder.map((name,i)=>{
    const isMe=i===S.draftSpot-1;
    return `<div class="order-item ${isMe?'is-mine':''}" id="oi-${i}" draggable="true"
      ondragstart="orderDragStart(event,${i})" ondragover="orderDragOver(event,${i})"
      ondragleave="orderDragLeave(${i})" ondrop="orderDrop(event,${i})" ondragend="orderDragEnd(${i})">
      <span class="order-drag-handle">⋮⋮</span>
      <span class="order-slot" style="color:${isMe?'#10b981':'#475569'}">${i+1}</span>
      ${fl(name,22)}
      <span style="font-size:12px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:${isMe?'#10b981':'#e2e8f0'}">${name}</span>
      ${isMe?`<span style="font-size:9px;font-weight:700;color:#10b981;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);border-radius:4px;padding:2px 6px">YOU</span>`:''}
    </div>`;
  }).join('');

  return `
    <div class="sec-title">MOCK DRAFT <em>SETUP</em></div>
    <div class="setup-grid">
      <div>
        <div class="panel">
          <div class="panel-title">Settings</div>
          <div class="field">
            <div class="field-label">Your Team</div>
            <select class="sel" onchange="S.draftSpot=+this.value;render()">${posOpts}</select>
          </div>
          <div class="field">
            <div class="field-label">CPU Pick Speed</div>
            <div class="speed-row">
              ${[['⚡ Fast',400],['▶ Normal',900],['🐢 Slow',1800]].map(([l,ms])=>`<button class="speed-btn ${S.speed===ms?'on':''}" onclick="S.speed=${ms};document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('on'));this.classList.add('on')">${l}</button>`).join('')}
            </div>
          </div>
          <div class="info-box">
            <b>Starters:</b> QB · RB · WR · WR · TE · FLEX · FLEX · K · DST<br>
            <b>Bench:</b> 7 &nbsp;·&nbsp; <b>Rounds:</b> 16 &nbsp;·&nbsp; <b>Teams:</b> 12<br>
            <b>Format:</b> PPR Snake Draft
          </div>
          <button class="start-btn" onclick="startDraft()">START DRAFT</button>
        </div>
        <div class="panel" style="margin-top:14px">
          <div class="panel-title">Draft Order <span style="font-weight:400;font-family:'DM Sans',sans-serif;font-size:11px;color:#475569;text-transform:none;letter-spacing:0">— drag to reorder</span></div>
          <div class="order-list">${orderRows}</div>
        </div>

      <div>
        <div class="panel">
          <div class="panel-title">Keeper Setup <span style="font-weight:400;font-family:'DM Sans',sans-serif;font-size:11px;color:#475569;text-transform:none;letter-spacing:0">— keepers removed from pool, no pick penalty</span></div>
          <div class="keeper-section">${keeperRows}</div>
        </div>
      </div>
    </div>`;
}

/* ===== DRAFT ===== */
function renderDraft() {
  const me=S.draftSpot-1;
  const ti=done()?-1:pickToTeam(S.currentPick);
  const rnd=Math.floor(S.currentPick/N)+1;
  const pickInRnd=S.currentPick%N+1;
  const isMyTurn=!done()&&ti===me&&!S.autoPick;
  const complete=done();

  return `
    <div id="draft-bar" class="draft-bar">
      <div>
        <div class="d-round">Round ${Math.min(rnd,LEAGUE.rounds)} <span style="color:#475569;font-size:18px">/ ${LEAGUE.rounds}</span></div>
        <div class="d-pick-info">Pick ${Math.min(S.currentPick+1,TOTAL)} overall &nbsp;·&nbsp; ${complete?'Draft complete':'Pick '+pickInRnd+' of '+N}</div>
      </div>
      <div id="last-pick-wrap">${buildLastPick()}</div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <div style="display:flex;gap:5px;align-items:center">
          <span style="font-size:11px;color:#475569">Speed:</span>
          ${[['⚡',400],['▶',900],['🐢',1800]].map(([ic,ms])=>`<button class="speed-btn ${S.speed===ms?'on':''}" style="flex:none;padding:5px 9px" onclick="S.speed=${ms};document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('on'));this.classList.add('on')">${ic}</button>`).join('')}
          <button class="speed-btn ${S.autoPick?'on':''}" style="flex:none;padding:5px 10px" onclick="toggleAuto()">${S.autoPick?'🤖 Auto':'👤 Me'}</button>
        </div>
        <div class="d-clock-label">${complete?'DRAFT COMPLETE':(isMyTurn?'⭐ YOUR PICK':'ON THE CLOCK')}</div>
        <div class="d-clock-team ${isMyTurn?'my-turn':''}">${complete?'':`${fl(S.teamOrder[ti],44)}<span>${S.teamOrder[ti]}</span>`}</div>
      </div>
    </div>
    <div class="draft-layout">
      <div>
        <div class="main-tabs">
          <button class="main-tab ${S.mainTab==='players'?'on':''}" onclick="S.mainTab='players';updatePlayerList()">Players</button>
          <button class="main-tab ${S.mainTab==='board'?'on':''}" onclick="S.mainTab='board';document.getElementById('main-content').innerHTML=buildVisualBoard()">Draft Board</button>
        </div>
        <div id="main-content">
          ${S.mainTab==='players'?`<input id="search-inp" class="search-inp" type="text" placeholder="Search players..." value="${S.search.replace(/"/g,'&quot;')}" oninput="S.search=this.value;updatePlayerList()"><div class="pos-btns">${['ALL','QB','RB','WR','TE','K','DST'].map(pos=>`<button class="pos-btn ${S.filterPos===pos?'on':''}" onclick="S.filterPos='${pos}';updatePlayerList()">${pos}</button>`).join('')}</div><div id="plist-wrap">${buildPlayerList(isMyTurn)}</div>`:buildVisualBoard()}
        </div>
        ${complete?`<div style="text-align:center;margin-top:20px"><button class="start-btn" style="max-width:280px" onclick="S.screen='results';render()">VIEW RESULTS & GRADES →</button></div>`:''}
      </div>
      <div id="sidebar">
        ${buildRosterSidebar(me)}
        ${buildDraftHistory()}
        ${buildQueue()}
      </div>
    </div>`;
}

function buildPlayerList(isMyTurn) {
  const filtered=S.players.filter(p=>{
    if(!S.available.has(p.id)) return false;
    if(S.filterPos!=='ALL'&&p.pos!==S.filterPos) return false;
    if(S.search&&!p.name.toLowerCase().includes(S.search.toLowerCase())&&!p.team.toLowerCase().includes(S.search.toLowerCase())) return false;
    return true;
  }).slice(0,80);

  const rows=filtered.map(p=>{
    const m=S.meta[p.name];
    const img=m&&m.photo_url
      ?`<img src="${m.photo_url}" class="p-photo" alt="${p.name}" onerror="this.outerHTML='<div class=\\'p-photo-ph\\'>${p.pos}</div>'">`
      :`<div class="p-photo-ph">${p.pos}</div>`;
    const logoUrl=S.teamLogos[p.team]||'';
    const teamLine=p.team?`<div class="p-team" style="display:flex;align-items:center;gap:3px">${logoUrl?`<img src="${logoUrl}" class="team-logo" alt="${p.team}" onerror="this.style.display='none'">`:''} ${p.team}</div>`:'';
    const adpRound=Math.ceil(p.rank/N);
    const adpPick=((p.rank-1)%N)+1;
    const queued=S.queue.includes(p.id);
    const btn=isMyTurn
      ?`<button class="draft-btn" onclick="userDraft('${p.id}')">DRAFT</button>`
      :`<span class="cpu-badge">#${p.rank}</span>`;
    return `<div class="pitem" style="${queued?'background:rgba(250,204,21,0.04)':''}">
      <div class="p-rank">${p.rank}</div>
      <div onclick="showPlayerModal('${p.id}')" style="cursor:pointer" title="View ${p.name} stats">${img}</div>
      <div onclick="showPlayerModal('${p.id}')" style="cursor:pointer" title="View ${p.name} stats"><div class="p-name" style="color:#e2e8f0;transition:color .15s" onmouseover="this.style.color='#10b981'" onmouseout="this.style.color='#e2e8f0'">${p.name}</div>${teamLine}</div>
      <div><span class="pos-badge pos-${p.pos}">${p.pos}</span></div>
      <div style="font-size:11px;font-weight:700;color:#94a3b8;text-align:center">${p.bye||'—'}</div>
      <div><div class="p-stat">${p.totalPts}</div><div class="p-stat-sub">${p.ppg}/gm · ${p.gp}gp</div></div>
      <div class="p-adp">Rd ${adpRound}.${adpPick}</div>
      <div style="display:flex;align-items:center;gap:4px">
        <button class="star-btn ${queued?'on':''}" onclick="toggleQueue('${p.id}')" title="${queued?'Remove from queue':'Add to queue'}">★</button>
        ${btn}
      </div>
    </div>`;
  }).join('');

  return `<div class="plist">
    <div class="plist-hdr"><div>RK</div><div>—</div><div>PLAYER</div><div>POS</div><div>BYE</div><div>2025 PTS</div><div>ADP</div><div style="display:flex;align-items:center;gap:4px"><span style="font-size:10px">★</span>${isMyTurn?'PICK':'—'}</div></div>
    ${rows||'<div style="padding:20px;text-align:center;color:#475569;font-size:12px">No players found</div>'}
  </div>`;
}

function buildRosterSidebar(me) {
  const keepers=S.keepers[me];
  const picks=S.rosters[me];
  const kRows=keepers.map(k=>`<div class="r-pick">
    <div class="r-rnd">K</div>
    <span class="pos-badge pos-${k.pos}" style="font-size:9px;padding:1px 6px">${k.pos}</span>
    <span style="font-size:11px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${k.name}</span>
  </div>`).join('');
  const pRows=picks.map(p=>`<div class="r-pick">
    <div class="r-rnd">R${p.round}</div>
    <span class="pos-badge pos-${p.pos}" style="font-size:9px;padding:1px 6px">${p.pos}</span>
    <span style="font-size:11px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</span>
  </div>`).join('');
  const empty=Array.from({length:LEAGUE.rounds-picks.length},(_,i)=>`<div class="r-pick">
    <div class="r-rnd" style="color:#1e2d3d">R${picks.length+i+1}</div>
    <div class="r-empty">—</div>
  </div>`).join('');
  return `<div class="r-panel">
    <div class="r-title" style="display:flex;align-items:center;gap:6px">${fl(S.teamOrder[me],16)}YOUR ROSTER</div>
    ${kRows}${pRows}${empty}
  </div>`;
}

function buildLastPick() {
  if(S.currentPick===0) return `<div class="last-pick-card last-pick-empty"><div style="font-size:10px;color:#2d4060;text-transform:uppercase;letter-spacing:1px">Last Pick</div><div style="font-size:11px;color:#1e3a3a;margin-top:4px">—</div></div>`;
  const lastTi=pickToTeam(S.currentPick-1);
  const roster=S.rosters[lastTi];
  const p=roster[roster.length-1];
  if(!p) return '';
  const m=S.meta[p.name]||{};
  const photo=m.photo_url||'';
  const nflLogo=S.teamLogos[p.team]||'';
  const pc={QB:'#ef4444',RB:'#22c55e',WR:'#3b82f6',TE:'#f59e0b',K:'#8b5cf6',DST:'#06b6d4'}[p.pos]||'#64748b';
  const teamName=S.teamOrder[lastTi];
  return `<div class="last-pick-card">
    <div style="font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px">Last Pick · Rd ${p.round} #${p.pick}</div>
    <div style="display:flex;align-items:center;gap:8px">
      <div style="position:relative;flex-shrink:0">
        ${photo?`<img src="${photo}" style="width:46px;height:46px;border-radius:50%;object-fit:cover;border:2px solid ${pc}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:''}
        <div style="${photo?'display:none;':'display:flex;'}width:46px;height:46px;border-radius:50%;background:${pc}22;border:2px solid ${pc};align-items:center;justify-content:center;font-size:16px;font-weight:900;color:${pc}">${p.name[0]}</div>
        ${nflLogo?`<img src="${nflLogo}" style="position:absolute;bottom:-2px;right:-2px;width:18px;height:18px;border-radius:50%;object-fit:contain;background:#0f172a;border:1px solid rgba(255,255,255,0.1)" onerror="this.style.display='none'">`:``}
      </div>
      <div style="min-width:0">
        <div style="font-size:12px;font-weight:800;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px">${p.name}</div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:2px">
          <span style="font-size:9px;font-weight:800;color:${pc};background:${pc}22;padding:1px 5px;border-radius:3px">${p.pos}</span>
          ${fl(teamName,14)}
          <span style="font-size:9px;color:#475569;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px">${teamName}</span>
        </div>
      </div>
    </div>
  </div>`;
}

function buildDraftHistory() {
  if(S.currentPick===0) return '';
  // Gather all picks across all rosters, sorted by pick number
  const allPicks=[];
  S.rosters.forEach((roster,t)=>roster.forEach(p=>allPicks.push({...p,teamIdx:t})));
  allPicks.sort((a,b)=>a.pick-b.pick);
  if(!allPicks.length) return '';
  // Group by round
  const byRound={};
  allPicks.forEach(p=>{if(!byRound[p.round])byRound[p.round]=[];byRound[p.round].push(p);});
  const rounds=Object.keys(byRound).map(Number).sort((a,b)=>b-a); // newest round first
  const rows=rounds.map(rnd=>{
    const picks=byRound[rnd].slice().reverse(); // most recent pick first within round
    const pickRows=picks.map(p=>{
      const teamName=S.teamOrder[p.teamIdx];
      const nflLogo=S.teamLogos[p.team]||'';
      const pc={QB:'#ef4444',RB:'#22c55e',WR:'#3b82f6',TE:'#f59e0b',K:'#8b5cf6',DST:'#06b6d4'}[p.pos]||'#64748b';
      return `<div class="hist-row">
        <span class="hist-pick">#${p.pick}</span>
        <span class="pos-badge pos-${p.pos}" style="font-size:8px;padding:1px 4px">${p.pos}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:11px;font-weight:700;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div>
          <div style="display:flex;align-items:center;gap:3px;margin-top:1px">
            ${nflLogo?`<img src="${nflLogo}" style="height:11px;width:auto;max-width:13px;object-fit:contain" onerror="this.style.display='none'">`:``}
            ${fl(teamName,11)}
            <span style="font-size:9px;color:#475569;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${teamName}</span>
          </div>
        </div>
      </div>`;
    }).join('');
    return `<div class="hist-round-hdr">ROUND ${rnd}</div>${pickRows}`;
  }).join('');
  return `<div class="r-panel hist-panel"><div class="r-title">DRAFT HISTORY</div><div class="hist-scroll">${rows}</div></div>`;
}

function buildQueue() {
  const qAvail=S.queue.filter(id=>S.available.has(id));
  if(!qAvail.length) return `<div class="r-panel"><div class="r-title">★ QUEUE</div><div style="font-size:11px;color:#2d4060;text-align:center;padding:10px 0">Star players to add to queue</div></div>`;
  let html=`<div class="r-panel"><div class="r-title" style="display:flex;justify-content:space-between;align-items:center"><span>★ QUEUE</span><span style="font-size:10px;color:#475569;font-weight:400">${qAvail.length}</span></div>`;
  qAvail.forEach((id,idx)=>{
    const p=S.players.find(x=>x.id===id);if(!p)return;
    const m=S.meta[p.name];const photo=m&&m.photo_url?m.photo_url:'';
    html+=`<div class="q-item" id="qi-${id}" draggable="true" ondragstart="qDragStart(event,'${id}')" ondragover="qDragOver(event,'${id}')" ondragleave="qDragLeave('${id}')" ondrop="qDrop(event,'${id}')">`;
    html+=`<span class="q-drag">⋮⋮</span><span class="q-num">${idx+1}</span>`;
    if(photo)html+=`<img src="${photo}" style="width:24px;height:24px;border-radius:50%;object-fit:cover;flex-shrink:0" onerror="this.style.display='none'">`;
    html+=`<div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:700;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div><span class="pos-badge pos-${p.pos}" style="font-size:9px;padding:1px 5px">${p.pos}</span></div>`;
    html+=`<button class="q-remove" onclick="removeFromQueue('${id}')">×</button></div>`;
  });
  html+=`</div>`;
  return html;
}

function buildVisualBoard() {
  const me=S.draftSpot-1;
  const pc={QB:'#ef4444',RB:'#22c55e',WR:'#3b82f6',TE:'#f59e0b',K:'#8b5cf6',DST:'#06b6d4',FB:'#22c55e'};
  const pickGrid={};
  S.rosters.forEach((roster,t)=>roster.forEach(p=>{if(!pickGrid[p.round])pickGrid[p.round]={};pickGrid[p.round][t]=p;}));
  S.keepers.forEach((ks,t)=>ks.forEach((k,ki)=>{const r=ki+1;if(!pickGrid[r])pickGrid[r]={};if(!pickGrid[r][t])pickGrid[r][t]={...k,isKeeper:true,round:r};}));
  function abbrev(n){const p=n.trim().split(' ');return p.length>=2?p[0][0]+'. '+p.slice(1).join(' '):n;}
  let html='<div class="vboard-wrap"><table class="vboard-tbl"><thead><tr>';
  html+=`<td style="width:30px;min-width:30px;background:#0d1526;border:1px solid rgba(255,255,255,0.06)"></td>`;
  for(let t=0;t<N;t++){
    const name=S.teamOrder[t];const logo=fl(name,26);
    const disp=name.length>11?name.substring(0,10)+'…':name;
    html+=`<th class="vboard-th" ${t===me?'style="border-bottom:2px solid #10b981;color:#10b981"':''} title="${name}">`;
    html+=logo?`<div style="display:flex;flex-direction:column;align-items:center;gap:3px">${logo}<span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:82px;display:block">${disp}</span></div>`:disp;
    html+=`</th>`;
  }
  html+=`</tr></thead><tbody>`;
  for(let rd=1;rd<=LEAGUE.rounds;rd++){
    const bg=rd%2===0?'rgba(255,255,255,0.018)':'rgba(255,255,255,0.008)';
    html+=`<tr style="background:${bg}"><td class="vboard-rnd-td">R${rd}</td>`;
    for(let t=0;t<N;t++){
      const overallPick=(rd-1)*N+(rd%2===1?t:N-1-t);
      const isCur=overallPick===S.currentPick&&!done();
      const isMine=t===me;
      const isQueued=S.queue.some(id=>{const p=S.players.find(x=>x.id===id);return p&&!S.available.has(id)&&S.rosters[t].some(r=>r.id===id&&r.round===rd);});
      const pick=pickGrid[rd]&&pickGrid[rd][t];
      html+=`<td class="vboard-cell${isMine?' v-mine':''}${isCur?' v-cur':''}">`;
      if(pick){
        const pos=pick.pos||pick.position||'';const pcolor=pc[pos]||'#64748b';
        const m=S.meta[pick.name]||{};const photo=m.photo_url||'';
        const nflTeam=(m.nfl_team)||pick.team||'';const nflLogo=S.teamLogos[nflTeam]||'';
        html+=`<div style="display:flex;flex-direction:column;align-items:center;gap:2px;position:relative">`;
        html+=`<div style="position:absolute;top:0;left:0;font-size:7px;color:#334155;font-weight:700;line-height:1">#${overallPick+1}</div>`;
        if(pos==='DST'&&nflLogo){
          html+=`<div style="width:38px;height:38px;border-radius:50%;background:${pcolor}18;border:2px solid ${pcolor};display:flex;align-items:center;justify-content:center;margin-top:2px"><img src="${nflLogo}" style="width:26px;height:26px;object-fit:contain" onerror="this.style.display='none'"></div>`;
        } else if(photo){
          html+=`<img src="${photo}" style="width:38px;height:38px;border-radius:50%;object-fit:cover;border:2px solid ${pcolor};margin-top:2px" onerror="this.src='';this.style.display='none';this.nextElementSibling.style.display='flex'">`;
          html+=`<div style="display:none;width:38px;height:38px;border-radius:50%;background:${pcolor}22;border:2px solid ${pcolor};align-items:center;justify-content:center;font-size:13px;font-weight:900;color:${pcolor};margin-top:2px">${pick.name[0]}</div>`;
        } else {
          html+=`<div style="width:38px;height:38px;border-radius:50%;background:${pcolor}22;border:2px solid ${pcolor};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:${pcolor};margin-top:2px">${pick.name[0]}</div>`;
        }
        html+=`<div style="font-size:9px;font-weight:700;color:#e2e8f0;text-align:center;line-height:1.2;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px" title="${pick.name}">${abbrev(pick.name)}</div>`;
        if(pick.isKeeper){
          html+=`<div style="font-size:7px;background:rgba(250,204,21,0.15);color:#facc15;border-radius:3px;padding:1px 3px;font-weight:700">KEEP</div>`;
        } else {
          html+=`<div style="display:flex;align-items:center;gap:2px;margin-bottom:2px"><span style="font-size:8px;font-weight:800;color:${pcolor};background:${pcolor}25;padding:1px 4px;border-radius:3px;line-height:1.4">${pos||'—'}</span>`;
          if(nflLogo)html+=`<img src="${nflLogo}" style="height:11px;width:auto;max-width:13px;object-fit:contain" onerror="this.style.display='none'">`;
          html+=`</div>`;
        }
        html+=`</div>`;
      } else if(isCur){
        html+=`<div style="display:flex;align-items:center;justify-content:center;height:58px;font-size:20px">⏰</div>`;
      } else {
        html+=`<div style="font-size:8px;color:#1e3655;padding:4px;text-align:center;line-height:3.5">#${overallPick+1}</div>`;
      }
      html+=`</td>`;
    }
    html+=`</tr>`;
  }
  html+=`</tbody></table></div>`;
  return html;
}

function buildBoard() {
  const me=S.draftSpot-1;
  const hdr='<th class="rnd-th">RND</th>'+S.teamOrder.map((n,t)=>{const logo=fl(n,22);return`<th style="${t===me?'color:#10b981':''}" title="${n}">${logo?`<div style="display:flex;flex-direction:column;align-items:center;gap:2px">${logo}<span style="display:block">${n.replace(/ .*/,'')}</span></div>`:n.replace(/ .*/,'')}</th>`;}).join('');
  const rows=Array.from({length:LEAGUE.rounds},(_,r)=>{
    const cells=Array.from({length:N},(_,t)=>{
      const overallPick=r*N+(r%2===0?t:N-1-t);
      const isCur=overallPick===S.currentPick&&!done();
      const pick=S.rosters[t].find(p=>p.round===r+1);
      return `<td class="bc ${t===me?'mine':''} ${isCur?'cur':''}">${pick?`<div style="font-size:10px;font-weight:700;color:#e2e8f0;line-height:1.2">${pick.name.split(' ').pop()}</div><span class="pos-badge pos-${pick.pos}" style="font-size:8px;padding:1px 4px">${pick.pos}</span>`:(isCur?'⏰':'')}</td>`;
    }).join('');
    return `<tr><td class="bc rnd-th" style="background:#0d1526;color:#94a3b8;font-weight:700">${r+1}</td>${cells}</tr>`;
  }).join('');
  return `<div class="board-wrap"><table class="board-tbl"><thead><tr>${hdr}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* ===== PARTIAL UPDATES ===== */
function updatePlayerList() {
  if(S.mainTab==='board'){
    const mc=document.getElementById('main-content');
    if(mc) mc.innerHTML=buildVisualBoard();
    return;
  }
  const me=S.draftSpot-1;
  const ti=done()?-1:pickToTeam(S.currentPick);
  const isMyTurn=!done()&&ti===me&&!S.autoPick;
  // Ensure search/filter controls exist
  const mc=document.getElementById('main-content');
  if(mc&&!document.getElementById('plist-wrap')){
    mc.innerHTML=`<input id="search-inp" class="search-inp" type="text" placeholder="Search players..." value="${S.search.replace(/"/g,'&quot;')}" oninput="S.search=this.value;updatePlayerList()"><div class="pos-btns">${['ALL','QB','RB','WR','TE','K','DST'].map(pos=>`<button class="pos-btn ${S.filterPos===pos?'on':''}" onclick="S.filterPos='${pos}';updatePlayerList()">${pos}</button>`).join('')}</div><div id="plist-wrap">${buildPlayerList(isMyTurn)}</div>`;
    return;
  }
  const el=document.getElementById('plist-wrap');
  if(el) el.innerHTML=buildPlayerList(isMyTurn);
}

function updateBoard() {
  const btn=document.querySelector('.board-toggle');
  if(btn) btn.textContent=S.showBoard?'▲ Hide Draft Board':'▼ Show Draft Board';
  const el=document.getElementById('board-area');
  if(el) el.innerHTML=S.showBoard?buildBoard():'';
}

function updateDraftUI() {
  if(done()){S.screen='results';render();return;}
  const me=S.draftSpot-1;
  const ti=pickToTeam(S.currentPick);
  const isMyTurn=ti===me&&!S.autoPick;
  const rnd=Math.floor(S.currentPick/N)+1;
  const pickInRnd=S.currentPick%N+1;

  // Update bar
  const bar=document.getElementById('draft-bar');
  if(bar) {
    bar.querySelector('.d-round').innerHTML=`Round ${rnd} <span style="color:#475569;font-size:18px">/ ${LEAGUE.rounds}</span>`;
    bar.querySelector('.d-pick-info').textContent=`Pick ${S.currentPick+1} overall · Pick ${pickInRnd} of ${N}`;
    bar.querySelector('.d-clock-label').textContent=isMyTurn?'⭐ YOUR PICK':'ON THE CLOCK';
    const ct=bar.querySelector('.d-clock-team');
    ct.innerHTML=fl(S.teamOrder[ti],44)+`<span>${S.teamOrder[ti]}</span>`;
    ct.className='d-clock-team'+(isMyTurn?' my-turn':'');
    ct.style.cssText='';
    const lp=document.getElementById('last-pick-wrap');
    if(lp) lp.innerHTML=buildLastPick();
  }
  // Update sidebar
  const sb=document.getElementById('sidebar');
  if(sb) sb.innerHTML=buildRosterSidebar(me)+buildDraftHistory()+buildQueue();
  // Update main content area
  if(S.mainTab==='board'){
    const mc=document.getElementById('main-content');
    if(mc) mc.innerHTML=buildVisualBoard();
  } else {
    updatePlayerList();
  }
}

/* ===== RESULTS ===== */
function renderResults() {
  const allPts=Array.from({length:N},(_,i)=>starterPts(i));
  const ranking=Array.from({length:N},(_,i)=>({i,pts:allPts[i],g:grade(i)})).sort((a,b)=>b.pts-a.pts);
  const me=S.draftSpot-1;

  const gradeCards=ranking.map(({i,pts,g})=>{
    const all=[...S.keepers[i],...S.rosters[i]];
    const top=[...all].sort((a,b)=>b.totalPts-a.totalPts)[0];
    return `<div class="grade-card ${i===me?'mine':''}">
      <div class="g-letter" style="color:${GRADE_COLOR[g]||'#94a3b8'}">${g}</div>
      <div class="g-team" style="display:flex;align-items:center;justify-content:center;gap:6px">${fl(S.teamOrder[i],24)}${i===me?'⭐ ':''} ${S.teamOrder[i]}</div>
      <div class="g-pts">${pts} proj pts/wk</div>
      <div class="g-best">Top pick: <b>${top?top.name:'—'}</b></div>
    </div>`;
  }).join('');

  const rosterCards=S.teamOrder.map((name,i)=>{
    const all=[...S.keepers[i].map(k=>({...k,isKeeper:true})),...S.rosters[i]].sort((a,b)=>(a.round||0)-(b.round||0));
    const g=grade(i);
    return `<div class="rc ${i===me?'mine':''}">
      <div class="rc-hdr">
        <div class="rc-name" style="display:flex;align-items:center;gap:7px">${fl(name,26)}${i===me?'⭐ ':''}${name}</div>
        <span style="font-size:22px;font-weight:800;font-family:'Bebas Neue',sans-serif;color:${GRADE_COLOR[g]||'#94a3b8'}">${g}</span>
      </div>
      ${all.map(p=>`<div class="rc-pick">
        <span class="rc-rnd">${p.isKeeper?'🔑 Keep':`Rd ${p.round}`}</span>
        <span class="pos-badge pos-${p.pos}" style="font-size:9px;padding:1px 6px">${p.pos}</span>
        <span style="font-size:11px;font-weight:700;flex:1">${p.name}</span>
        <span style="font-size:10px;color:#475569">${p.totalPts}</span>
      </div>`).join('')}
    </div>`;
  }).join('');

  return `
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:20px">
      <div class="sec-title" style="margin:0">DRAFT <em>COMPLETE</em></div>
      <button class="res-btn" onclick="newDraft()">↺ New Mock Draft</button>
    </div>
    <div class="sec-title" style="font-size:18px;margin:0 0 12px">DRAFT <em>GRADES</em></div>
    <div class="grades-grid">${gradeCards}</div>
    <div class="sec-title" style="font-size:18px;margin:24px 0 12px">ALL <em>ROSTERS</em></div>
    <div class="rosters-grid">${rosterCards}</div>
    <div class="sec-title" style="font-size:18px;margin:24px 0 12px">DRAFT <em>BOARD</em></div>
    ${buildBoard()}`;
}

/* ===== ACTIONS ===== */
function userDraft(pid) {
  if(done()) return;
  const me=S.draftSpot-1;
  if(pickToTeam(S.currentPick)!==me) return;
  const p=S.players.find(x=>x.id===pid);
  if(!p||!S.available.has(pid)) return;
  draftPlayer(p);
  updateDraftUI();
  scheduleNext();
}

function toggleAuto() {
  S.autoPick=!S.autoPick;
  if(S.autoPick&&!S.cpuTimer&&!done()) scheduleNext();
  const btn=document.querySelector('[onclick="toggleAuto()"]');
  if(btn){btn.textContent=S.autoPick?'🤖 Auto':'👤 Me';btn.classList.toggle('on',S.autoPick);}
}

function newDraft() {
  clearTimer();
  S.screen='setup';
  S.rosters=Array.from({length:N},()=>[]);
  S.keepers=Array.from({length:N},()=>[]);
  S.currentPick=0;
  S.autoPick=false;
  S.queue=[];
  S.mainTab='players';
  S.teamOrder=[...LEAGUE.teamNames];
  render();
}

/* ===== PLAYER MODAL ===== */
async function loadCareerStats() {
  if (CAREER_STATS !== null) return;
  CAREER_STATS = false;
  try {
    const r = await fetch('https://calves86.github.io/nfl-stats-data/career_stats.json');
    CAREER_STATS = r.ok ? await r.json() : {};
  } catch(e) { CAREER_STATS = {}; }
  if (MODAL_PID) renderModalContent(MODAL_PID);
}

function showPlayerModal(id) {
  MODAL_PID = id;
  const modal = document.getElementById('p-modal');
  modal.style.display = 'block';
  document.body.style.overflow = 'hidden';
  const p = S.players.find(x => x.id === id);
  if (p) {
    const lbl = document.getElementById('p-modal-label');
    if (lbl) lbl.textContent = p.pos + ' · ' + (p.team||'');
  }
  renderModalContent(id);
  loadCareerStats();
  loadPlayerNews(id);
}

function closePlayerModal() {
  document.getElementById('p-modal').style.display = 'none';
  document.body.style.overflow = '';
  MODAL_PID = null;
}

function renderModalContent(id) {
  const el = document.getElementById('p-modal-body');
  if (!el) return;
  const player = S.players.find(p => p.id === id);
  if (!player) return;
  const m = S.meta[player.name] || {};
  const weekly = S.weeklyStats[id] || {};
  const career = (CAREER_STATS && CAREER_STATS[player.name]) || [];
  const logoUrl = S.teamLogos[player.team] || '';
  const posColor = {QB:'#f472b6',RB:'#22d3ee',WR:'#34d399',TE:'#fb923c',K:'#facc15',DST:'#a78bfa'}[player.pos]||'#94a3b8';
  const adpRound = Math.ceil(player.rank/N);
  const adpPick = ((player.rank-1)%N)+1;

  let html = '';

  // ── Header ──
  html += `<div class="modal-header">`;
  const photo = m.photo_url || '';
  if (photo) {
    html += `<img src="${photo}" class="modal-photo" alt="${player.name}" onerror="this.className='modal-photo-ph';this.innerHTML='🏈'">`;
  } else if (player.pos === 'DST' && logoUrl) {
    html += `<div class="modal-photo-ph"><img src="${logoUrl}" style="width:64px;height:64px;object-fit:contain"></div>`;
  } else {
    html += `<div class="modal-photo-ph">🏈</div>`;
  }
  html += `<div style="flex:1;min-width:180px">`;
  html += `<div class="modal-name">${player.name}</div>`;
  html += `<div class="modal-team-row">`;
  html += `<span class="pos-badge pos-${player.pos}" style="font-size:12px;padding:3px 10px">${player.pos}</span>`;
  if (logoUrl) html += `<img src="${logoUrl}" style="height:22px;width:auto;object-fit:contain" onerror="this.style.display='none'">`;
  if (player.team) html += `<span style="font-size:14px;color:#94a3b8;font-weight:700">${player.team}</span>`;
  html += `</div>`;
  // Bio
  const bio = [];
  if (m.height) { const h=parseInt(m.height); if(!isNaN(h)) bio.push(`${Math.floor(h/12)}'${h%12}"`); }
  if (m.weight) bio.push(`${m.weight} lbs`);
  if (m.age) bio.push(`Age ${m.age}`);
  if (m.college) bio.push(m.college);
  if (m.jersey_number) bio.push(`#${m.jersey_number}`);
  if (bio.length) html += `<div class="modal-bio">${bio.map(b=>`<span>${b}</span>`).join('<span style="color:#2d3f5a">·</span>')}</div>`;
  if (m.years_exp != null) {
    const exp = parseInt(m.years_exp);
    html += `<div style="font-size:11px;color:#475569">${exp === 0 ? 'Rookie' : exp + ' yr' + (exp===1?'':'s') + ' exp'}</div>`;
  }
  html += `</div></div>`;

  // ── Stat bar ──
  const careerTotal = career.reduce((s,r)=>s+(r.fpts||0),0);
  html += `<div class="modal-stat-bar">`;
  html += `<div class="modal-stat"><div class="modal-stat-val" style="color:${posColor}">${player.totalPts}</div><div class="modal-stat-lbl">2025 Pts</div></div>`;
  html += `<div class="modal-stat"><div class="modal-stat-val" style="color:#e2e8f0">${player.ppg}</div><div class="modal-stat-lbl">Pts/Game</div></div>`;
  html += `<div class="modal-stat"><div class="modal-stat-val" style="color:#94a3b8">${player.gp}</div><div class="modal-stat-lbl">GP</div></div>`;
  html += `<div class="modal-stat"><div class="modal-stat-val" style="color:#facc15">#${player.rank}</div><div class="modal-stat-lbl">VOR Rank</div></div>`;
  html += `<div class="modal-stat"><div class="modal-stat-val" style="color:#a78bfa">Rd ${adpRound}.${adpPick}</div><div class="modal-stat-lbl">ADP</div></div>`;
  if (careerTotal > 0) html += `<div class="modal-stat"><div class="modal-stat-val" style="color:#34d399">${Math.round(careerTotal)}</div><div class="modal-stat-lbl">Career Pts</div></div>`;
  html += `</div>`;

  // ── 2025 Weekly ──
  html += `<div class="modal-section">`;
  html += `<div class="modal-sec-title">2025 Season — Week by Week</div>`;
  const wkEntries = Object.entries(weekly).map(([wk,w])=>({wk:+wk,...w})).sort((a,b)=>a.wk-b.wk).filter(w=>w.opp);
  if (wkEntries.length) {
    const maxPts = Math.max(...wkEntries.map(w=>w.fpts||0));
    const bestWk = wkEntries.reduce((b,w)=>(w.fpts||0)>(b.fpts||0)?w:b, wkEntries[0]);
    html += `<table class="modal-table"><thead><tr>`;
    html += `<th>WK</th><th style="text-align:left">OPP</th><th style="text-align:left">STAT LINE</th><th>FPTS</th>`;
    html += `</tr></thead><tbody>`;
    wkEntries.forEach(w => {
      const fpts = w.fpts || 0;
      const barW = maxPts > 0 ? Math.round((fpts/maxPts)*60) : 0;
      const isBest = w.wk === bestWk.wk;
      const bye = !w.stat_line && fpts === 0 && w.opp === '-';
      html += `<tr class="${isBest?'best-week':''}">`;
      html += `<td style="color:#64748b;font-size:11px;font-weight:700">${w.wk}</td>`;
      html += `<td style="color:${bye?'#2d3f5a':'#94a3b8'};font-size:11px">${bye?'BYE':w.opp}</td>`;
      html += `<td style="font-size:11px;color:#64748b;max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${w.stat_line||'—'}</td>`;
      html += `<td><div class="pts-bar-wrap" style="justify-content:flex-end">`;
      if (fpts > 0) html += `<div class="pts-bar" style="width:${barW}px;background:${isBest?'#10b981':'rgba(148,163,184,0.4)'}"></div>`;
      html += `<span class="pts-cell" style="color:${fpts===0?'#2d3f5a':isBest?'#10b981':'#e2e8f0'};min-width:38px;text-align:right">${fpts > 0 ? fpts.toFixed(1) : (bye?'—':'DNS')}</span>`;
      html += `</div></td>`;
      html += `</tr>`;
    });
    html += `</tbody></table>`;
    html += `<div style="font-size:11px;color:#475569;margin-top:8px;text-align:right">Best week: Wk ${bestWk.wk} vs ${bestWk.opp} — ${(bestWk.fpts||0).toFixed(1)} pts</div>`;
  } else {
    html += `<div style="padding:16px;text-align:center;color:#475569;font-size:12px">No 2025 stats available</div>`;
  }
  html += `</div>`;

  // ── Career Stats ──
  html += `<div class="modal-section">`;
  html += `<div class="modal-sec-title">Career Stats</div>`;
  if (CAREER_STATS === false) {
    html += `<div style="padding:20px;text-align:center;color:#475569;font-size:12px"><span class="spinner" style="margin-right:8px"></span>Loading career data...</div>`;
  } else if (!career.length) {
    html += `<div style="padding:16px;text-align:center;color:#475569;font-size:12px">No career stats found</div>`;
  } else {
    const pos = player.pos;
    const sorted = [...career].sort((a,b)=>b.year-a.year);
    html += `<table class="modal-table"><thead><tr>`;
    html += `<th>Year</th><th style="text-align:left">Team</th>`;
    if (pos === 'QB') html += `<th>Cmp/Att</th><th>Yds</th><th>TD</th><th>INT</th><th>Ru Yds</th>`;
    else if (pos === 'RB') html += `<th>Att</th><th>Ru Yds</th><th>Ru TD</th><th>Rec</th><th>Re Yds</th>`;
    else if (['WR','TE'].includes(pos)) html += `<th>Tgt</th><th>Rec</th><th>Re Yds</th><th>Re TD</th>`;
    html += `<th>FPTS</th></tr></thead><tbody>`;
    sorted.forEach(r => {
      const tl = S.teamLogos[r.nfl_team] || '';
      html += `<tr class="${r.fpts>0?'career-row-active':''}">`;
      html += `<td style="color:#94a3b8;font-weight:700">${r.year}</td>`;
      html += `<td style="text-align:left"><div style="display:flex;align-items:center;gap:5px">${tl?`<img src="${tl}" style="height:14px;width:auto;object-fit:contain" onerror="this.style.display='none'">`:''}${r.nfl_team||'—'}</div></td>`;
      if (pos === 'QB') {
        html += `<td>${r.pass_comp||0}/${r.pass_att||0}</td><td>${r.pass_yds||0}</td><td>${r.pass_td||0}</td><td>${r.pass_int||0}</td><td>${r.rush_yds||0}</td>`;
      } else if (pos === 'RB') {
        html += `<td>${r.rush_att||0}</td><td>${r.rush_yds||0}</td><td>${r.rush_td||0}</td><td>${r.rec_rec||0}</td><td>${r.rec_yds||0}</td>`;
      } else if (['WR','TE'].includes(pos)) {
        html += `<td>${r.rec_tar||0}</td><td>${r.rec_rec||0}</td><td>${r.rec_yds||0}</td><td>${r.rec_td||0}</td>`;
      }
      html += `<td class="pts-cell" style="color:${r.fpts>0?posColor:'#2d3f5a'}">${r.fpts > 0 ? r.fpts.toFixed(1) : '—'}</td>`;
      html += `</tr>`;
    });
    html += `</tbody></table>`;
  }
  html += `</div>`;

  // News section — populated async by loadPlayerNews
  html += `<div class="modal-section"><div class="modal-sec-title">Recent News</div><div id="p-modal-news"><div style="padding:14px;text-align:center;color:#475569;font-size:12px"><span class="spinner" style="margin-right:6px"></span>Loading news...</div></div></div>`;

  el.innerHTML = html;
}

async function getLocalNews() {
  if (LOCAL_NEWS !== null) return LOCAL_NEWS;
  try {
    const r = await fetch('data/player_news_2025.json');
    if (r.ok) {
      const d = await r.json();
      const map = {};
      Object.values(d.teams || {}).forEach(players => {
        players.forEach(p => {
          if (p.name && p.articles && p.articles.length) {
            map[p.name.toLowerCase()] = p.articles;
          }
        });
      });
      LOCAL_NEWS = map;
    } else { LOCAL_NEWS = {}; }
  } catch(e) { LOCAL_NEWS = {}; }
  return LOCAL_NEWS;
}

async function loadPlayerNews(id) {
  const newsEl = document.getElementById('p-modal-news');
  if (!newsEl) return;
  const player = S.players.find(p => p.id === id);
  if (!player) return;

  const cacheKey = player.name;
  if (NEWS_CACHE[cacheKey] !== undefined) { renderNews(newsEl, NEWS_CACHE[cacheKey], player.name); return; }

  try {
    // 1. Try local pre-built Rotowire news
    const localMap = await getLocalNews();
    const raw = localMap[player.name.toLowerCase()] || [];
    if (raw.length) {
      const articles = raw.slice(0, 4).map(a => ({
        headline: a.headline,
        dateStr: a.date,
        description: a.story + (a.analysis ? ' ' + a.analysis : ''),
        src: a.source || 'Rotowire'
      }));
      NEWS_CACHE[cacheKey] = articles;
      if (MODAL_PID === id) renderNews(newsEl, articles, player.name);
      return;
    }

    // 2. ESPN fallback with 5s timeout
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 5000);
    try {
      const r = await fetch('https://site.api.espn.com/apis/site/v2/sports/football/nfl/news?limit=100', { signal: ctrl.signal });
      clearTimeout(timer);
      if (r.ok) {
        const d = await r.json();
        const name = player.name.toLowerCase();
        const espnArticles = (d.articles || [])
          .filter(a => (a.headline||'').toLowerCase().includes(name) || (a.description||'').toLowerCase().includes(name))
          .slice(0, 4)
          .map(a => ({
            headline: a.headline || '',
            dateStr: a.published ? new Date(a.published).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '',
            description: a.description || '',
            src: (a.source && a.source.description) || 'ESPN'
          }));
        NEWS_CACHE[cacheKey] = espnArticles;
        if (MODAL_PID === id) renderNews(newsEl, espnArticles, player.name);
        return;
      }
    } catch(e2) { clearTimeout(timer); }

    NEWS_CACHE[cacheKey] = [];
    if (MODAL_PID === id) renderNews(newsEl, [], player.name);
  } catch(e) {
    if (MODAL_PID === id) newsEl.innerHTML = '<div style="padding:14px;text-align:center;color:#475569;font-size:12px">Unable to load news</div>';
  }
}

function renderNews(el, articles, playerName) {
  if (!articles.length) {
    el.innerHTML = `<div style="padding:14px;text-align:center;color:#475569;font-size:12px">No recent news found for ${playerName}</div>`;
    return;
  }
  el.innerHTML = articles.map(a => {
    return `<div class="news-item">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px">
        <span class="news-title">${a.headline}</span>
        ${a.dateStr?`<span class="news-date">${a.dateStr}</span>`:''}
      </div>
      ${a.description?`<div class="news-desc">${a.description}</div>`:''}
      <div class="news-src">${a.src||'Rotowire'}</div>
    </div>`;
  }).join('');
}
