<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#10b981">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SBT Fantasy">
  <link rel="apple-touch-icon" href="sbt-logo.png">
<title>Trade Builder · SBT Fantasy Football</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="leftnav.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;background:#0b1120;color:#e2e8f0;font-family:'DM Sans','Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}
a{color:#10b981;text-decoration:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px}

/* ===== LAYOUT ===== */
#main{flex:1;min-width:0;width:0;display:flex;flex-direction:column;overflow-y:auto}

/* ===== PAGE HEADER ===== */
#page-header{padding:24px 28px 0;flex-shrink:0}
.page-title{font-size:32px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;color:#f1f5f9;line-height:1;margin-bottom:4px}
.page-sub{font-size:13px;color:#475569}

/* ===== TEAM SELECTOR BAR ===== */
#team-select-bar{display:flex;align-items:center;gap:16px;padding:20px 28px;flex-shrink:0}
.team-select-side{flex:1;display:flex;flex-direction:column;gap:8px}
.team-select-lbl{font-size:10px;font-weight:800;letter-spacing:2px;color:#475569;text-transform:uppercase}
.team-picker{background:#0d1526;border:1px solid rgba(255,255,255,0.08);color:#e2e8f0;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;outline:none;width:100%;transition:border-color .15s}
.team-picker:focus{border-color:rgba(167,139,250,0.4)}
.team-picker option{background:#0d1526}
.vs-badge{font-size:22px;font-weight:800;font-family:'Bebas Neue',sans-serif;color:#334155;letter-spacing:2px;flex-shrink:0;padding-top:22px}

/* ===== ROSTER COLUMNS ===== */
#roster-area{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:0 28px;flex:1;min-height:0}
.roster-col{background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.05);border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
.roster-col-header{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;gap:10px;flex-shrink:0}
.roster-col-logo{width:28px;height:28px;border-radius:6px;object-fit:contain;flex-shrink:0}
.roster-col-logo-ph{width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#64748b;flex-shrink:0}
.roster-col-name{font-size:13px;font-weight:800;color:#cbd5e1;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.roster-col-owner{font-size:11px;color:#475569;font-weight:600;white-space:nowrap}
.roster-col-selected{font-size:11px;font-weight:800;border-radius:12px;padding:2px 10px;flex-shrink:0}
.my-selected{background:rgba(16,185,129,0.12);color:#10b981}
.their-selected{background:rgba(167,139,250,0.12);color:#a78bfa}
.roster-scroll{overflow-y:auto;flex:1;padding:8px}
.empty-roster{padding:40px 20px;text-align:center;color:#334155;font-size:13px}

/* ===== PLAYER CARD (ROSTER) ===== */
.pl-card{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;cursor:pointer;transition:background .1s;border:1px solid transparent;margin-bottom:4px}
.pl-card:hover{background:rgba(255,255,255,0.03)}
.pl-card.selected-mine{background:rgba(16,185,129,0.07);border-color:rgba(16,185,129,0.2)}
.pl-card.selected-theirs{background:rgba(167,139,250,0.07);border-color:rgba(167,139,250,0.2)}
.pl-card-check{width:18px;height:18px;border-radius:5px;border:1.5px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.pl-card.selected-mine .pl-card-check{background:#10b981;border-color:#10b981}
.pl-card.selected-theirs .pl-card-check{background:#a78bfa;border-color:#a78bfa}
.pl-card-checkmark{font-size:11px;color:#0b1120;font-weight:900;display:none}
.pl-card.selected-mine .pl-card-checkmark,.pl-card.selected-theirs .pl-card-checkmark{display:block}
.pl-card-photo{width:32px;height:32px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(255,255,255,0.07);flex-shrink:0}
.pl-card-photo-ph{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.pl-card-info{flex:1;min-width:0}
.pl-card-name{font-size:12px;font-weight:700;color:#e2e8f0;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-card-meta{font-size:10px;color:#475569;font-weight:600;display:flex;align-items:center;gap:4px}
.pl-pos-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.pl-card-pts{font-size:13px;font-weight:800;color:#94a3b8;flex-shrink:0;font-variant-numeric:tabular-nums}
.pos-group-label{font-size:9px;font-weight:800;letter-spacing:2px;color:#1e293b;text-transform:uppercase;padding:8px 10px 4px}

/* ===== TRADE SUMMARY PANEL ===== */
#trade-summary{background:linear-gradient(135deg,#0d1526,#0f1a2e);border-top:1px solid rgba(167,139,250,0.15);padding:16px 28px;flex-shrink:0;display:none}
.ts-inner{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:start;max-width:900px}
.ts-side{background:rgba(255,255,255,0.02);border-radius:12px;padding:12px 14px;min-height:60px}
.ts-side-lbl{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.ts-send-lbl{color:#10b981}
.ts-recv-lbl{color:#a78bfa}
.ts-player-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ts-player-row:last-child{margin-bottom:0}
.ts-pl-name{font-size:12px;font-weight:700;color:#e2e8f0;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ts-pl-pts{font-size:11px;font-weight:800;color:#94a3b8;flex-shrink:0}
.ts-empty{font-size:12px;color:#334155;font-style:italic}
.ts-middle{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding-top:24px}
.ts-arrow{font-size:20px;color:#475569}
.ts-diff{font-size:11px;font-weight:800;letter-spacing:.5px;padding:4px 10px;border-radius:6px;text-align:center;white-space:nowrap}
.ts-diff-win{background:rgba(16,185,129,0.12);color:#10b981}
.ts-diff-lose{background:rgba(239,68,68,0.1);color:#ef4444}
.ts-diff-even{background:rgba(255,255,255,0.05);color:#64748b}
.ts-actions{display:flex;gap:10px;align-items:center;justify-content:center;margin-top:12px;flex-wrap:wrap}
.btn-clear{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:#64748b;padding:9px 18px;border-radius:9px;font-size:12px;font-weight:800;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;letter-spacing:.5px}
.btn-clear:hover{background:rgba(255,255,255,0.07);color:#94a3b8}
.btn-submit{background:linear-gradient(135deg,rgba(167,139,250,0.18),rgba(139,92,246,0.12));border:1px solid rgba(167,139,250,0.35);color:#c4b5fd;padding:9px 24px;border-radius:9px;font-size:13px;font-weight:800;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;letter-spacing:.5px}
.btn-submit:hover{background:linear-gradient(135deg,rgba(167,139,250,0.28),rgba(139,92,246,0.2));border-color:rgba(167,139,250,0.5)}
.btn-submit:disabled{opacity:.4;cursor:not-allowed}

/* ===== SUBMIT MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#0d1526;border:1px solid rgba(255,255,255,0.08);border-radius:20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.modal-hdr{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:12px}
.modal-title{font-size:22px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;color:#f1f5f9;flex:1}
.modal-close-btn{background:rgba(255,255,255,0.06);border:none;color:#94a3b8;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:all .12s}
.modal-close-btn:hover{background:rgba(255,255,255,0.1);color:#e2e8f0}
.modal-body{padding:20px}
.trade-summary-card{background:rgba(255,255,255,0.02);border:1px solid rgba(167,139,250,0.15);border-radius:14px;padding:16px;margin-bottom:16px}
/* Team header row inside modal */
.trade-teams-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.06)}
.trade-team-chip{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.trade-team-chip.right{justify-content:flex-end;text-align:right}
.trade-side-logo{width:26px;height:26px;border-radius:6px;object-fit:contain;flex-shrink:0;background:rgba(255,255,255,0.04)}
.trade-side-logo-ph{width:26px;height:26px;border-radius:6px;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#64748b;flex-shrink:0}
.trade-team-name{font-size:12px;font-weight:800;color:#cbd5e1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.trade-vs{font-size:14px;font-weight:800;color:#a78bfa;flex-shrink:0}
/* Player columns */
.trade-sides-grid{display:grid;grid-template-columns:1fr 24px 1fr;gap:8px;align-items:start}
.trade-side-col{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:10px 12px}
.trade-side-title{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.trade-side-sends{color:#10b981}
.trade-side-gets{color:#a78bfa}
.trade-pl-item{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.trade-pl-item:last-child{margin-bottom:0}
.trade-pl-photo{width:28px;height:28px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(255,255,255,0.07);flex-shrink:0}
.trade-pl-photo-ph{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.trade-pl-name{font-size:12px;font-weight:700;color:#e2e8f0;line-height:1.2}
.trade-pl-meta{font-size:10px;color:#475569}
.trade-arrow-mid{display:flex;align-items:center;justify-content:center;font-size:16px;color:#475569;padding-top:28px}
.modal-note{font-size:12px;color:#475569;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:12px 14px;line-height:1.6;margin-bottom:16px}
.email-row{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.email-lbl{font-size:11px;font-weight:800;letter-spacing:1px;color:#475569;text-transform:uppercase}
.email-input{background:#060d1b;border:1px solid rgba(255,255,255,0.08);color:#e2e8f0;padding:9px 12px;border-radius:9px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
.email-input:focus{border-color:rgba(167,139,250,0.4)}
.modal-btns{display:flex;gap:10px;justify-content:flex-end}
.modal-cancel{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:#64748b;padding:9px 18px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s}
.modal-cancel:hover{background:rgba(255,255,255,0.07);color:#94a3b8}
.modal-send{background:linear-gradient(135deg,rgba(167,139,250,0.2),rgba(139,92,246,0.14));border:1px solid rgba(167,139,250,0.35);color:#c4b5fd;padding:9px 24px;border-radius:9px;font-size:13px;font-weight:800;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s}
.modal-send:hover{background:linear-gradient(135deg,rgba(167,139,250,0.32),rgba(139,92,246,0.22))}

/* ===== LOADING ===== */
#loading{position:fixed;inset:0;background:#0b1120;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}
.spin{width:36px;height:36px;border:3px solid rgba(167,139,250,0.15);border-top-color:#a78bfa;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:14px;color:#475569}

/* ===== MOBILE ===== */
@media(max-width:750px){
  #roster-area{grid-template-columns:1fr;gap:12px;padding:0 16px}
  #team-select-bar{flex-direction:column;gap:12px;padding:16px}
  .vs-badge{padding-top:0;align-self:center}
  #page-header{padding:14px 16px 0}
  #trade-summary{padding:12px 16px}
  .ts-inner{grid-template-columns:1fr;gap:8px}
  .ts-middle{flex-direction:row;padding-top:0}
  .trade-sides-grid{grid-template-columns:1fr;gap:8px}
  .trade-arrow-mid{padding-top:0;transform:rotate(90deg)}
}
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><p>Loading rosters...</p></div>

<div id="app" style="display:none">
  <nav id="leftnav"></nav>

  <div id="main">
  <div id="ln-topbar">
    <button id="ln-mobile-btn" onclick="lnToggleMobile()">&#9776;</button>
    <span class="ln-topbar-title">Sigma Beta Tau Fantasy Football</span>
  </div>

  <div id="page-header">
    <div class="page-title">Trade Builder</div>
    <div class="page-sub">Select two franchises, pick players from each side, then send the offer</div>
  </div>

  <div id="team-select-bar">
    <div class="team-select-side">
      <div class="team-select-lbl">Your Franchise</div>
      <select class="team-picker" id="my-team-picker">
        <option value="">— Select your team —</option>
      </select>
    </div>
    <div class="vs-badge">VS</div>
    <div class="team-select-side">
      <div class="team-select-lbl">Trade With</div>
      <select class="team-picker" id="their-team-picker">
        <option value="">— Select their team —</option>
      </select>
    </div>
  </div>

  <div id="roster-area">
    <div class="roster-col" id="my-roster-col">
      <div class="empty-roster">Select your franchise above</div>
    </div>
    <div class="roster-col" id="their-roster-col">
      <div class="empty-roster">Select the other franchise above</div>
    </div>
  </div>

  <div id="trade-summary">
    <div class="ts-inner" id="ts-inner"></div>
    <div class="ts-actions">
      <button class="btn-clear" onclick="clearSelections()">Clear All</button>
      <button class="btn-submit" id="btn-submit" onclick="openSubmitModal()">&#8652; Send Trade Offer</button>
    </div>
  </div>
  </div><!-- /#main -->

</div><!-- /#app -->

<script>
/* ===== CONFIG ===== */
// Add owner emails here — trade offer will be pre-addressed to the right person
const OWNER_EMAILS = {
  "Comeback Kid":             "stephenallen@email.com",
  "Cooked To Perfection":     "chris.alves@me.com",
  "Trump Train":              "calves86@gmail.com",
  "Ceaser Salad Tossers":     "cceaser@email.com",
  "Bear Exposures":           "brianfranklin@email.com",
  "Smease Appeasers":         "jschieda@email.com",
  "skoot":                    "skooterwilliams@email.com",
  "The MUFF Divers":          "adamcohen@email.com",
  "Team Freesh":              "seanmcmanimon@email.com",
  "Clitsburgh Feelers":       "stevedanek@email.com",
  "Gotham Rogues":            "jakemason@email.com",
  "Big Fat Chubby":           "andrewmitchell@email.com",
};

// Unicode ✓ for checkmark in check box
const CHECK = '✓';
const POS_COLOR = {QB:'#ef4444',RB:'#22c55e',WR:'#3b82f6',TE:'#f59e0b',K:'#8b5cf6',DST:'#06b6d4',FB:'#ec4899'};
const POS_ORDER = ['QB','RB','WR','TE','K','DST'];

const FRANCHISE_LOGOS = {
  "Bear Exposures":        "team-logo/bearexposures-logo.jpg",
  "Big Fat Chubby":        "team-logo/bigfatchubby-logo.jpg",
  "Ceaser Salad Tossers":  "team-logo/ceaser-logo.jpg",
  "Clitsburgh Feelers":    "team-logo/clitsburg-logo.jpg",
  "Comeback Kid":          "team-logo/comebackkid-logo.jpg",
  "Cooked To Perfection":  "team-logo/cookedtoperfection-logo.jpg",
  "Gotham Rogues":         "team-logo/gotham-logo.gif",
  "Smease Appeasers":      "team-logo/smease-logo.png",
  "Team Freesh":           "team-logo/freesh-logo.jpg",
  "The MUFF Divers":       "team-logo/muff-logo.png",
  "Trump Train":           "team-logo/trumptrain-logo.jpg",
  "skoot":                 "team-logo/skoot-logo.jpg",
};

/* ===== STATE ===== */
let TEAMS = [];
let myTeamIdx  = null;
let theirTeamIdx = null;
let mySending   = new Set();   // player names I'm offering
let theirSending = new Set();  // player names I'm requesting

/* ===== INIT ===== */
async function init() {
  try {
    const r = await fetch('data/team_data_2025.json');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const json = await r.json();
    TEAMS = json.teams || [];
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    populatePickers();
  } catch(e) {
    document.getElementById('loading').innerHTML = `<p style="color:#ef4444">Failed to load: ${e.message}</p>`;
  }
}

function populatePickers() {
  const myPicker = document.getElementById('my-team-picker');
  const theirPicker = document.getElementById('their-team-picker');
  TEAMS.forEach((t, i) => {
    myPicker.add(new Option(t.team_name, i));
    theirPicker.add(new Option(t.team_name, i));
  });
  myPicker.addEventListener('change', e => {
    myTeamIdx = e.target.value === '' ? null : parseInt(e.target.value);
    mySending.clear();
    renderRosters();
    updateSummary();
  });
  theirPicker.addEventListener('change', e => {
    theirTeamIdx = e.target.value === '' ? null : parseInt(e.target.value);
    theirSending.clear();
    renderRosters();
    updateSummary();
  });

  // Pre-select team from URL param (?team=Bear+Exposures)
  const urlTeam = new URLSearchParams(window.location.search).get('team');
  if (urlTeam) {
    const idx = TEAMS.findIndex(t => t.team_name === urlTeam);
    if (idx !== -1) {
      myPicker.value = idx;
      myTeamIdx = idx;
      renderRosters();
    }
  }
}

/* ===== ROSTER RENDER ===== */
function logoEl(teamName, cls='roster-col-logo', ph='roster-col-logo-ph') {
  const src = FRANCHISE_LOGOS[teamName] || FRANCHISE_LOGOS[teamName.replace(/\s*ð\s*/,'')];
  const initials = teamName.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  return src
    ? `<img class="${cls}" src="${src}" alt="${teamName}" onerror="this.style.display='none';this.nextSibling.style.display='flex'">
       <div class="${ph}" style="display:none">${initials}</div>`
    : `<div class="${ph}">${initials}</div>`;
}

function renderRosters() {
  renderSide('my', myTeamIdx, 'my-roster-col', true);
  renderSide('their', theirTeamIdx, 'their-roster-col', false);
}

function renderSide(side, teamIdx, colId, isMine) {
  const col = document.getElementById(colId);
  if (teamIdx === null) {
    col.innerHTML = `<div class="empty-roster">Select a franchise above</div>`;
    return;
  }
  const team = TEAMS[teamIdx];
  const allPlayers = [...team.starters, ...team.bench];
  const selectedSet = isMine ? mySending : theirSending;
  const selClass = isMine ? 'selected-mine' : 'selected-theirs';
  const selCount = selectedSet.size;
  const selLbl = selCount > 0
    ? `<span class="roster-col-selected ${isMine?'my-selected':'their-selected'}">${selCount} selected</span>` : '';

  // Group by position
  const grouped = {};
  POS_ORDER.forEach(p => grouped[p] = []);
  allPlayers.forEach(p => {
    if (grouped[p.position]) grouped[p.position].push(p);
    else (grouped['other'] = grouped['other']||[]).push(p);
  });

  const rows = POS_ORDER.flatMap(pos => {
    const players = grouped[pos] || [];
    if (!players.length) return [];
    return [
      `<div class="pos-group-label">${pos}</div>`,
      ...players.map(p => playerCard(p, selectedSet.has(p.name), selClass, side))
    ];
  });

  col.innerHTML = `
    <div class="roster-col-header">
      ${logoEl(team.team_name)}
      <div class="roster-col-name" title="${team.team_name}">${team.team_name}</div>
      <div class="roster-col-owner">${team.owner || ''}</div>
      ${selLbl}
    </div>
    <div class="roster-scroll">${rows.join('')}</div>`;
}

function playerCard(p, isSelected, selClass, side) {
  const color = POS_COLOR[p.position] || '#64748b';
  const photoHtml = p.photo_url
    ? `<img class="pl-card-photo" src="${p.photo_url}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'">
       <div class="pl-card-photo-ph" style="background:${color}22;color:${color};display:none">${p.position}</div>`
    : `<div class="pl-card-photo-ph" style="background:${color}22;color:${color}">${p.position}</div>`;

  const pts = p.season_pts > 0 ? p.season_pts.toFixed(1) : '—';
  const cls = isSelected ? `pl-card ${selClass}` : 'pl-card';

  return `<div class="${cls}" onclick="togglePlayer('${side}','${p.name.replace(/'/g,"\\'")}')">
    <div class="pl-card-check"><span class="pl-card-checkmark">${CHECK}</span></div>
    ${photoHtml}
    <div class="pl-card-info">
      <div class="pl-card-name">${p.name}</div>
      <div class="pl-card-meta">
        <span class="pl-pos-dot" style="background:${color}"></span>
        ${p.position} · ${p.nfl_team || '—'}
      </div>
    </div>
    <div class="pl-card-pts">${pts}</div>
  </div>`;
}

function togglePlayer(side, name) {
  const set = side === 'my' ? mySending : theirSending;
  if (set.has(name)) set.delete(name);
  else set.add(name);
  renderRosters();
  updateSummary();
}

/* ===== TRADE SUMMARY ===== */
function updateSummary() {
  const panel = document.getElementById('trade-summary');
  const hasSelections = mySending.size > 0 || theirSending.size > 0;

  if (!hasSelections || myTeamIdx === null || theirTeamIdx === null) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = 'block';

  const myTeam  = TEAMS[myTeamIdx];
  const theirTeam = TEAMS[theirTeamIdx];
  const allMine  = [...myTeam.starters, ...myTeam.bench];
  const allTheirs = [...theirTeam.starters, ...theirTeam.bench];

  const sendingPlayers  = allMine.filter(p => mySending.has(p.name));
  const receivingPlayers = allTheirs.filter(p => theirSending.has(p.name));

  const sendPts   = sendingPlayers.reduce((s,p)  => s + (p.season_pts||0), 0);
  const recvPts   = receivingPlayers.reduce((s,p) => s + (p.season_pts||0), 0);
  const diff = recvPts - sendPts;
  const diffLabel = diff > 0.5
    ? `+${diff.toFixed(1)} pts gained`
    : diff < -0.5 ? `${diff.toFixed(1)} pts given up`
    : 'Even trade';
  const diffClass = diff > 0.5 ? 'ts-diff-win' : diff < -0.5 ? 'ts-diff-lose' : 'ts-diff-even';

  function tsSide(players, lbl, lblCls, emptyMsg) {
    const rows = players.map(p => {
      const color = POS_COLOR[p.position] || '#64748b';
      return `<div class="ts-player-row">
        <span class="pl-pos-dot" style="background:${color}"></span>
        <span class="ts-pl-name">${p.name}</span>
        <span class="ts-pl-pts">${p.season_pts > 0 ? p.season_pts.toFixed(1) : '—'}</span>
      </div>`;
    }).join('');
    return `<div class="ts-side">
      <div class="ts-side-lbl ${lblCls}">${lbl}</div>
      ${rows || `<div class="ts-empty">${emptyMsg}</div>`}
    </div>`;
  }

  document.getElementById('ts-inner').innerHTML =
    tsSide(sendingPlayers, 'You Send', 'ts-send-lbl', 'No players selected') +
    `<div class="ts-middle">
      <div class="ts-arrow">⇄</div>
      <div class="ts-diff ${diffClass}">${diffLabel}</div>
    </div>` +
    tsSide(receivingPlayers, 'You Receive', 'ts-recv-lbl', 'No players selected');

  document.getElementById('btn-submit').disabled = (mySending.size === 0 && theirSending.size === 0);
}

function clearSelections() {
  mySending.clear();
  theirSending.clear();
  renderRosters();
  updateSummary();
}

/* ===== SUBMIT MODAL ===== */
function openSubmitModal() {
  if (myTeamIdx === null || theirTeamIdx === null) return;
  const myTeam    = TEAMS[myTeamIdx];
  const theirTeam = TEAMS[theirTeamIdx];
  const allMine   = [...myTeam.starters, ...myTeam.bench];
  const allTheirs = [...theirTeam.starters, ...theirTeam.bench];

  const sendingPlayers   = allMine.filter(p => mySending.has(p.name));
  const receivingPlayers = allTheirs.filter(p => theirSending.has(p.name));

  if (sendingPlayers.length === 0 && receivingPlayers.length === 0) return;

  const prefillEmail = OWNER_EMAILS[theirTeam.team_name] || '';

  function tradePlayerItem(p) {
    const color = POS_COLOR[p.position] || '#64748b';
    const photo = p.photo_url
      ? `<img class="trade-pl-photo" src="${p.photo_url}" onerror="this.style.display='none';this.nextSibling.style.display='flex'">
         <div class="trade-pl-photo-ph" style="background:${color}22;color:${color};display:none">${p.position}</div>`
      : `<div class="trade-pl-photo-ph" style="background:${color}22;color:${color}">${p.position}</div>`;
    return `<div class="trade-pl-item">
      ${photo}
      <div>
        <div class="trade-pl-name">${p.name}</div>
        <div class="trade-pl-meta">${p.position} · ${p.nfl_team||'—'} · ${p.season_pts>0?p.season_pts.toFixed(1)+' pts':'no stats'}</div>
      </div>
    </div>`;
  }

  function tradeSideHtml(players, lbl, clsLbl) {
    return `<div class="trade-side-col">
      <div class="trade-side-title ${clsLbl}">${lbl}</div>
      ${players.length ? players.map(tradePlayerItem).join('') : '<div style="font-size:12px;color:#334155;font-style:italic">Nothing selected</div>'}
    </div>`;
  }

  function teamChip(team, alignRight) {
    const logo = logoEl(team.team_name, 'trade-side-logo', 'trade-side-logo-ph');
    const name = `<div class="trade-team-name" title="${team.team_name}">${team.team_name}</div>`;
    return alignRight
      ? `<div class="trade-team-chip right">${name}${logo}</div>`
      : `<div class="trade-team-chip">${logo}${name}</div>`;
  }

  const html = `<div class="modal-overlay" id="submit-modal" onclick="if(event.target.id==='submit-modal')closeSubmitModal()">
    <div class="modal-box">
      <div class="modal-hdr">
        <div class="modal-title">Send Trade Offer</div>
        <button class="modal-close-btn" onclick="closeSubmitModal()">&#10005;</button>
      </div>
      <div class="modal-body">
        <div class="trade-summary-card">
          <div class="trade-teams-row">
            ${teamChip(myTeam, false)}
            <span class="trade-vs">⇄</span>
            ${teamChip(theirTeam, true)}
          </div>
          <div class="trade-sides-grid">
            ${tradeSideHtml(sendingPlayers, myTeam.team_name + ' Sends', 'trade-side-sends')}
            <div class="trade-arrow-mid">⇄</div>
            ${tradeSideHtml(receivingPlayers, theirTeam.team_name + ' Sends', 'trade-side-gets')}
          </div>
        </div>

        <div class="email-row">
          <div class="email-lbl">Send To (email)</div>
          <input class="email-input" type="email" id="recipient-email" placeholder="owner@email.com" value="${prefillEmail}">
        </div>

        <div class="modal-note">
          &#9432;&nbsp; Clicking <strong style="color:#c4b5fd">Send Offer</strong> will open your email client with the trade offer pre-filled.
          The recipient can then reply to accept, decline, or counter.
        </div>

        <div class="modal-btns">
          <button class="modal-cancel" onclick="closeSubmitModal()">Cancel</button>
          <button class="modal-send" onclick="sendOffer()">Send Offer &#8594;</button>
        </div>
      </div>
    </div>
  </div>`;

  document.body.insertAdjacentHTML('beforeend', html);
  document.body.style.overflow = 'hidden';

  // Store offer data for sendOffer()
  window._tradeOffer = { myTeam, theirTeam, sendingPlayers, receivingPlayers };
}

function closeSubmitModal() {
  const m = document.getElementById('submit-modal');
  if (m) m.remove();
  document.body.style.overflow = '';
}

function sendOffer() {
  const { myTeam, theirTeam, sendingPlayers, receivingPlayers } = window._tradeOffer || {};
  if (!myTeam) return;

  const recipientEmail = document.getElementById('recipient-email').value.trim();

  const sendList  = sendingPlayers.map(p  => `  • ${p.name} (${p.position}, ${p.nfl_team||'FA'}) – ${p.season_pts>0?p.season_pts.toFixed(1)+' pts':'no stats'}`).join('\n');
  const recvList  = receivingPlayers.map(p => `  • ${p.name} (${p.position}, ${p.nfl_team||'FA'}) – ${p.season_pts>0?p.season_pts.toFixed(1)+' pts':'no stats'}`).join('\n');

  const sendPts = sendingPlayers.reduce((s,p) => s+(p.season_pts||0),0);
  const recvPts = receivingPlayers.reduce((s,p) => s+(p.season_pts||0),0);
  const diff = recvPts - sendPts;
  const diffStr = diff > 0.5 ? `You gain ${diff.toFixed(1)} pts value` : diff < -0.5 ? `You give up ${Math.abs(diff).toFixed(1)} pts value` : 'Even trade';

  const subject = encodeURIComponent(`[SBT Trade Offer] ${myTeam.team_name} → ${theirTeam.team_name}`);
  const body = encodeURIComponent(
`SBT Trade Offer
────────────────────────────────
From: ${myTeam.team_name} (${myTeam.owner || ''})
To:   ${theirTeam.team_name} (${theirTeam.owner || ''})

${myTeam.team_name} SENDS:
${sendList || '  (nothing)'}

${theirTeam.team_name} SENDS:
${recvList || '  (nothing)'}

Value Difference: ${diffStr}
────────────────────────────────
Reply to this email to Accept, Decline, or propose a Counter.

— Sent via SBT Trade Builder`
  );

  window.location.href = `mailto:${recipientEmail}?subject=${subject}&body=${body}`;
  closeSubmitModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSubmitModal(); });

init();
</script>

<script>initLeftNav('trade.html');</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
