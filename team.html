<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#10b981">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SBT Fantasy">
  <link rel="apple-touch-icon" href="sbt-logo.png">
<title>Team Pages · SBT Fantasy Football</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="leftnav.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b1120;color:#e2e8f0;font-family:'DM Sans','Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}
a{color:#10b981;text-decoration:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px}

/* ===== LAYOUT ===== */
#main{flex:1;min-width:0;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden}
#tm-center{max-width:1400px;width:100%;margin:0 auto;display:flex;flex-direction:column;flex:1}

/* ===== TEAM HEADER ===== */
#team-header{padding:24px 28px 0;flex-shrink:0}
.th-card{background:linear-gradient(135deg,rgba(16,185,129,0.06),rgba(167,139,250,0.04));border:1px solid rgba(16,185,129,0.12);border-radius:20px;padding:24px;display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap}
.th-logo-wrap{flex-shrink:0}
.th-logo{width:80px;height:80px;border-radius:16px;object-fit:contain;background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.07)}
.th-logo-ph{width:80px;height:80px;border-radius:16px;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#64748b}
.th-info{flex:1;min-width:0}
.th-actions{display:flex;flex-direction:column;gap:8px;flex-shrink:0;align-self:center}
.th-action-btn{display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;font-size:12px;font-weight:800;letter-spacing:.5px;text-decoration:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;width:140px;justify-content:center}
.th-action-players{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.22);color:#10b981}
.th-action-players:hover{background:rgba(16,185,129,0.18);border-color:rgba(16,185,129,0.4)}
.th-action-trade{background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.22);color:#a78bfa}
.th-action-trade:hover{background:rgba(167,139,250,0.18);border-color:rgba(167,139,250,0.4)}
.th-name{font-size:28px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;color:#f1f5f9;line-height:1;margin-bottom:4px}
.th-owner{font-size:13px;color:#64748b;margin-bottom:14px}
.th-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.th-rank{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:800;background:rgba(16,185,129,0.15);color:#10b981;letter-spacing:.5px}
.th-record{padding:4px 12px;border-radius:20px;font-size:13px;font-weight:800;background:rgba(255,255,255,0.07);color:#e2e8f0}
.th-stats{display:flex;gap:24px;flex-wrap:wrap}
.th-stat{text-align:center}
.th-stat-val{font-size:22px;font-weight:800;font-family:'Bebas Neue',sans-serif;color:#10b981;letter-spacing:1px;line-height:1}
.th-stat-lbl{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* ===== TAB BAR ===== */
#tab-bar{display:flex;gap:4px;padding:20px 28px 0;flex-shrink:0}
.tab-btn{padding:9px 20px;border-radius:9px;border:none;cursor:pointer;font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;background:transparent;color:#475569;font-family:'DM Sans',sans-serif;transition:all .15s}
.tab-btn:hover{color:#94a3b8;background:rgba(255,255,255,0.04)}
.tab-btn.active{background:rgba(16,185,129,0.12);color:#10b981}

/* ===== TAB CONTENT ===== */
#tab-content{padding:20px 28px 60px;flex:1}

/* ===== ROSTER ===== */
.roster-section-label{font-size:11px;font-weight:800;letter-spacing:2px;color:#475569;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.roster-section-label::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.05)}
.roster-table{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:14px;overflow:hidden;margin-bottom:24px}
.roster-hdr{display:grid;grid-template-columns:52px 52px 1fr 62px 70px 54px 54px 58px;gap:0;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.05)}
.roster-hdr span{font-size:10px;font-weight:700;letter-spacing:1px;color:#334155;text-transform:uppercase}
.roster-hdr .r-opp{text-align:center}
.roster-hdr .r-time{text-align:center}
.roster-hdr .r-prev{text-align:right}
.roster-hdr .r-avg{text-align:right}
.roster-hdr .r-proj{text-align:right}
.p-row{display:grid;grid-template-columns:52px 52px 1fr 62px 70px 54px 54px 58px;gap:0;padding:10px 12px;align-items:center;border-bottom:1px solid rgba(255,255,255,0.03);transition:background .12s}
.p-row:last-child{border-bottom:none}
.p-row:hover{background:rgba(255,255,255,0.025)}
.slot-badge{font-size:9px;font-weight:800;letter-spacing:.5px;color:#475569;text-transform:uppercase;background:rgba(255,255,255,0.04);border-radius:5px;padding:3px 6px;text-align:center;white-space:nowrap}
.p-photo-col{display:flex;align-items:center;justify-content:center}
.p-photo-wrap{position:relative;width:40px;height:40px}
.p-photo{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.08)}
.p-photo-ph{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;border:2px solid rgba(255,255,255,0.06)}
.p-nfl-badge{position:absolute;bottom:-3px;right:-3px;width:16px;height:16px;border-radius:50%;object-fit:contain;background:#0b1120;border:1.5px solid rgba(255,255,255,0.1)}
.p-info{min-width:0;padding:0 10px}
.p-name{font-size:13px;font-weight:700;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.p-sub{display:flex;align-items:center;gap:5px;margin-top:2px}
.pos-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.p-nfl{font-size:10px;color:#475569;font-weight:600}
.p-opp{text-align:center;font-size:11px;font-weight:700;color:#94a3b8;white-space:nowrap}
.p-time{text-align:center;font-size:10px;color:#475569;font-weight:600;white-space:nowrap;line-height:1.3}
.p-prev{text-align:right;font-size:15px;font-weight:800;color:#e2e8f0;font-family:'Bebas Neue',sans-serif;letter-spacing:.5px}
.p-prev-zero{color:#334155}
.p-avg{text-align:right;font-size:11px;color:#64748b;font-weight:600}
.p-proj{text-align:right;font-size:14px;font-weight:800;color:#10b981;font-family:'Bebas Neue',sans-serif;letter-spacing:.5px}
.p-matchup{display:none;font-size:10px;color:#64748b;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-score-col{display:contents}

/* ===== BENCH TOGGLE ===== */
.bench-toggle{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;margin-bottom:8px}
.bench-toggle:hover .roster-section-label{color:#64748b}
.bench-caret{font-size:10px;color:#475569;transition:transform .2s}
.bench-caret.open{transform:rotate(90deg)}

/* ===== SCHEDULE ===== */
.schedule-table{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:14px;overflow:hidden}
.sched-hdr{display:grid;grid-template-columns:52px 1fr 120px 60px;gap:0;padding:8px 16px;border-bottom:1px solid rgba(255,255,255,0.05)}
.sched-hdr span{font-size:10px;font-weight:700;letter-spacing:1px;color:#334155;text-transform:uppercase}
.sched-hdr .s-score{text-align:center}
.sched-hdr .s-result{text-align:center}
.sched-row{display:grid;grid-template-columns:52px 1fr 120px 60px;gap:0;padding:10px 16px;align-items:center;border-bottom:1px solid rgba(255,255,255,0.03);transition:background .12s}
.sched-row:last-child{border-bottom:none}
.sched-row:hover{background:rgba(255,255,255,0.02)}
.sched-row.playoff-row{background:rgba(250,204,21,0.03)}
.sched-week{font-size:12px;font-weight:800;color:#475569;font-family:'Bebas Neue',sans-serif;letter-spacing:1px}
.sched-opp{display:flex;align-items:center;gap:8px;min-width:0}
.sched-opp-logo{width:24px;height:24px;border-radius:5px;object-fit:contain;flex-shrink:0;background:rgba(255,255,255,0.04)}
.sched-opp-logo-ph{width:24px;height:24px;border-radius:5px;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#64748b;flex-shrink:0}
.sched-opp-name{font-size:12px;font-weight:600;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sched-playoff-tag{font-size:9px;font-weight:800;color:#facc15;background:rgba(250,204,21,0.12);border-radius:4px;padding:1px 5px;flex-shrink:0;letter-spacing:.5px}
.sched-score{text-align:center}
.sched-score-line{font-size:13px;font-weight:700;color:#e2e8f0;letter-spacing:.5px}
.sched-score-opp{font-size:11px;color:#475569}
.result-badge{display:inline-block;width:28px;height:28px;border-radius:50%;font-size:12px;font-weight:800;text-align:center;line-height:28px;margin:0 auto;display:flex;align-items:center;justify-content:center}
.result-w{background:rgba(16,185,129,0.15);color:#10b981}
.result-l{background:rgba(239,68,68,0.12);color:#ef4444}
.result-t{background:rgba(148,163,184,0.12);color:#94a3b8}

/* ===== TRANSACTIONS ===== */
.trans-item{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.trans-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.trans-week{font-size:10px;font-weight:800;color:#475569;background:rgba(255,255,255,0.05);border-radius:5px;padding:3px 8px;letter-spacing:1px}
.trans-date{font-size:11px;color:#334155}
.trans-type-badge{font-size:10px;font-weight:800;letter-spacing:.5px;padding:3px 9px;border-radius:6px}
.type-add_drop,.type-add,.type-drop,.type-waiver{background:rgba(16,185,129,0.1);color:#10b981}
.type-trade{background:rgba(167,139,250,0.12);color:#a78bfa}
.trans-body{display:flex;flex-direction:column;gap:6px}
.trans-side{display:flex;align-items:flex-start;gap:10px}
.trans-action-col{width:50px;font-size:9px;font-weight:800;letter-spacing:.5px;padding-top:2px;flex-shrink:0}
.trans-add-col{color:#10b981}
.trans-drop-col{color:#ef4444}
.trans-recv-col{color:#a78bfa}
.trans-players{display:flex;flex-direction:column;gap:4px}
.trans-player{display:flex;align-items:center;gap:6px;font-size:12px;color:#94a3b8}
.trans-pos{font-size:9px;font-weight:800;padding:1px 5px;border-radius:4px}
.trans-trade-divider{height:1px;background:rgba(255,255,255,0.04);margin:6px 0}
.trans-trade-team{font-size:10px;font-weight:800;color:#64748b;margin-bottom:4px;letter-spacing:.5px}
.faab-tag{font-size:10px;color:#f59e0b;font-weight:700}

/* ===== LOADING / EMPTY ===== */
#loading{position:fixed;inset:0;background:#0b1120;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}
.spin{width:36px;height:36px;border:3px solid rgba(16,185,129,0.15);border-top-color:#10b981;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:14px;color:#475569}
.empty-state{text-align:center;padding:60px 20px;color:#334155;font-size:14px}

/* ===== DRAG & DROP ===== */
.p-row[draggable]{cursor:grab}
.p-row[draggable]:active{cursor:grabbing}
.p-row.dragging{opacity:.35;background:rgba(16,185,129,0.05)}
.p-row.drop-valid{background:rgba(16,185,129,0.1);outline:2px dashed rgba(16,185,129,0.5);outline-offset:-2px}
.p-row.drop-invalid{background:rgba(239,68,68,0.07);outline:2px dashed rgba(239,68,68,0.35);outline-offset:-2px}
.p-row.touch-selected{background:rgba(16,185,129,0.12);outline:2px solid #10b981;outline-offset:-2px}
.p-row.empty-slot{border:2px dashed rgba(16,185,129,0.15);background:transparent;cursor:default}
.p-row.empty-slot:hover{border-color:rgba(16,185,129,0.4);background:rgba(16,185,129,0.04)}
.p-row.empty-slot.drop-valid{border-color:#10b981;background:rgba(16,185,129,0.1)}
.empty-label{font-size:12px;color:#334155;font-style:italic}
.drag-handle{display:flex;align-items:center;justify-content:center;color:#334155;font-size:14px;cursor:grab;padding:0 4px;flex-shrink:0;user-select:none}
.drag-handle:hover{color:#64748b}
.lineup-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.lineup-modified-badge{font-size:10px;font-weight:800;letter-spacing:1px;color:#f59e0b;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.2);border-radius:6px;padding:3px 10px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.reset-btn{font-size:11px;font-weight:700;color:#64748b;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:7px;padding:5px 12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.reset-btn:hover{color:#e2e8f0;border-color:rgba(255,255,255,0.15)}
.touch-hint{font-size:10px;color:#334155;margin-left:auto}
.lineup-valid-banner{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;background:rgba(16,185,129,0.07);border:1px solid rgba(16,185,129,0.2);font-size:12px;font-weight:700;color:#10b981;margin-bottom:14px}
.lineup-error-banner{padding:12px 14px;border-radius:10px;background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.25);margin-bottom:14px}
.lineup-error-title{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;color:#ef4444;margin-bottom:8px}
.lineup-error-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.lineup-error-list li{font-size:12px;color:#fca5a5;display:flex;align-items:flex-start;gap:6px;line-height:1.4}
.lineup-error-list li::before{content:'•';color:#ef4444;flex-shrink:0;margin-top:1px}

/* ===== SUBMIT BUTTON ===== */
.submit-btn{font-size:11px;font-weight:800;color:#10b981;background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);border-radius:7px;padding:5px 14px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;letter-spacing:.5px}
.submit-btn:hover{background:rgba(16,185,129,0.22);border-color:#10b981}
.submit-flash{font-size:11px;font-weight:800;color:#10b981;background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.25);border-radius:6px;padding:4px 12px}

/* ===== PLAYER NAME LINK ===== */
.p-name-btn{cursor:pointer;background:none;border:none;color:#e2e8f0;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;padding:0;text-align:left;transition:color .12s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;display:inline-block;line-height:1.3}
.p-name-btn:hover{color:#10b981;text-decoration:underline}

/* ===== INJURY BADGES ===== */
.inj-badge{font-size:9px;font-weight:800;letter-spacing:.5px;padding:2px 6px;border-radius:4px;flex-shrink:0;cursor:default}
.inj-q{background:rgba(245,158,11,0.15);color:#f59e0b;border:1px solid rgba(245,158,11,0.3)}
.inj-d{background:rgba(249,115,22,0.15);color:#f97316;border:1px solid rgba(249,115,22,0.3)}
.inj-o,.inj-ir{background:rgba(239,68,68,0.13);color:#ef4444;border:1px solid rgba(239,68,68,0.3)}
.inj-pup,.inj-na{background:rgba(148,163,184,0.1);color:#94a3b8;border:1px solid rgba(148,163,184,0.2)}

/* ===== PLAYER MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#0d1526;border:1px solid rgba(255,255,255,0.08);border-radius:20px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto}
.modal-hdr{display:flex;align-items:flex-start;gap:16px;padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.06)}
.modal-close-btn{margin-left:auto;background:rgba(255,255,255,0.06);border:none;color:#94a3b8;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;transition:all .12s}
.modal-close-btn:hover{background:rgba(255,255,255,0.1);color:#e2e8f0}
.modal-body-inner{padding:0 20px 24px}
.modal-section{padding:16px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.modal-section:last-child{border-bottom:none}
.modal-section-title{font-size:10px;font-weight:800;letter-spacing:2px;color:#334155;text-transform:uppercase;margin-bottom:10px}
/* Career summary strip */
.career-strip{display:flex;gap:20px;flex-wrap:wrap}
.career-stat{text-align:center}
.career-stat-val{font-size:22px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;line-height:1}
.career-stat-lbl{font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:1px;margin-top:3px}
/* Bar chart */
.chart-outer{display:flex;flex-direction:column;gap:6px}
.chart-bars{display:flex;align-items:flex-end;gap:3px;height:72px}
.chart-bar-col{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:0}
.chart-bar-val{font-size:8px;color:#475569;font-weight:700;white-space:nowrap}
.chart-bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;transition:opacity .15s}
.chart-bar:hover{opacity:.8}
.chart-bar-yr{font-size:8px;color:#334155;font-weight:700}
.chart-bar-yr.cur{color:#10b981}
.chart-footer{display:flex;gap:16px;flex-wrap:wrap}
.chart-footer-item{font-size:11px;color:#475569}
.chart-footer-item span{font-weight:800}
/* Year-by-year table */
.career-table{width:100%;border-collapse:collapse}
.career-table th{font-size:9px;font-weight:800;letter-spacing:1px;color:#334155;text-transform:uppercase;text-align:right;padding:5px 6px;border-bottom:1px solid rgba(255,255,255,0.05)}
.career-table th:first-child,.career-table th:nth-child(2){text-align:left}
.career-table td{font-size:12px;color:#64748b;text-align:right;padding:6px 6px;border-bottom:1px solid rgba(255,255,255,0.03)}
.career-table td:first-child,.career-table td:nth-child(2){text-align:left;color:#94a3b8;font-weight:700}
.career-table tr:last-child td{border-bottom:none}
.career-table tr:hover td{background:rgba(255,255,255,0.02)}
.career-table .accent{color:#10b981;font-weight:700}
.career-table .yr-cur{color:#e2e8f0;font-weight:800}
/* Weekly table */
.modal-week-hdr{display:grid;grid-template-columns:44px 60px 1fr 72px;padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.06)}
.modal-week-hdr span{font-size:10px;font-weight:700;letter-spacing:1px;color:#334155;text-transform:uppercase}
.modal-week-hdr .mwh-pts{text-align:right}
.modal-week-row{display:grid;grid-template-columns:44px 60px 1fr 72px;padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.03);align-items:center}
.modal-week-row:last-child{border-bottom:none}
.modal-week-row:hover{background:rgba(255,255,255,0.025)}
.mwr-wk{font-size:12px;font-weight:800;color:#475569;font-family:'Bebas Neue',sans-serif;letter-spacing:1px}
.mwr-opp{font-size:11px;color:#94a3b8;font-weight:600}
.mwr-stat{font-size:11px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* Schedule */

<body>

<div id="loading"><div class="spin"></div><p>Loading team data...</p></div>

<div id="app" style="display:none">
  <nav id="leftnav"></nav>

  <div id="main">
    <div id="ln-topbar">
      <button id="ln-mobile-btn" onclick="lnToggleMobile()">&#9776;</button>
      <span class="ln-topbar-title">Sigma Beta Tau Fantasy Football</span>
    </div>

    <div id="tm-center">
      <div id="team-switcher"></div>
      <div id="team-header"></div>

      <div id="tab-bar">
        <button class="tab-btn active" data-tab="roster" onclick="switchTab('roster')">Roster</button>
        <button class="tab-btn" data-tab="schedule" onclick="switchTab('schedule')">Schedule</button>
        <button class="tab-btn" data-tab="transactions" onclick="switchTab('transactions')">Transactions</button>
        <button class="tab-btn" data-tab="news" onclick="switchTab('news')">News</button>
      </div>

      <div id="tab-content"></div>
    </div>
  </div>
</div>

<script>
/* ===== CONFIG ===== */
const FRANCHISE_LOGOS = {
  "Bear Exposures":"bearexposures-logo.jpg",
  "Big Fat Chubby":"bigfatchubby-logo.jpg",
  "Ceaser Salad Tossers \u00c3\u00b0\u00c2\u0178\u00c2\u02dc\u00c2\u203a":"ceaser-logo.jpg",
  "Ceaser Salad Tossers":"ceaser-logo.jpg",
  "Clitsburgh Feelers":"clitsburg-logo.jpg",
  "Comeback Kid":"comebackkid-logo.jpg",
  "Cooked To Perfection":"cookedtoperfection-logo.jpg",
  "Gotham Rogues":"gotham-logo.gif",
  "Smease Appeasers":"smease-logo.png",
  "Team Freesh":"freesh-logo.jpg",
  "The MUFF Divers":"muff-logo.png",
  "Trump Train":"trumptrain-logo.jpg",
  "skoot":"skoot-logo.jpg"
};

const POS_COLOR = {QB:'#ef4444',RB:'#22c55e',WR:'#3b82f6',TE:'#f59e0b',K:'#8b5cf6',DST:'#06b6d4',FB:'#ec4899'};

// Required starter slots for SBT — 1 QB, 1 RB, 2 WR, 1 TE, 2 FLEX, 1 K, 1 DST
const LEAGUE_SLOTS = {'QB':1,'RB':1,'WR':2,'TE':1,'RB-WR-TE':2,'K':1,'DST':1};
// Positions eligible for each slot type
const SLOT_ELIGIBLE = {
  'QB':['QB'],
  'RB':['RB','FB'],
  'WR':['WR'],
  'TE':['TE'],
  'RB-WR-TE':['RB','WR','TE','FB'],
  'K':['K'],
  'DST':['DST']
};

const DST_NFL = {
  'Bears':'chi','Bengals':'cin','Bills':'buf','Broncos':'den','Browns':'cle',
  'Buccaneers':'tb','Cardinals':'ari','Chargers':'lac','Chiefs':'kc','Colts':'ind',
  'Cowboys':'dal','Dolphins':'mia','Eagles':'phi','Falcons':'atl','Giants':'nyg',
  'Jaguars':'jax','Jets':'nyj','Lions':'det','Packers':'gb','Panthers':'car',
  'Patriots':'ne','Raiders':'lv','Rams':'lar','Ravens':'bal','Saints':'no',
  'Seahawks':'sea','Steelers':'pit','Texans':'hou','Titans':'ten','Vikings':'min',
  'Washington':'was','49ers':'sf','Commanders':'was','Football Team':'was'
};

// Normalize CBS team abbreviations to ESPN CDN format
const NFL_ABBREV_MAP = {
  'JAC':'jax','JAX':'jax','LA':'lar','LAR':'lar','LAC':'lac','NO':'no',
  'NE':'ne','TB':'tb','SF':'sf','GB':'gb','KC':'kc','LV':'lv','LV':'lv',
  'WAS':'was','NYG':'nyg','NYJ':'nyj','ARI':'ari','ATL':'atl','BAL':'bal',
  'BUF':'buf','CAR':'car','CHI':'chi','CIN':'cin','CLE':'cle','DAL':'dal',
  'DEN':'den','DET':'det','HOU':'hou','IND':'ind','MIN':'min','MIA':'mia',
  'PHI':'phi','PIT':'pit','SEA':'sea','TEN':'ten','CLE':'cle','OAK':'lv'
};

function nflLogo(abbrev, name, pos) {
  let a = abbrev;
  if (pos === 'DST') {
    a = DST_NFL[name] || a;
  }
  const mapped = NFL_ABBREV_MAP[a] || (a ? a.toLowerCase() : null);
  if (!mapped) return '';
  return `https://a.espncdn.com/i/teamlogos/nfl/500/${mapped}.png`;
}

function franchiseLogo(teamName) {
  const f = FRANCHISE_LOGOS[teamName];
  return f ? `team-logo/${f}` : '';
}

function slotLabel(slot) {
  if (!slot) return '';
  const s = slot.toUpperCase();
  if (s === 'RB-WR-TE' || s === 'RB/WR/TE') return 'FLEX';
  if (s === 'WR-RB-TE') return 'FLEX';
  if (s.includes('-') || s.includes('/')) return 'FLEX';
  return s;
}

/* ===== STATE ===== */
let DATA = null;
let currentIdx = 0;
let currentTab = 'roster';
let NEWS_DATA = {};
let benchOpen = true;
let lineups = {};      // mutable lineup per team index
let pendingByIdx = {}; // unsaved changes (modified but not yet submitted)
let dragSrc = null;    // {sec:'starters'|'bench', idx:Number}
let touchSel = null;   // {sec, idx} for mobile tap-select

/* ===== INIT ===== */
async function init() {
  try {
    const [r, rn] = await Promise.all([
      fetch('data/team_data_2025.json'),
      fetch('data/player_news_2025.json'),
    ]);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    DATA = await r.json();
    if (rn.ok) { const nd = await rn.json(); NEWS_DATA = nd.teams || {}; }
    // Read ?team= param
    const params = new URLSearchParams(location.search);
    const teamParam = params.get('team');
    if (teamParam) {
      const idx = DATA.teams.findIndex(t => t.team_name === teamParam);
      if (idx >= 0) currentIdx = idx;
    }
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    buildSidebar();
    initLineup(currentIdx);
    renderTeam(currentIdx);
  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<p style="color:#ef4444">Failed to load data.<br><small>${e.message}</small><br><br>
      <small style="color:#334155">Open via GitHub Pages or a local server (not file://)</small></p>`;
  }
}

function toggleSidebar() {
  document.getElementById('leftnav').classList.toggle('open');
}

/* ===== TEAM SWITCHER ===== */
function buildSidebar() {
  const el = document.getElementById('team-switcher');
  el.innerHTML = `<div class="ts-inner">${DATA.teams.map((t, i) => {
    const logo = franchiseLogo(t.team_name);
    const logoEl = logo
      ? `<img src="${logo}" class="ts-logo" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><div class="ts-logo-ph" style="display:none">${t.team_name[0]}</div>`
      : `<div class="ts-logo-ph">${t.team_name[0]}</div>`;
    return `<div class="ts-chip${i===currentIdx?' active':''}" onclick="selectTeam(${i})">
      ${logoEl}
      <span class="ts-name">${t.team_name}</span>
      <span class="ts-record">${t.wins}-${t.losses}</span>
    </div>`;
  }).join('')}</div>`;
}

function selectTeam(idx) {
  currentIdx = idx;
  currentTab = 'roster';
  benchOpen = true;
  touchSel = null;
  document.querySelectorAll('.ts-chip').forEach((el, i) => el.classList.toggle('active', i === idx));
  const t = DATA.teams[idx];
  history.replaceState(null, '', `?team=${encodeURIComponent(t.team_name)}`);
  initLineup(idx);
  renderTeam(idx);
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === 'roster'));
}

/* ===== RENDER TEAM ===== */
function renderTeam(idx) {
  const t = DATA.teams[idx];
  renderHeader(t);
  renderTab(t);
}

function renderHeader(t) {
  const logo = franchiseLogo(t.team_name);
  const logoEl = logo
    ? `<img src="${logo}" class="th-logo" onerror="this.onerror=null;this.style.display='none';this.nextSibling.style.display='flex'"><div class="th-logo-ph" style="display:none">${t.team_name[0]}</div>`
    : `<div class="th-logo-ph">${t.team_name[0]}</div>`;

  const ppg = t.matchups.filter(m=>m.type==='regular').length;
  const avgPts = ppg > 0 ? (t.points_for / ppg).toFixed(1) : '—';
  const playoffAppearance = t.matchups.some(m => m.type !== 'regular');

  document.getElementById('team-header').innerHTML = `
    <div class="th-card">
      <div class="th-logo-wrap">${logoEl}</div>
      <div class="th-info">
        <div class="th-name">${t.team_name}</div>
        <div class="th-owner">${t.owner}</div>
        <div class="th-badges">
          <span class="th-rank">#${t.rank} in League</span>
          <span class="th-record">${t.wins}-${t.losses}${t.ties?`-${t.ties}`:''}</span>
          ${playoffAppearance ? '<span style="padding:4px 12px;border-radius:20px;font-size:12px;font-weight:800;background:rgba(250,204,21,0.12);color:#facc15">Playoffs</span>' : ''}
        </div>
        <div class="th-stats">
          <div class="th-stat">
            <div class="th-stat-val">${t.points_for.toFixed(1)}</div>
            <div class="th-stat-lbl">Points For</div>
          </div>
          <div class="th-stat">
            <div class="th-stat-val">${t.points_against.toFixed(1)}</div>
            <div class="th-stat-lbl">Points Against</div>
          </div>
          <div class="th-stat">
            <div class="th-stat-val">${avgPts}</div>
            <div class="th-stat-lbl">Avg / Week</div>
          </div>
          <div class="th-stat">
            <div class="th-stat-val">${t.starters.length + t.bench.length}</div>
            <div class="th-stat-lbl">Roster Size</div>
          </div>
        </div>
      </div>
      <div class="th-actions">
        <a href="players.html" class="th-action-btn th-action-players">&#128100; Free Agents</a>
        <a href="trade.html?team=${encodeURIComponent(t.team_name)}" class="th-action-btn th-action-trade">&#8652; Trade Builder</a>
      </div>
    </div>`;
}

/* ===== TABS ===== */
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  renderTab(DATA.teams[currentIdx]);
}

function renderTab(t) {
  if (currentTab === 'roster') renderRoster();
  else if (currentTab === 'schedule') renderSchedule(t);
  else if (currentTab === 'news') renderNews(t);
  else renderTransactions(t);
}

/* ===== LINEUP STATE ===== */
function slotAccepts(slotStr, playerPos) {
  const s = (slotStr||'').toUpperCase();
  if (s === 'RB-WR-TE' || s === 'WR-RB-TE') return ['RB','WR','TE','FB'].includes(playerPos);
  if (s.includes('-') || s.includes('/')) return ['RB','WR','TE','FB'].includes(playerPos);
  return s === playerPos || (s === 'RB' && playerPos === 'FB');
}

function initLineup(idx) {
  const key = `sbt-lineup-${idx}`;
  try {
    const saved = localStorage.getItem(key);
    if (saved) { lineups[idx] = JSON.parse(saved); return; }
  } catch(e) {}
  const t = DATA.teams[idx];
  lineups[idx] = {
    starters: t.starters.map(p => ({...p})),
    bench: t.bench.map(p => ({...p}))
  };
}

function saveLineup(idx) {
  try { localStorage.setItem(`sbt-lineup-${idx}`, JSON.stringify(lineups[idx])); } catch(e) {}
}

function resetLineup() {
  const idx = currentIdx;
  localStorage.removeItem(`sbt-lineup-${idx}`);
  const t = DATA.teams[idx];
  lineups[idx] = {
    starters: t.starters.map(p => ({...p})),
    bench: t.bench.map(p => ({...p}))
  };
  delete pendingByIdx[idx];
  touchSel = null;
  renderRoster();
}

function submitLineup() {
  const errors = validateLineup(currentIdx);
  if (errors.length) {
    renderRoster(); // re-render to surface the error banner
    return;
  }
  saveLineup(currentIdx);
  delete pendingByIdx[currentIdx];
  renderRoster();
  // brief success flash
  const bar = document.querySelector('.lineup-bar');
  if (bar) {
    const flash = document.createElement('span');
    flash.className = 'submit-flash';
    flash.textContent = '✓ Lineup submitted!';
    bar.appendChild(flash);
    setTimeout(() => flash.remove(), 2500);
  }
}

function isModified(idx) {
  if (!lineups[idx]) return false;
  const t = DATA.teams[idx];
  const l = lineups[idx];
  return JSON.stringify(l.starters.map(p=>p.name)) !== JSON.stringify(t.starters.map(p=>p.name)) ||
         JSON.stringify(l.bench.map(p=>p.name)) !== JSON.stringify(t.bench.map(p=>p.name));
}

function validateLineup(idx) {
  const l = lineups[idx];
  if (!l) return [];
  const errors = [];

  // Check each starter is eligible for their assigned slot
  l.starters.forEach(p => {
    if (p.empty) {
      const label = p.slot === 'RB-WR-TE' ? 'FLEX' : p.slot;
      const eligible = (SLOT_ELIGIBLE[p.slot] || []).join(', ');
      errors.push(`${label} slot is empty — drag a bench ${eligible} here to fill it`);
      return;
    }
    const eligible = SLOT_ELIGIBLE[p.slot] || [];
    if (!eligible.includes(p.position)) {
      const slotName = p.slot === 'RB-WR-TE' ? 'FLEX' : p.slot;
      const allowed = eligible.join(', ');
      errors.push(`${p.name} (${p.position}) is in the ${slotName} slot — ${slotName} requires: ${allowed}`);
    }
  });

  // Check slot counts match league rules
  const slotCounts = {};
  l.starters.forEach(p => { slotCounts[p.slot] = (slotCounts[p.slot] || 0) + 1; });

  Object.entries(LEAGUE_SLOTS).forEach(([slot, required]) => {
    const actual = slotCounts[slot] || 0;
    if (actual !== required) {
      const label = slot === 'RB-WR-TE' ? 'FLEX' : slot;
      errors.push(`${label}: need ${required} starter${required>1?'s':''}, currently have ${actual}`);
    }
  });

  // Check no extra slots exist that aren't in league rules
  Object.entries(slotCounts).forEach(([slot, count]) => {
    if (!(slot in LEAGUE_SLOTS)) {
      errors.push(`Unknown slot "${slot}" found in starters`);
    }
  });

  return errors;
}

function mkEmpty(slot) {
  return {name:null, position:null, slot, empty:true, season_pts:0, avg_pts:0, photo_url:'', nfl_team:'', bye_week:null};
}

function canSwap(srcSec, srcIdx, tgtSec, tgtIdx) {
  const l = lineups[currentIdx];
  const src = srcSec === 'starters' ? l.starters[srcIdx] : l.bench[srcIdx];
  const tgt = tgtSec === 'starters' ? l.starters[tgtIdx] : l.bench[tgtIdx];
  if (!src || !tgt) return false;
  if (src.empty) return false;                       // can't pick up empty slot
  if (tgtSec === 'bench') return true;               // anything can go to bench
  if (tgt.empty) return slotAccepts(tgt.slot, src.position); // filling empty slot
  if (!slotAccepts(tgt.slot, src.position)) return false;    // src must fit tgt's slot
  // Starter moving into FLEX: always allowed if src is RB/WR/TE; FLEX player goes to bench if needed
  if (srcSec === 'starters' && tgt.slot === 'RB-WR-TE') return true;
  // Normal starter ↔ starter: tgt must also fit src's slot
  if (srcSec === 'starters' && !slotAccepts(src.slot, tgt.position)) return false;
  return true;
}

function performSwap(srcSec, srcIdx, tgtSec, tgtIdx) {
  if (!canSwap(srcSec, srcIdx, tgtSec, tgtIdx)) return false;
  const l = lineups[currentIdx];
  const src = {...(srcSec === 'starters' ? l.starters[srcIdx] : l.bench[srcIdx])};
  const tgt = {...(tgtSec === 'starters' ? l.starters[tgtIdx] : l.bench[tgtIdx])};

  if (tgt.empty) {
    // Fill empty starter slot
    src.slot = tgt.slot;
    l.starters[tgtIdx] = src;
    if (srcSec === 'bench') l.bench.splice(srcIdx, 1);
    else l.starters[srcIdx] = mkEmpty(src.slot); // shouldn't happen but guard
  } else if (srcSec === 'starters' && tgtSec === 'starters') {
    const srcCanTakeTgtSlot = slotAccepts(tgt.slot, src.position); // already confirmed true
    const tgtCanTakeSrcSlot = slotAccepts(src.slot, tgt.position);
    if (tgt.slot === 'RB-WR-TE' && !tgtCanTakeSrcSlot) {
      // Starter → FLEX where FLEX player can't take the vacated slot:
      // src moves to FLEX, FLEX player goes to bench, src's old slot becomes empty
      const vacatedSlot = src.slot;
      src.slot = tgt.slot;
      l.starters[tgtIdx] = src;
      l.starters[srcIdx] = mkEmpty(vacatedSlot);
      l.bench.push(tgt);
    } else {
      // Normal starter ↔ starter swap (slot labels trade hands)
      const tmpSlot = src.slot;
      src.slot = tgt.slot;
      tgt.slot = tmpSlot;
      l.starters[srcIdx] = tgt;
      l.starters[tgtIdx] = src;
    }
  } else if (srcSec === 'bench' && tgtSec === 'starters') {
    // Bench → starter: src takes tgt's slot, tgt goes to bench
    src.slot = tgt.slot;
    l.starters[tgtIdx] = src;
    l.bench.splice(srcIdx, 1);
    l.bench.push(tgt);
  } else {
    // Starter → bench: tgt takes src's slot, src goes to bench
    tgt.slot = src.slot;
    l.starters[srcIdx] = tgt;
    l.bench.splice(tgtIdx, 1);
    l.bench.push(src);
  }
  return true;
}

/* ===== ROSTER TAB ===== */
function renderRoster() {
  if (!lineups[currentIdx]) initLineup(currentIdx);
  const l = lineups[currentIdx];
  const el = document.getElementById('tab-content');
  const modified = isModified(currentIdx);
  const errors = validateLineup(currentIdx);
  const isTouchDevice = window.matchMedia('(hover: none)').matches;

  const pending = !!pendingByIdx[currentIdx];

  // Validation banner
  let validationBanner = '';
  if (errors.length && (pending || modified)) {
    const items = errors.map(e => `<li>${e}</li>`).join('');
    validationBanner = `<div class="lineup-error-banner">
      <div class="lineup-error-title">&#9888;&#65039; Illegal Lineup — ${errors.length} violation${errors.length>1?'s':''}</div>
      <ul class="lineup-error-list">${items}</ul>
    </div>`;
  } else if (modified && !pending) {
    validationBanner = `<div class="lineup-valid-banner">&#10003; Lineup submitted</div>`;
  }

  const topBar = `<div class="lineup-bar">
    ${pending ? `<span class="lineup-modified-badge">LINEUP EDITED</span>
    <button class="submit-btn" onclick="submitLineup()">Submit Lineup</button>
    <button class="reset-btn" onclick="resetLineup()">Reset</button>` :
    modified ? `<button class="reset-btn" onclick="resetLineup()">Reset to Original</button>` : ''}
    ${!isTouchDevice ? '<span class="touch-hint" style="font-size:10px;color:#334155;margin-left:auto">Drag to swap · Tap to select on touch</span>' : '<span class="touch-hint" style="margin-left:auto">Tap a player, then tap another to swap</span>'}
  </div>${validationBanner}`;

  const hdr = `<div class="roster-hdr">
    <span>SLOT</span><span></span><span>PLAYER</span>
    <span class="r-opp">OPP</span><span class="r-time">TIME</span>
    <span class="r-prev">PREV</span><span class="r-avg">AVG</span><span class="r-proj">PROJ</span>
  </div>`;

  const makeRows = (players, sec) => players.length
    ? players.map((p, i) => playerRow(p, sec, i)).join('')
    : '<div class="empty-state">No players</div>';

  const starterSection = `
    <div class="roster-section-label" style="margin-bottom:8px">Starters</div>
    <div class="roster-table">${hdr}${makeRows(l.starters, 'starters')}</div>`;

  const benchSection = l.bench.length ? `
    <div class="bench-toggle" onclick="toggleBench()">
      <div class="roster-section-label" style="margin-bottom:0;cursor:pointer">Bench</div>
      <span class="bench-caret ${benchOpen?'open':''}">&#9654;</span>
    </div>
    <div id="bench-body" style="${benchOpen?'':'display:none'}">
      <div class="roster-table">${hdr}${makeRows(l.bench, 'bench')}</div>
    </div>` : '';

  el.innerHTML = topBar + starterSection + benchSection;
  attachDragListeners();
}

function toggleBench() {
  benchOpen = !benchOpen;
  document.getElementById('bench-body').style.display = benchOpen ? '' : 'none';
  const caret = document.querySelector('.bench-caret');
  if (caret) caret.classList.toggle('open', benchOpen);
}

function playerRow(p, sec, idx) {
  // Empty slot placeholder — drop target only
  if (p.empty) {
    const label = slotLabel(p.slot);
    const eligible = (SLOT_ELIGIBLE[p.slot] || []).join(', ');
    return `<div class="p-row empty-slot" data-sec="${sec}" data-idx="${idx}">
      <div><span class="slot-badge" style="opacity:.35">${label}</span></div>
      <div class="p-photo-col">
        <div style="width:40px;height:40px;border-radius:50%;border:2px dashed rgba(16,185,129,0.25)"></div>
      </div>
      <div class="p-info"><span class="empty-label">Empty — drag a ${eligible} here</span></div>
      <div></div><div></div>
      <div class="p-score-col"><div></div><div></div></div>
      <div></div>
    </div>`;
  }

  const pc = POS_COLOR[p.position] || '#64748b';
  const photo = p.photo_url || '';
  const logo = nflLogo(p.nfl_team, p.name, p.position);
  const isTouchSel = touchSel && touchSel.sec === sec && touchSel.idx === idx;

  const photoEl = photo
    ? `<img src="${photo}" class="p-photo" onerror="this.style.display='none';this.nextSibling.style.display='flex'" alt="${p.name}">`
    : '';
  const phEl = `<div class="p-photo-ph" style="${photo?'display:none':'display:flex'};background:${pc}18;color:${pc}">${(p.name||'?')[0]}</div>`;
  const nflEl = logo ? `<img src="${logo}" class="p-nfl-badge" alt="${p.nfl_team}">` : '';

  const inj = injuryBadge(p.injury_status, p.injury_notes);

  // Previous week stats — find last week with a score
  const weekNums = Object.keys(p.weekly||{}).map(Number).sort((a,b)=>b-a);
  const lastWeek = weekNums.find(w => (p.weekly[w]?.fpts||0) > 0);
  const lastStats = lastWeek ? p.weekly[lastWeek] : null;
  const prevPts = lastStats ? lastStats.fpts : null;
  const lastOpp = lastStats ? lastStats.opp : '—';
  const statLine = lastStats?.stat_line || '';
  // Next game time & projected — placeholder until live data is available
  const gameTime = p.next_game_time || '—';
  const proj = p.projected_pts != null ? p.projected_pts.toFixed(1) : '—';
  // Mobile info line: last opp + stat line
  const matchupParts = [lastOpp !== '—' ? lastOpp : null, statLine || null].filter(Boolean);
  const matchupLine = matchupParts.join(' · ') || '—';

  return `<div class="p-row ${isTouchSel?'touch-selected':''}" draggable="true" data-sec="${sec}" data-idx="${idx}">
    <div class="p-slot"><span class="slot-badge" style="background:${pc}22;color:${pc};border:1px solid ${pc}55">${slotLabel(p.slot)}</span></div>
    <div class="p-photo-col"><div class="p-photo-wrap">${photoEl}${phEl}${nflEl}</div></div>
    <div class="p-info">
      <div class="p-name" style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
        <button class="p-name-btn" onclick="event.stopPropagation();openPlayerModal('${sec}',${idx})">${p.name}</button>
        ${inj}
      </div>
      <div class="p-sub">
        <div class="pos-dot" style="background:${pc}"></div>
        <span class="p-nfl">${p.position} · ${p.nfl_team || 'FA'}</span>
      </div>
      <div class="p-matchup">${matchupLine}</div>
    </div>
    <div class="p-opp">${lastOpp}</div>
    <div class="p-time">${gameTime}</div>
    <div class="p-score-col">
      <div class="p-prev ${prevPts===null||prevPts===0?'p-prev-zero':''}">${prevPts!=null&&prevPts>0?prevPts.toFixed(1):'—'}</div>
      <div class="p-avg">Avg ${p.avg_pts>0?p.avg_pts.toFixed(1):'—'}</div>
    </div>
    <div class="p-proj">${proj}</div>
  </div>`;
}

/* ===== DRAG & DROP ===== */
function attachDragListeners() {
  // Empty slot rows: drop targets only (no drag)
  document.querySelectorAll('.p-row.empty-slot').forEach(row => {
    const sec = row.dataset.sec;
    const idx = parseInt(row.dataset.idx);
    row.addEventListener('dragover', e => {
      e.preventDefault();
      if (!dragSrc) return;
      const valid = canSwap(dragSrc.sec, dragSrc.idx, sec, idx);
      row.classList.toggle('drop-valid', valid);
      row.classList.toggle('drop-invalid', !valid);
    });
    row.addEventListener('dragleave', () => row.classList.remove('drop-valid','drop-invalid'));
    row.addEventListener('drop', e => {
      e.preventDefault();
      if (!dragSrc) return;
      const ok = performSwap(dragSrc.sec, dragSrc.idx, sec, idx);
      dragSrc = null;
      if (ok) { pendingByIdx[currentIdx] = true; renderRoster(); }
    });
    // Touch tap on empty slot to fill from selected player
    row.addEventListener('click', () => {
      if (!touchSel || touchSel.sec === sec) return;
      const ok = performSwap(touchSel.sec, touchSel.idx, sec, idx);
      touchSel = null;
      if (ok) pendingByIdx[currentIdx] = true;
      renderRoster();
    });
  });

  document.querySelectorAll('.p-row[draggable]').forEach(row => {
    const sec = row.dataset.sec;
    const idx = parseInt(row.dataset.idx);

    // Desktop drag
    row.addEventListener('dragstart', e => {
      dragSrc = {sec, idx};
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => row.classList.add('dragging'), 0);
    });
    row.addEventListener('dragend', () => {
      dragSrc = null;
      row.classList.remove('dragging');
      document.querySelectorAll('.p-row').forEach(r => r.classList.remove('drop-valid','drop-invalid'));
    });
    row.addEventListener('dragover', e => {
      e.preventDefault();
      if (!dragSrc || (dragSrc.sec===sec && dragSrc.idx===idx)) return;
      const valid = canSwap(dragSrc.sec, dragSrc.idx, sec, idx);
      row.classList.toggle('drop-valid', valid);
      row.classList.toggle('drop-invalid', !valid);
      e.dataTransfer.dropEffect = valid ? 'move' : 'none';
    });
    row.addEventListener('dragleave', () => {
      row.classList.remove('drop-valid','drop-invalid');
    });
    row.addEventListener('drop', e => {
      e.preventDefault();
      if (!dragSrc) return;
      const ok = performSwap(dragSrc.sec, dragSrc.idx, sec, idx);
      dragSrc = null;
      if (ok) { pendingByIdx[currentIdx] = true; renderRoster(); }
      else {
        row.classList.remove('drop-valid','drop-invalid');
        row.classList.add('drop-invalid');
        setTimeout(() => row.classList.remove('drop-invalid'), 700);
      }
    });

    // Touch / click-to-swap
    row.addEventListener('click', () => {
      if (!touchSel) {
        touchSel = {sec, idx};
        renderRoster();
        return;
      }
      if (touchSel.sec === sec && touchSel.idx === idx) {
        touchSel = null;
        renderRoster();
        return;
      }
      const ok = performSwap(touchSel.sec, touchSel.idx, sec, idx);
      touchSel = null;
      if (ok) pendingByIdx[currentIdx] = true;
      renderRoster();
    });
  });
}

      <div style="font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:1px">Losses</div>

      <div style="font-size:20px;font-weight:800;font-family:'Bebas Neue';color:#facc15">${playoffGames.length}</div>
      <div style="font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:1px">Playoff Games</div>

/* ===== TRANSACTIONS TAB ===== */
function renderTransactions(t) {
  const el = document.getElementById('tab-content');
  if (!t.transactions.length) {
    el.innerHTML = '<div class="empty-state">No transactions this season</div>';
    return;
  }

  const typeLabel = {add_drop:'Add/Drop',add:'Add',drop:'Drop',waiver:'Waiver',trade:'Trade'};

  const items = t.transactions.map(tx => {
    const typeName = typeLabel[tx.type] || tx.type;
    const isTradeType = tx.type === 'trade';

    let body = '';
    if (isTradeType) {
      body = tx.sides.map(side => {
        const players = (side.receives || []).map(p =>
          `<div class="trans-player">
            <span class="trans-pos" style="background:${POS_COLOR[p.pos]||'#64748b'}22;color:${POS_COLOR[p.pos]||'#64748b'}">${p.pos}</span>
            ${p.name} <span class="p-nfl" style="margin-left:4px">${p.nfl_team||''}</span>
          </div>`
        ).join('');
        return `<div style="margin-bottom:4px">
          <div class="trans-trade-team">${side.team} receives:</div>
          <div class="trans-players">${players}</div>
        </div>`;
      }).join(`<div class="trans-trade-divider"></div>`);
    } else {
      const addPlayers = (tx.adds || []).map(p =>
        `<div class="trans-player">
          <span class="trans-pos" style="background:${POS_COLOR[p.pos]||'#64748b'}22;color:${POS_COLOR[p.pos]||'#64748b'}">${p.pos}</span>
          ${p.name} <span class="p-nfl" style="margin-left:4px">${p.nfl_team||''}</span>
          ${p.faab > 0 ? `<span class="faab-tag">$${p.faab}</span>` : ''}
        </div>`
      ).join('');
      const dropPlayers = (tx.drops || []).map(p =>
        `<div class="trans-player">
          <span class="trans-pos" style="background:${POS_COLOR[p.pos]||'#64748b'}22;color:${POS_COLOR[p.pos]||'#64748b'}">${p.pos}</span>
          ${p.name} <span class="p-nfl" style="margin-left:4px">${p.nfl_team||''}</span>
        </div>`
      ).join('');

      if (addPlayers) body += `<div class="trans-side">
        <div class="trans-action-col trans-add-col">+ ADD</div>
        <div class="trans-players">${addPlayers}</div>
      </div>`;
      if (dropPlayers) body += `<div class="trans-side">
        <div class="trans-action-col trans-drop-col">− DROP</div>
        <div class="trans-players">${dropPlayers}</div>
      </div>`;
    }

    return `<div class="trans-item">
      <div class="trans-header">
        <span class="trans-week">WK ${tx.week}</span>
        <span class="trans-type-badge type-${tx.type}">${typeName}</span>
        <span class="trans-date">${tx.timestamp || ''}</span>
      </div>
      <div class="trans-body">${body}</div>
    </div>`;
  }).join('');

  el.innerHTML = `<div style="margin-bottom:10px;font-size:12px;color:#475569">${t.transactions.length} transactions this season</div>${items}`;
}

/* ===== INJURY BADGE ===== */
function injuryBadge(status, notes) {
  if (!status) return '';
  const clsMap = {Q:'inj-q',D:'inj-d',O:'inj-o',IR:'inj-ir',PUP:'inj-pup',NA:'inj-na'};
  const cls = clsMap[status] || 'inj-pup';
  const tip = notes ? ` title="${notes}"` : '';
  return `<span class="inj-badge ${cls}"${tip}>${status}</span>`;
}

/* ===== PLAYER MODAL ===== */
function fmtHeight(inches) {
  if (!inches) return '';
  const h = parseInt(inches);
  return isNaN(h) ? '' : `${Math.floor(h/12)}'${h%12}"`;
}

function careerColumns(pos) {
  if (pos === 'QB') return [
    {k:'pass_comp', lbl:'CMP'},{k:'pass_att', lbl:'ATT'},{k:'pass_yds', lbl:'YDS', hi:true},
    {k:'pass_td', lbl:'TD', hi:true},{k:'pass_int', lbl:'INT', red:true},
    {k:'rush_yds', lbl:'RU YD'},{k:'fpts', lbl:'FPTS', hi:true, dec:1}
  ];
  if (['RB','FB'].includes(pos)) return [
    {k:'rush_att', lbl:'ATT'},{k:'rush_yds', lbl:'RU YD', hi:true},{k:'rush_td', lbl:'RU TD', hi:true},
    {k:'rec_rec', lbl:'REC'},{k:'rec_yds', lbl:'REC YD'},{k:'rec_td', lbl:'REC TD'},
    {k:'fpts', lbl:'FPTS', hi:true, dec:1}
  ];
  if (['WR','TE'].includes(pos)) return [
    {k:'rec_tar', lbl:'TGT'},{k:'rec_rec', lbl:'REC', hi:true},{k:'rec_yds', lbl:'REC YD', hi:true},
    {k:'rec_td', lbl:'REC TD', hi:true},{k:'rush_att', lbl:'ATT'},{k:'rush_yds', lbl:'RU YD'},
    {k:'fpts', lbl:'FPTS', hi:true, dec:1}
  ];
  return [{k:'fpts', lbl:'FPTS', hi:true, dec:1}];
}

function openPlayerModal(sec, idx) {
  const l = lineups[currentIdx];
  const p = sec === 'starters' ? l.starters[idx] : l.bench[idx];
  if (!p || p.empty) return;

  const pc = POS_COLOR[p.position] || '#64748b';
  const photo = p.photo_url || '';
  const logo = nflLogo(p.nfl_team, p.name, p.position);
  const ACCENT = '#10b981';

  // --- Header ---
  const photoEl = photo
    ? `<img src="${photo}" style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.1);flex-shrink:0" onerror="this.style.display='none'">`
    : `<div style="width:72px;height:72px;border-radius:50%;background:${pc}18;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:${pc};flex-shrink:0">${(p.name||'?')[0]}</div>`;
  const nflEl = logo ? `<img src="${logo}" style="width:18px;height:18px;border-radius:3px;object-fit:contain">` : '';
  const inj = p.injury_status
    ? `<span class="inj-badge ${({Q:'inj-q',D:'inj-d',O:'inj-o',IR:'inj-ir',PUP:'inj-pup',NA:'inj-na'}[p.injury_status]||'inj-pup')}"${p.injury_notes?` title="${p.injury_notes}"`:''}>${p.injury_status}</span>`
    : '';

  // Physical attributes line
  const physParts = [];
  if (p.height) physParts.push(fmtHeight(p.height));
  if (p.weight) physParts.push(`${p.weight} lbs`);
  if (p.age) physParts.push(`Age ${p.age}`);
  if (p.college) physParts.push(p.college);
  if (p.jersey_number) physParts.push(`#${p.jersey_number}`);
  const physLine = physParts.length
    ? `<div style="font-size:11px;color:#475569;margin-bottom:4px">${physParts.join(' · ')}</div>` : '';
  const draftLine = p.draft_year
    ? `<div style="font-size:10px;color:#334155;letter-spacing:.5px">Draft Class · ${p.draft_year}</div>` : '';

  // --- Career stats summary ---
  const career = p.career || [];
  const careerFpts = career.reduce((s,c) => s + (c.fpts||0), 0);
  const bestSeason = career.reduce((best,c) => (c.fpts||0) > (best.fpts||0) ? c : best, {});
  const avgSeason = career.length > 0 ? careerFpts / career.length : 0;

  const careerStrip = `<div class="career-strip">
    <div class="career-stat"><div class="career-stat-val" style="color:${ACCENT}">${careerFpts > 0 ? careerFpts.toFixed(1) : '—'}</div><div class="career-stat-lbl">Career FPTS</div></div>
    <div class="career-stat"><div class="career-stat-val" style="color:#e2e8f0">${career.length || '—'}</div><div class="career-stat-lbl">Seasons</div></div>
    <div class="career-stat"><div class="career-stat-val" style="color:#a78bfa">${bestSeason.fpts ? bestSeason.fpts.toFixed(1) : '—'}</div><div class="career-stat-lbl">Best Season</div></div>
    <div class="career-stat"><div class="career-stat-val" style="color:#e2e8f0">${avgSeason > 0 ? avgSeason.toFixed(1) : '—'}</div><div class="career-stat-lbl">Avg / Season</div></div>
  </div>`;

  // --- FPTS bar chart ---
  let chartHtml = '';
  if (career.length > 0) {
    const maxFpts = Math.max(...career.map(c => c.fpts || 0), 0.1);
    const barMaxH = 56;
    const bars = career.map(c => {
      const isCur = c.year === 2025;
      const h = Math.round(((c.fpts||0) / maxFpts) * barMaxH);
      const barColor = isCur ? ACCENT : (c.fpts === bestSeason.fpts ? '#a78bfa' : 'rgba(16,185,129,0.3)');
      const label = (c.fpts||0) > 0 ? c.fpts.toFixed(0) : '';
      return `<div class="chart-bar-col">
        <div class="chart-bar-val">${label}</div>
        <div class="chart-bar" style="height:${h}px;background:${barColor}" title="${c.year}: ${c.fpts ? c.fpts.toFixed(1) : '—'} pts"></div>
        <div class="chart-bar-yr ${isCur?'cur':''}">'${String(c.year).slice(-2)}</div>
      </div>`;
    }).join('');

    const footerItems = [
      avgSeason > 0 ? `Avg/Season: <span style="color:${ACCENT}">${avgSeason.toFixed(1)}</span>` : null,
      bestSeason.fpts ? `Best: <span style="color:#a78bfa">${bestSeason.fpts.toFixed(1)}</span> (${bestSeason.year})` : null,
    ].filter(Boolean);

    chartHtml = `<div class="modal-section">
      <div class="modal-section-title">FPTS by Season</div>
      <div class="chart-outer">
        <div class="chart-bars">${bars}</div>
        <div class="chart-footer">${footerItems.map(i=>`<span class="chart-footer-item">${i}</span>`).join('')}</div>
      </div>
    </div>`;
  }

  // --- Year-by-year table ---
  let tableHtml = '';
  if (career.length > 0) {
    const cols = careerColumns(p.position);
    const thead = `<tr><th>Year</th><th>Team</th>${cols.map(c=>`<th>${c.lbl}</th>`).join('')}</tr>`;
    const rows = [...career].reverse().map(c => {
      const isCur = c.year === 2025;
      const cells = cols.map(col => {
        const v = c[col.k];
        const display = v == null ? '—' : col.dec ? v.toFixed(col.dec) : v;
        const cls = col.hi ? 'accent' : col.red && v ? 'style="color:#ef4444"' : '';
        return cls === 'accent'
          ? `<td class="accent${isCur?' yr-cur':''}">${display}</td>`
          : `<td${col.red && v ? ' style="color:#ef4444"':''}>${display}</td>`;
      }).join('');
      return `<tr>
        <td class="${isCur?'yr-cur':''}" style="white-space:nowrap">${isCur?'▶ ':''}${c.year}</td>
        <td style="color:#64748b;font-weight:600">${c.nfl_team||'—'}</td>
        ${cells}
      </tr>`;
    }).join('');
    tableHtml = `<div class="modal-section">
      <div class="modal-section-title">Year-by-Year Stats</div>
      <div style="overflow-x:auto">
        <table class="career-table"><thead>${thead}</thead><tbody>${rows}</tbody></table>
      </div>
    </div>`;
  }

  // --- Recent News ---
  const newsMap = {};
  Object.values(NEWS_DATA).forEach(players => {
    (players||[]).forEach(np => { if(np.name) newsMap[np.name.toLowerCase()] = np.articles||[]; });
  });
  const playerArticles = newsMap[p.name.toLowerCase()] || [];
  const newsHtml = playerArticles.length
    ? playerArticles.slice(0,4).map(a=>`<div style="padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.04)">
        <div style="font-size:12px;font-weight:700;color:#e2e8f0;line-height:1.45;margin-bottom:4px">${a.headline||''}</div>
        <div style="font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">${a.source||'Rotowire'} &nbsp;·&nbsp; ${a.date||''}</div>
        ${a.story?`<div style="font-size:11px;color:#94a3b8;line-height:1.55;margin-bottom:4px">${a.story}</div>`:''}
        ${a.analysis?`<div style="font-size:11px;color:#64748b;line-height:1.5;font-style:italic;border-left:2px solid rgba(16,185,129,0.3);padding-left:8px">${a.analysis}</div>`:''}
      </div>`).join('')
    : '<div style="padding:16px;text-align:center;font-size:12px;color:#475569">No recent news available.</div>';

  // --- 2025 Weekly stats ---
  const weeks = Object.entries(p.weekly || {})
    .sort((a,b) => parseInt(a[0]) - parseInt(b[0]))
    .filter(([,w]) => w.opp !== '-');
  const weekRows = weeks.map(([wk,w]) => {
    const pts = w.fpts || 0;
    const ptsColor = pts >= 20 ? ACCENT : pts >= 10 ? '#e2e8f0' : pts > 0 ? '#64748b' : '#334155';
    return `<div class="modal-week-row">
      <div class="mwr-wk">WK${wk}</div>
      <div class="mwr-opp">${w.opp||'—'}</div>
      <div class="mwr-stat">${w.stat_line||'—'}</div>
      <div class="mwr-pts" style="color:${ptsColor}">${pts > 0 ? pts.toFixed(1) : '—'}</div>
    </div>`;
  }).join('');

  const html = `<div class="modal-overlay" id="player-modal" onclick="if(event.target.id==='player-modal')closePlayerModal()">
    <div class="modal-box">
      <div class="modal-hdr">
        ${photoEl}
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
            <div style="font-size:24px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;color:#f1f5f9;line-height:1">${p.name}</div>
            <span style="font-size:11px;font-weight:800;padding:2px 8px;border-radius:5px;background:${pc}22;color:${pc}">${p.position}</span>
            ${inj}
          </div>
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
            ${nflEl}<span style="font-size:12px;color:#64748b;font-weight:600">${p.nfl_team || 'Free Agent'}</span>
          </div>
          ${physLine}${draftLine}
        </div>
        <button class="modal-close-btn" onclick="closePlayerModal()">&#10005;</button>
      </div>
      <div class="modal-body-inner">
        <div class="modal-section">${careerStrip}</div>
        ${chartHtml}
        ${tableHtml}
        <div class="modal-section">
          <div class="modal-section-title">2025 Weekly Stats</div>
          <div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:12px;overflow:hidden">
            <div class="modal-week-hdr">
              <span>WK</span><span>OPP</span><span>STAT LINE</span><span class="mwh-pts" style="text-align:right">FPTS</span>
            </div>
            ${weekRows||'<div style="padding:20px;text-align:center;font-size:12px;color:#334155">No stats recorded yet</div>'}
          </div>
          ${p.bye_week?`<div style="margin-top:8px;font-size:11px;color:#334155;text-align:center">Bye week: Week ${p.bye_week}</div>`:''}
        </div>
        <div class="modal-section">
          <div class="modal-section-title">Recent News</div>
          <div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:12px;overflow:hidden;padding:0 12px">
            ${newsHtml}
          </div>
        </div>
      </div>
    </div>
  </div>`;

  document.body.insertAdjacentHTML('beforeend', html);
}

function closePlayerModal() {
  const m = document.getElementById('player-modal');
  if (m) m.remove();
}

init();
</script>
<script src="leftnav.js"></script>
<script>initLeftNav('team.html', {});</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
