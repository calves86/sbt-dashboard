<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Agents · SBT Fantasy Football</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="leftnav.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;background:#0b1120;color:#e2e8f0;font-family:'DM Sans','Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}
a{color:#10b981;text-decoration:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px}

/* ===== LAYOUT ===== */
#main{flex:1;min-width:0;display:flex;flex-direction:column}

/* ===== PAGE HEADER ===== */
#page-header{padding:24px 28px 0;flex-shrink:0}
.page-title{font-size:32px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;color:#f1f5f9;line-height:1;margin-bottom:4px}
.page-sub{font-size:13px;color:#475569;margin-bottom:0}

/* ===== SUMMARY STRIP ===== */
#summary-strip{display:flex;gap:12px;padding:16px 28px;flex-wrap:wrap;flex-shrink:0}
.sum-card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:12px 18px;min-width:110px;flex:1}
.sum-val{font-size:24px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;line-height:1;color:#10b981}
.sum-lbl{font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:1px;margin-top:3px}

/* ===== FILTER BAR ===== */
#filter-bar{display:flex;align-items:center;gap:8px;padding:0 28px 16px;flex-wrap:wrap;flex-shrink:0}
.pos-btn-group{display:flex;gap:4px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:4px}
.pos-btn{padding:5px 14px;border-radius:7px;border:none;cursor:pointer;font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;background:transparent;color:#475569;font-family:'DM Sans',sans-serif;transition:all .15s}
.pos-btn:hover{color:#94a3b8}
.pos-btn.active{background:#10b981;color:#0b1120}
.search-wrap{display:flex;align-items:center;gap:6px;background:#0d1526;border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:5px 12px;flex:1;max-width:260px}
.search-wrap input{background:transparent;border:none;outline:none;color:#e2e8f0;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;width:100%}
.search-wrap input::placeholder{color:#334155}
.search-icon{color:#334155;font-size:12px;flex-shrink:0}
.sort-select{background:#0d1526;border:1px solid rgba(255,255,255,0.08);color:#94a3b8;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;outline:none}
.sort-select option{background:#0d1526}
.result-count{font-size:11px;color:#334155;margin-left:auto}

/* ===== PLAYER TABLE ===== */
#table-wrap{padding:0 28px 60px;flex:1;overflow-y:auto}
.players-table{width:100%;border-collapse:collapse}
.players-table thead tr{border-bottom:2px solid rgba(255,255,255,0.06)}
.players-table th{padding:8px 10px;font-size:10px;font-weight:800;letter-spacing:1px;color:#334155;text-transform:uppercase;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;position:sticky;top:0;background:#0b1120;z-index:1}
.players-table th:hover{color:#64748b}
.players-table th.sort-asc::after{content:' ↑';color:#10b981}
.players-table th.sort-desc::after{content:' ↓';color:#10b981}
.players-table th.num{text-align:right}
.players-table th.nosort{cursor:default}
.players-table th.nosort:hover{color:#334155}
.players-table td{padding:8px 10px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle}
.players-table tbody tr:hover{background:rgba(255,255,255,0.025)}
.players-table td.num{text-align:right;font-variant-numeric:tabular-nums}

/* Player name cell */
.pl-cell{display:flex;align-items:center;gap:10px}
.pl-photo{width:34px;height:34px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(255,255,255,0.07);flex-shrink:0;background:rgba(255,255,255,0.04)}
.pl-photo-ph{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.pl-name-btn{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;color:#e2e8f0;padding:0;text-align:left;line-height:1.2;transition:color .12s}
.pl-name-btn:hover{color:#10b981;text-decoration:underline}
.pl-meta{font-size:11px;color:#475569;font-weight:600}

/* Position badge */
.pos-badge{display:inline-flex;align-items:center;justify-content:center;width:30px;height:20px;border-radius:5px;font-size:10px;font-weight:800;letter-spacing:.5px}

/* Injury badge */
.inj-badge{display:inline-block;font-size:9px;font-weight:800;letter-spacing:.5px;padding:2px 5px;border-radius:4px;margin-left:5px;vertical-align:middle}
.inj-q{background:rgba(234,179,8,0.15);color:#eab308;border:1px solid rgba(234,179,8,0.25)}
.inj-d{background:rgba(249,115,22,0.15);color:#f97316;border:1px solid rgba(249,115,22,0.3)}
.inj-o,.inj-ir{background:rgba(239,68,68,0.13);color:#ef4444;border:1px solid rgba(239,68,68,0.3)}
.inj-pup,.inj-na{background:rgba(148,163,184,0.1);color:#94a3b8;border:1px solid rgba(148,163,184,0.2)}

/* Stat cells */
.pts-val{font-size:14px;font-weight:800;color:#e2e8f0}
.avg-val{font-size:13px;font-weight:700;color:#94a3b8}
.wks-val{font-size:13px;color:#475569}
.nfl-team{font-size:12px;font-weight:700;color:#64748b}
.rank-num{font-size:11px;color:#334155;font-weight:700;width:24px;text-align:right}

/* Action buttons */
.action-btns{display:flex;gap:6px;justify-content:flex-end}
.btn-add{background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.25);color:#10b981;padding:5px 12px;border-radius:7px;font-size:11px;font-weight:800;letter-spacing:.5px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;white-space:nowrap}
.btn-add:hover{background:rgba(16,185,129,0.22);border-color:rgba(16,185,129,0.45)}
.btn-trade{background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.22);color:#a78bfa;padding:5px 12px;border-radius:7px;font-size:11px;font-weight:800;letter-spacing:.5px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;white-space:nowrap}
.btn-trade:hover{background:rgba(167,139,250,0.2);border-color:rgba(167,139,250,0.4)}

/* ===== PLAYER MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#0d1526;border:1px solid rgba(255,255,255,0.08);border-radius:20px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto}
.modal-hdr{display:flex;align-items:flex-start;gap:16px;padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.06)}
.modal-close-btn{margin-left:auto;background:rgba(255,255,255,0.06);border:none;color:#94a3b8;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;transition:all .12s}
.modal-close-btn:hover{background:rgba(255,255,255,0.1);color:#e2e8f0}
.modal-body-inner{padding:0 20px 24px}
.modal-section{padding:16px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.modal-section:last-child{border-bottom:none}
.modal-section-title{font-size:10px;font-weight:800;letter-spacing:2px;color:#334155;text-transform:uppercase;margin-bottom:10px}
.career-strip{display:flex;gap:20px;flex-wrap:wrap}
.career-stat{text-align:center}
.career-stat-val{font-size:22px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;line-height:1}
.career-stat-lbl{font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.chart-outer{display:flex;flex-direction:column;gap:6px}
.chart-bars{display:flex;align-items:flex-end;gap:3px;height:72px}
.chart-bar-col{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:0}
.chart-bar-val{font-size:8px;color:#475569;font-weight:700;white-space:nowrap}
.chart-bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;transition:opacity .15s}
.chart-bar:hover{opacity:.8}
.chart-bar-yr{font-size:8px;color:#334155;font-weight:700}
.chart-bar-yr.cur{color:#10b981}
.chart-footer{display:flex;gap:16px;flex-wrap:wrap}
.chart-footer-item{font-size:11px;color:#475569}
.chart-footer-item span{font-weight:800}
.career-table{width:100%;border-collapse:collapse}
.career-table th{font-size:9px;font-weight:800;letter-spacing:1px;color:#334155;text-transform:uppercase;text-align:right;padding:5px 6px;border-bottom:1px solid rgba(255,255,255,0.05)}
.career-table th:first-child,.career-table th:nth-child(2){text-align:left}
.career-table td{font-size:12px;color:#64748b;text-align:right;padding:6px 6px;border-bottom:1px solid rgba(255,255,255,0.03)}
.career-table td:first-child,.career-table td:nth-child(2){text-align:left;color:#94a3b8;font-weight:700}
.career-table tr:last-child td{border-bottom:none}
.career-table tr:hover td{background:rgba(255,255,255,0.02)}
.career-table .accent{color:#10b981;font-weight:700}
.career-table .yr-cur{color:#e2e8f0;font-weight:800}
.modal-week-hdr{display:grid;grid-template-columns:44px 60px 1fr 72px;padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.06)}
.modal-week-hdr span{font-size:10px;font-weight:700;letter-spacing:1px;color:#334155;text-transform:uppercase}
.modal-week-hdr .mwh-pts{text-align:right}
.modal-week-row{display:grid;grid-template-columns:44px 60px 1fr 72px;padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.03);align-items:center}
.modal-week-row:last-child{border-bottom:none}
.modal-week-row:hover{background:rgba(255,255,255,0.025)}
.mwr-wk{font-size:12px;font-weight:800;color:#475569;font-family:'Bebas Neue',sans-serif;letter-spacing:1px}
.mwr-opp{font-size:11px;color:#94a3b8;font-weight:600}
.mwr-stat{font-size:11px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mwr-pts{text-align:right;font-size:14px;font-weight:800;font-family:'Bebas Neue',sans-serif}

/* Action modal */
.action-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:600;display:flex;align-items:center;justify-content:center;padding:16px}
.action-modal-box{background:#0d1526;border:1px solid rgba(255,255,255,0.1);border-radius:18px;width:100%;max-width:400px;padding:28px 24px}
.action-modal-title{font-size:22px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;color:#f1f5f9;margin-bottom:8px}
.action-modal-sub{font-size:13px;color:#475569;margin-bottom:20px;line-height:1.5}
.action-modal-player{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:12px 14px;margin-bottom:20px}
.action-modal-photo{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.07);flex-shrink:0}
.action-modal-photo-ph{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0}
.action-modal-pname{font-size:16px;font-weight:800;color:#e2e8f0}
.action-modal-pmeta{font-size:11px;color:#475569;font-weight:600;margin-top:2px}
.action-modal-note{font-size:12px;color:#475569;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:12px 14px;margin-bottom:20px;line-height:1.6}
.action-modal-btns{display:flex;gap:10px;justify-content:flex-end}
.action-modal-cancel{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:#64748b;padding:9px 18px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s}
.action-modal-cancel:hover{background:rgba(255,255,255,0.08);color:#94a3b8}
.action-modal-confirm-add{background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:#10b981;padding:9px 18px;border-radius:9px;font-size:13px;font-weight:800;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s}
.action-modal-confirm-add:hover{background:rgba(16,185,129,0.25)}
.action-modal-confirm-trade{background:rgba(167,139,250,0.15);border:1px solid rgba(167,139,250,0.3);color:#a78bfa;padding:9px 18px;border-radius:9px;font-size:13px;font-weight:800;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s}
.action-modal-confirm-trade:hover{background:rgba(167,139,250,0.25)}

/* ===== LOADING ===== */
#loading{position:fixed;inset:0;background:#0b1120;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}
.spin{width:36px;height:36px;border:3px solid rgba(16,185,129,0.15);border-top-color:#10b981;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:14px;color:#475569}
.empty-state{text-align:center;padding:40px 20px;color:#334155;font-size:14px}

/* ===== MOBILE ===== */
@media(max-width:700px){
  #page-header{padding:14px 16px 0}
  #summary-strip{padding:12px 16px}
  #filter-bar{padding:0 16px 12px}
  #table-wrap{padding:0 16px 60px}
  .pl-meta{display:none}
  .search-wrap{max-width:none}
  .action-btns{gap:4px}
  .btn-add,.btn-trade{padding:5px 8px;font-size:10px}
}
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><p>Loading players...</p></div>

<div id="app" style="display:none">
  <nav id="leftnav"></nav>

  <div id="main">
    <div id="ln-topbar">
      <button id="ln-mobile-btn" onclick="lnToggleMobile()">&#9776;</button>
      <span class="ln-topbar-title">Sigma Beta Tau Fantasy Football</span>
    </div>

    <div id="page-header">
      <div class="page-title">Free Agents</div>
      <div class="page-sub">2025 Season · Players available on the waiver wire</div>
    </div>

    <div id="summary-strip"></div>
    <div id="filter-bar"></div>
    <div id="table-wrap"></div>
  </div>
</div>

<script>
/* ===== CONFIG ===== */
const ACCENT = '#10b981';
const POS_COLOR = {QB:'#ef4444',RB:'#22c55e',WR:'#3b82f6',TE:'#f59e0b',K:'#8b5cf6',DST:'#06b6d4',FB:'#ec4899'};
const POSITIONS = ['ALL','QB','RB','WR','TE','K','DST'];

/* ===== STATE ===== */
let DATA = [];
let filterPos = 'ALL';
let searchQuery = '';
let sortCol = 'season_pts';
let sortDir = 'desc';

/* ===== INIT ===== */
async function init() {
  try {
    const r = await fetch('data/free_agents_2025.json');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const json = await r.json();
    DATA = json.players || [];
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    buildSidebar();
    buildSummary();
    buildFilters();
    renderTable();
  } catch(e) {
    document.getElementById('loading').innerHTML = `<p style="color:#ef4444">Failed to load: ${e.message}</p>`;
  }
}

/* ===== SIDEBAR ===== */
function buildSidebar() {
  const posList = document.getElementById('sb-pos-list');
  const positions = ['QB','RB','WR','TE','K','DST'];
  const byPos = {};
  positions.forEach(p => byPos[p] = DATA.filter(pl => pl.position === p));

  posList.innerHTML = positions.map(pos => {
    const players = byPos[pos] || [];
    const top = players[0];
    const color = POS_COLOR[pos] || '#64748b';
    return `<div class="sb-pos-card" onclick="setPos('${pos}')">
      <div class="sb-pos-dot" style="background:${color}"></div>
      <div class="sb-pos-info">
        <div style="display:flex;align-items:baseline;gap:6px">
          <span class="sb-pos-name">${pos}</span>
          <span class="sb-pos-count">${players.length} available</span>
        </div>
        ${top ? `<div class="sb-pos-top">${top.name}</div>` : '<div class="sb-pos-top" style="color:#334155">—</div>'}
      </div>
    </div>`;
  }).join('');
}

function setPos(pos) {
  filterPos = pos;
  document.querySelectorAll('.pos-btn').forEach(b => b.classList.toggle('active', b.dataset.pos === pos));
  document.querySelectorAll('.sb-pos-card').forEach(c => {
    c.classList.toggle('active', c.querySelector('.sb-pos-name')?.textContent === pos);
  });
  renderTable();
}

/* ===== SUMMARY STRIP ===== */
function buildSummary() {
  const strip = document.getElementById('summary-strip');
  const topFa = DATA[0];
  const rbCount = DATA.filter(p => p.position === 'RB').length;
  const wrCount = DATA.filter(p => p.position === 'WR').length;
  const qbCount = DATA.filter(p => p.position === 'QB').length;

  strip.innerHTML = `
    <div class="sum-card">
      <div class="sum-val">${DATA.length}</div>
      <div class="sum-lbl">Free Agents</div>
    </div>
    <div class="sum-card">
      <div class="sum-val">${qbCount}</div>
      <div class="sum-lbl">QBs Available</div>
    </div>
    <div class="sum-card">
      <div class="sum-val">${rbCount}</div>
      <div class="sum-lbl">RBs Available</div>
    </div>
    <div class="sum-card">
      <div class="sum-val">${wrCount}</div>
      <div class="sum-lbl">WRs Available</div>
    </div>
    <div class="sum-card" style="flex:2">
      <div class="sum-val" style="font-size:16px">${topFa ? topFa.name : '—'}</div>
      <div class="sum-lbl">Top Available · ${topFa ? topFa.season_pts + ' pts' : ''}</div>
    </div>`;
}

/* ===== FILTERS ===== */
function buildFilters() {
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = `
    <div class="pos-btn-group" id="pos-btns">
      ${POSITIONS.map(p => `<button class="pos-btn${p==='ALL'?' active':''}" data-pos="${p}">${p}</button>`).join('')}
    </div>
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input type="text" placeholder="Search players..." id="search-input">
    </div>
    <select class="sort-select" id="sort-select">
      <option value="season_pts_desc">Season PTS ↓</option>
      <option value="season_pts_asc">Season PTS ↑</option>
      <option value="avg_pts_desc">Avg/Wk ↓</option>
      <option value="avg_pts_asc">Avg/Wk ↑</option>
      <option value="name_asc">Name A→Z</option>
      <option value="name_desc">Name Z→A</option>
    </select>
    <span class="result-count" id="result-count"></span>`;

  bar.querySelectorAll('.pos-btn').forEach(btn => {
    btn.addEventListener('click', () => setPos(btn.dataset.pos));
  });
  document.getElementById('search-input').addEventListener('input', e => {
    searchQuery = e.target.value.toLowerCase();
    renderTable();
  });
  document.getElementById('sort-select').addEventListener('change', e => {
    const parts = e.target.value.split('_');
    sortDir = parts.pop();
    sortCol = parts.join('_');
    renderTable();
  });
}

/* ===== HELPERS ===== */
function injuryBadge(status, notes) {
  if (!status) return '';
  const s = status.toUpperCase();
  const cls = {Q:'inj-q',D:'inj-d',O:'inj-o',IR:'inj-ir',PUP:'inj-pup',NA:'inj-na'}[s];
  if (!cls) return '';
  return `<span class="inj-badge ${cls}"${notes?` title="${notes}"`:''}>${s}</span>`;
}

function posBg(pos) {
  const c = POS_COLOR[pos] || '#64748b';
  return `background:${c}20;color:${c};border:1px solid ${c}40`;
}

function photoEl(p, size=34) {
  const color = POS_COLOR[p.position] || '#64748b';
  if (p.photo_url) {
    return `<img class="pl-photo" style="width:${size}px;height:${size}px" src="${p.photo_url}" alt="${p.name}" loading="lazy"
            onerror="this.style.display='none';this.nextSibling.style.display='flex'">
            <div class="pl-photo-ph" style="width:${size}px;height:${size}px;background:${color}22;color:${color};display:none">${p.position}</div>`;
  }
  return `<div class="pl-photo-ph" style="width:${size}px;height:${size}px;background:${color}22;color:${color}">${p.position}</div>`;
}

function fmtHeight(inches) {
  if (!inches) return '';
  const h = parseInt(inches);
  return isNaN(h) ? '' : `${Math.floor(h/12)}'${h%12}"`;
}

function careerColumns(pos) {
  if (pos === 'QB') return [
    {k:'pass_comp',lbl:'CMP'},{k:'pass_att',lbl:'ATT'},{k:'pass_yds',lbl:'YDS',hi:true},
    {k:'pass_td',lbl:'TD',hi:true},{k:'pass_int',lbl:'INT',red:true},
    {k:'rush_yds',lbl:'RU YD'},{k:'fpts',lbl:'FPTS',hi:true,dec:1}
  ];
  if (['RB','FB'].includes(pos)) return [
    {k:'rush_att',lbl:'ATT'},{k:'rush_yds',lbl:'RU YD',hi:true},{k:'rush_td',lbl:'RU TD',hi:true},
    {k:'rec_rec',lbl:'REC'},{k:'rec_yds',lbl:'REC YD'},{k:'rec_td',lbl:'REC TD'},
    {k:'fpts',lbl:'FPTS',hi:true,dec:1}
  ];
  if (['WR','TE'].includes(pos)) return [
    {k:'rec_tar',lbl:'TGT'},{k:'rec_rec',lbl:'REC',hi:true},{k:'rec_yds',lbl:'REC YD',hi:true},
    {k:'rec_td',lbl:'REC TD',hi:true},{k:'rush_att',lbl:'ATT'},{k:'rush_yds',lbl:'RU YD'},
    {k:'fpts',lbl:'FPTS',hi:true,dec:1}
  ];
  return [{k:'fpts',lbl:'FPTS',hi:true,dec:1}];
}

/* ===== RENDER TABLE ===== */
function getFiltered() {
  return DATA.filter(p => {
    if (filterPos !== 'ALL' && p.position !== filterPos) return false;
    if (searchQuery && !p.name.toLowerCase().includes(searchQuery)) return false;
    return true;
  });
}

function getSorted(players) {
  return [...players].sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (sortCol === 'name') {
      av = av || ''; bv = bv || '';
      return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    }
    av = av || 0; bv = bv || 0;
    return sortDir === 'asc' ? av - bv : bv - av;
  });
}

function renderTable() {
  const wrap = document.getElementById('table-wrap');
  const filtered = getSorted(getFiltered());

  document.getElementById('result-count').textContent = `${filtered.length} player${filtered.length !== 1 ? 's' : ''}`;

  if (!filtered.length) {
    wrap.innerHTML = '<div class="empty-state">No players match your filters.</div>';
    return;
  }

  const colDefs = [
    {key:'rank',   label:'#',          cls:'num nosort', sortable:false},
    {key:'name',   label:'Player',     cls:'',           sortable:true},
    {key:'position',label:'Pos',       cls:'',           sortable:true},
    {key:'nfl_team',label:'NFL Team',  cls:'',           sortable:true},
    {key:'season_pts',label:'Season PTS',cls:'num',      sortable:true},
    {key:'avg_pts',label:'Avg/Wk',     cls:'num',        sortable:true},
    {key:'weeks_played',label:'Weeks', cls:'num',        sortable:true},
    {key:'actions',label:'',           cls:'nosort',     sortable:false},
  ];

  const thead = colDefs.map(c => {
    if (!c.sortable) return `<th class="${c.cls}">${c.label}</th>`;
    const isActive = c.key === sortCol;
    const dir = isActive ? sortDir : '';
    return `<th class="${c.cls}${isActive?' sort-'+dir:''}" onclick="sortBy('${c.key}')">${c.label}</th>`;
  }).join('');

  // Store the filtered+sorted list so modal can look up by row index
  window._displayedPlayers = filtered;

  const rows = filtered.map((p, i) => {
    const posStyle = posBg(p.position);
    return `<tr>
      <td class="num"><span class="rank-num">${i+1}</span></td>
      <td>
        <div class="pl-cell">
          ${photoEl(p)}
          <div>
            <button class="pl-name-btn" onclick="openPlayerModal(${i})">${p.name}${injuryBadge(p.injury_status, p.injury_notes)}</button>
            <div class="pl-meta">${p.nfl_team || '—'}</div>
          </div>
        </div>
      </td>
      <td><span class="pos-badge" style="${posStyle}">${p.position}</span></td>
      <td><span class="nfl-team">${p.nfl_team || '—'}</span></td>
      <td class="num"><span class="pts-val">${p.season_pts > 0 ? p.season_pts.toFixed(1) : '—'}</span></td>
      <td class="num"><span class="avg-val">${p.avg_pts > 0 ? p.avg_pts.toFixed(1) : '—'}</span></td>
      <td class="num"><span class="wks-val">${p.weeks_played || 0}</span></td>
      <td>
        <div class="action-btns">
          <button class="btn-add" onclick="openAddModal(${i})">+ Add</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `<table class="players-table">
    <thead><tr>${thead}</tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function sortBy(col) {
  if (sortCol === col) {
    sortDir = sortDir === 'desc' ? 'asc' : 'desc';
  } else {
    sortCol = col;
    sortDir = col === 'name' ? 'asc' : 'desc';
  }
  const sel = document.getElementById('sort-select');
  if (sel) {
    const opt = `${sortCol}_${sortDir}`;
    if ([...sel.options].some(o => o.value === opt)) sel.value = opt;
  }
  renderTable();
}

/* ===== PLAYER STAT MODAL ===== */
function openPlayerModal(idx) {
  const p = window._displayedPlayers[idx];
  if (!p) return;

  const pc = POS_COLOR[p.position] || '#64748b';
  const photo = p.photo_url || '';

  const photoHtml = photo
    ? `<img src="${photo}" style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.1);flex-shrink:0" onerror="this.style.display='none'">`
    : `<div style="width:72px;height:72px;border-radius:50%;background:${pc}18;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:${pc};flex-shrink:0">${(p.name||'?')[0]}</div>`;

  const inj = injuryBadge(p.injury_status, p.injury_notes);

  const physParts = [];
  if (p.height) physParts.push(fmtHeight(p.height));
  if (p.weight) physParts.push(`${p.weight} lbs`);
  if (p.age) physParts.push(`Age ${p.age}`);
  if (p.college) physParts.push(p.college);
  if (p.jersey_number) physParts.push(`#${p.jersey_number}`);
  const physLine = physParts.length ? `<div style="font-size:11px;color:#475569;margin-bottom:4px">${physParts.join(' · ')}</div>` : '';
  const draftLine = p.draft_year ? `<div style="font-size:10px;color:#334155;letter-spacing:.5px">Draft Class · ${p.draft_year}</div>` : '';

  const career = p.career || [];
  const careerFpts = career.reduce((s,c) => s + (c.fpts||0), 0);
  const bestSeason = career.reduce((best,c) => (c.fpts||0) > (best.fpts||0) ? c : best, {});
  const avgSeason = career.length > 0 ? careerFpts / career.length : 0;

  const careerStrip = `<div class="career-strip">
    <div class="career-stat"><div class="career-stat-val" style="color:${ACCENT}">${careerFpts > 0 ? careerFpts.toFixed(1) : '—'}</div><div class="career-stat-lbl">Career FPTS</div></div>
    <div class="career-stat"><div class="career-stat-val" style="color:#e2e8f0">${career.length || '—'}</div><div class="career-stat-lbl">Seasons</div></div>
    <div class="career-stat"><div class="career-stat-val" style="color:#a78bfa">${bestSeason.fpts ? bestSeason.fpts.toFixed(1) : '—'}</div><div class="career-stat-lbl">Best Season</div></div>
    <div class="career-stat"><div class="career-stat-val" style="color:#e2e8f0">${avgSeason > 0 ? avgSeason.toFixed(1) : '—'}</div><div class="career-stat-lbl">Avg / Season</div></div>
  </div>`;

  let chartHtml = '';
  if (career.length > 0) {
    const maxFpts = Math.max(...career.map(c => c.fpts || 0), 0.1);
    const barMaxH = 56;
    const bars = career.map(c => {
      const isCur = c.year === 2025;
      const h = Math.round(((c.fpts||0) / maxFpts) * barMaxH);
      const barColor = isCur ? ACCENT : (c.fpts === bestSeason.fpts ? '#a78bfa' : 'rgba(16,185,129,0.3)');
      return `<div class="chart-bar-col">
        <div class="chart-bar-val">${(c.fpts||0) > 0 ? c.fpts.toFixed(0) : ''}</div>
        <div class="chart-bar" style="height:${h}px;background:${barColor}" title="${c.year}: ${c.fpts ? c.fpts.toFixed(1) : '—'} pts"></div>
        <div class="chart-bar-yr ${isCur?'cur':''}">'${String(c.year).slice(-2)}</div>
      </div>`;
    }).join('');
    const footerItems = [
      avgSeason > 0 ? `Avg/Season: <span style="color:${ACCENT}">${avgSeason.toFixed(1)}</span>` : null,
      bestSeason.fpts ? `Best: <span style="color:#a78bfa">${bestSeason.fpts.toFixed(1)}</span> (${bestSeason.year})` : null,
    ].filter(Boolean);
    chartHtml = `<div class="modal-section">
      <div class="modal-section-title">FPTS by Season</div>
      <div class="chart-outer">
        <div class="chart-bars">${bars}</div>
        <div class="chart-footer">${footerItems.map(i=>`<span class="chart-footer-item">${i}</span>`).join('')}</div>
      </div>
    </div>`;
  }

  let tableHtml = '';
  if (career.length > 0) {
    const cols = careerColumns(p.position);
    const thead = `<tr><th>Year</th><th>Team</th>${cols.map(c=>`<th>${c.lbl}</th>`).join('')}</tr>`;
    const rows = [...career].reverse().map(c => {
      const isCur = c.year === 2025;
      const cells = cols.map(col => {
        const v = c[col.k];
        const display = v == null ? '—' : col.dec ? v.toFixed(col.dec) : v;
        return col.hi
          ? `<td class="accent${isCur?' yr-cur':''}">${display}</td>`
          : `<td${col.red && v ? ' style="color:#ef4444"':''}>${display}</td>`;
      }).join('');
      return `<tr>
        <td class="${isCur?'yr-cur':''}" style="white-space:nowrap">${isCur?'▶ ':''}${c.year}</td>
        <td style="color:#64748b;font-weight:600">${c.nfl_team||'—'}</td>
        ${cells}
      </tr>`;
    }).join('');
    tableHtml = `<div class="modal-section">
      <div class="modal-section-title">Year-by-Year Stats</div>
      <div style="overflow-x:auto"><table class="career-table"><thead>${thead}</thead><tbody>${rows}</tbody></table></div>
    </div>`;
  }

  const weeks = Object.entries(p.weekly || {})
    .sort((a,b) => parseInt(a[0]) - parseInt(b[0]))
    .filter(([,w]) => w.opp !== '-');
  const weekRows = weeks.map(([wk,w]) => {
    const pts = w.fpts || 0;
    const ptsColor = pts >= 20 ? ACCENT : pts >= 10 ? '#e2e8f0' : pts > 0 ? '#64748b' : '#334155';
    return `<div class="modal-week-row">
      <div class="mwr-wk">WK${wk}</div>
      <div class="mwr-opp">${w.opp||'—'}</div>
      <div class="mwr-stat">${w.stat_line||'—'}</div>
      <div class="mwr-pts" style="color:${ptsColor}">${pts > 0 ? pts.toFixed(1) : '—'}</div>
    </div>`;
  }).join('');

  const html = `<div class="modal-overlay" id="player-modal" onclick="if(event.target.id==='player-modal')closePlayerModal()">
    <div class="modal-box">
      <div class="modal-hdr">
        ${photoHtml}
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
            <div style="font-size:24px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;color:#f1f5f9;line-height:1">${p.name}</div>
            <span style="font-size:11px;font-weight:800;padding:2px 8px;border-radius:5px;background:${pc}22;color:${pc}">${p.position}</span>
            ${inj}
          </div>
          <div style="font-size:12px;color:#64748b;font-weight:600;margin-bottom:8px">${p.nfl_team || 'Free Agent'}</div>
          ${physLine}${draftLine}
        </div>
        <button class="modal-close-btn" onclick="closePlayerModal()">&#10005;</button>
      </div>
      <div class="modal-body-inner">
        <div class="modal-section">${careerStrip}</div>
        ${chartHtml}
        ${tableHtml}
        <div class="modal-section">
          <div class="modal-section-title">2025 Weekly Stats</div>
          <div style="background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:12px;overflow:hidden">
            <div class="modal-week-hdr">
              <span>WK</span><span>OPP</span><span>STAT LINE</span><span class="mwh-pts" style="text-align:right">FPTS</span>
            </div>
            ${weekRows || '<div style="padding:16px;color:#334155;font-size:13px">No stats recorded yet.</div>'}
          </div>
        </div>
      </div>
    </div>
  </div>`;

  document.body.insertAdjacentHTML('beforeend', html);
  document.body.style.overflow = 'hidden';
}

function closePlayerModal() {
  const m = document.getElementById('player-modal');
  if (m) m.remove();
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closePlayerModal(); closeActionModal(); }
});

/* ===== ADD / TRADE MODALS ===== */
function actionPlayerCard(p) {
  const color = POS_COLOR[p.position] || '#64748b';
  const photo = p.photo_url
    ? `<img class="action-modal-photo" src="${p.photo_url}" onerror="this.style.display='none';this.nextSibling.style.display='flex'">
       <div class="action-modal-photo-ph" style="background:${color}22;color:${color};display:none">${p.position}</div>`
    : `<div class="action-modal-photo-ph" style="background:${color}22;color:${color}">${p.position}</div>`;
  return `<div class="action-modal-player">
    ${photo}
    <div>
      <div class="action-modal-pname">${p.name}</div>
      <div class="action-modal-pmeta">${p.position} · ${p.nfl_team || 'FA'} · ${p.season_pts > 0 ? p.season_pts.toFixed(1)+' pts' : 'No stats'}</div>
    </div>
  </div>`;
}

function openAddModal(idx) {
  const p = window._displayedPlayers[idx];
  if (!p) return;
  const html = `<div class="action-modal-overlay" id="action-modal" onclick="if(event.target.id==='action-modal')closeActionModal()">
    <div class="action-modal-box">
      <div class="action-modal-title">Add Player</div>
      <div class="action-modal-sub">You are adding this player to your roster.</div>
      ${actionPlayerCard(p)}
      <div class="action-modal-note">
        &#9432;&nbsp; Waiver wire claims are processed by the commissioner.
        Screenshot this page or message your commissioner to submit your request.
        <br><br>
        <strong style="color:#94a3b8">Player:</strong> ${p.name} &nbsp;·&nbsp; <strong style="color:#94a3b8">Action:</strong> Add to Roster
      </div>
      <div class="action-modal-btns">
        <button class="action-modal-cancel" onclick="closeActionModal()">Cancel</button>
        <button class="action-modal-confirm-add" onclick="closeActionModal()">Got It</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  document.body.style.overflow = 'hidden';
}

function openTradeModal(idx) {
  const p = window._displayedPlayers[idx];
  if (!p) return;
  const html = `<div class="action-modal-overlay" id="action-modal" onclick="if(event.target.id==='action-modal')closeActionModal()">
    <div class="action-modal-box">
      <div class="action-modal-title" style="color:#a78bfa">Propose Trade</div>
      <div class="action-modal-sub">You want to trade for this player.</div>
      ${actionPlayerCard(p)}
      <div class="action-modal-note">
        &#9432;&nbsp; Trades are processed by the commissioner.
        Contact the player's current team or your commissioner to propose a trade offer.
        <br><br>
        <strong style="color:#94a3b8">Player:</strong> ${p.name} &nbsp;·&nbsp; <strong style="color:#94a3b8">Action:</strong> Trade Request
      </div>
      <div class="action-modal-btns">
        <button class="action-modal-cancel" onclick="closeActionModal()">Cancel</button>
        <button class="action-modal-confirm-trade" onclick="closeActionModal()">Got It</button>
      </div>
    </div>
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  document.body.style.overflow = 'hidden';
}

function closeActionModal() {
  const m = document.getElementById('action-modal');
  if (m) m.remove();
  document.body.style.overflow = '';
}

init();
</script>
