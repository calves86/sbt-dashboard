<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2025 Playoffs — SBT Fantasy Football</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="leftnav.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;background:#080e1c;color:#e2e8f0;font-family:'DM Sans','Segoe UI',sans-serif;min-height:100vh}
#shell{display:flex;flex:1;min-height:100vh}
#main{flex:1;min-width:0;overflow-y:auto;background:#080e1c}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#0b1120}::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px}
a{color:#10b981;text-decoration:none}

#ln-topbar{display:none;background:#080f1e;border-bottom:1px solid rgba(255,255,255,0.06);padding:10px 16px;align-items:center;gap:12px}
#ln-mobile-btn{background:none;border:none;color:#94a3b8;font-size:20px;cursor:pointer;padding:2px 6px}
.ln-topbar-title{font-size:13px;font-weight:700;color:#94a3b8}
@media(max-width:700px){#ln-topbar{display:flex}}

.spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(16,185,129,0.2);border-top-color:#10b981;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

.season-banner{background:linear-gradient(135deg,#0d1b2e 0%,#0f2339 50%,#0d1b2e 100%);border-bottom:1px solid rgba(16,185,129,0.15);padding:20px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.banner-left{display:flex;align-items:center;gap:16px}
.banner-logo{height:52px;width:52px;object-fit:contain;border-radius:10px}
.banner-title{font-size:32px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:3px;background:linear-gradient(135deg,#10b981,#6ee7b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.banner-sub{font-size:11px;color:#64748b;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-top:3px}
.badge-pill{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.5px;border:1px solid}
.badge-season{background:rgba(16,185,129,0.1);border-color:rgba(16,185,129,0.3);color:#10b981}

.po-page{padding:20px 24px;max-width:1500px;margin:0 auto}
.po-loading{padding:80px;text-align:center;color:#94a3b8;font-size:14px}

/* Panel */
.panel{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:14px;overflow:hidden;margin-bottom:20px}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid rgba(255,255,255,0.06);background:rgba(0,0,0,0.15)}
.ph-title{font-size:12px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;color:#94a3b8;text-transform:uppercase}
.ph-badge{font-size:10px;font-weight:700;color:#10b981;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);padding:2px 9px;border-radius:10px}

/* Bracket (same as dashboard) */
.bk-wrap{display:flex;gap:0;overflow-x:auto}
.bk-sub{min-width:0;padding:14px 16px;border-right:1px solid rgba(255,255,255,0.05)}
.bk-sub:last-child{border-right:none}
.bk-sub-title{font-size:10px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:2px}
.bk-sub-sub{font-size:9px;font-weight:600;color:#475569;margin-bottom:12px}
.bk-rounds{display:flex;gap:8px;align-items:stretch}
.bk-round{flex:1;min-width:120px;display:flex;flex-direction:column}
.bk-rlabel{font-size:9px;font-weight:800;color:#334155;text-transform:uppercase;letter-spacing:.8px;text-align:center;padding:0 0 8px}
.bk-games{display:flex;flex-direction:column;justify-content:space-evenly;flex:1;gap:8px}
.bk-game{background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.06);border-radius:8px;overflow:hidden}
.bk-game-lbl{font-size:8px;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:.5px;text-align:center;padding:4px;background:rgba(0,0,0,0.2);border-bottom:1px solid rgba(255,255,255,0.04)}
.bk-team{display:flex;align-items:center;gap:5px;padding:5px 8px;border-bottom:1px solid rgba(255,255,255,0.04);min-width:0}
.bk-team:last-child{border-bottom:none}
.bk-team.bk-w{background:rgba(16,185,129,0.06)}
.bk-logo{width:18px;height:18px;border-radius:4px;object-fit:contain;flex-shrink:0;background:#0f172a}
.bk-name{font-size:10px;font-weight:700;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.bk-team.bk-l .bk-name,.bk-team.bk-l .bk-score{color:#475569}
.bk-score{font-size:10px;font-weight:800;font-family:'Bebas Neue',sans-serif;color:#64748b;flex-shrink:0;margin-left:2px}
.bk-team.bk-w .bk-score{color:#10b981}
.bk-pick{font-size:8px;font-weight:800;padding:1px 5px;border-radius:3px;flex-shrink:0;white-space:nowrap;margin-left:3px}

/* Matchup results */
.round-section{margin-bottom:20px}
.round-hdr{padding:14px 16px 10px;display:flex;align-items:center;gap:10px}
.round-badge{font-size:9px;font-weight:800;padding:3px 10px;border-radius:12px;text-transform:uppercase;letter-spacing:1px}
.round-badge.winners{background:rgba(250,204,21,0.1);color:#facc15;border:1px solid rgba(250,204,21,0.2)}
.round-badge.losers{background:rgba(96,165,250,0.1);color:#60a5fa;border:1px solid rgba(96,165,250,0.15)}
.round-badge.consolation{background:rgba(239,68,68,0.08);color:#f87171;border:1px solid rgba(239,68,68,0.12)}
.round-title{font-size:15px;font-weight:800;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;color:#e2e8f0}
.round-sub{font-size:10px;color:#64748b;font-weight:600}
.matchups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;padding:0 16px 16px}
.mu-card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;overflow:hidden;transition:border-color .15s}
.mu-card:hover{border-color:rgba(16,185,129,0.25)}
.mu-card.po{border-color:rgba(250,204,21,0.12);background:rgba(250,204,21,0.02)}
.mu-card-label{font-size:8px;font-weight:800;color:#475569;text-transform:uppercase;letter-spacing:.8px;padding:5px 10px;background:rgba(0,0,0,0.2);border-bottom:1px solid rgba(255,255,255,0.04)}
.mu-team-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.04)}
.mu-team-row:last-child{border-bottom:none}
.mu-team-row.winner{background:rgba(16,185,129,0.04)}
.mu-team-row.loser{opacity:0.6}
.mu-tlogo{width:24px;height:24px;border-radius:6px;object-fit:contain;flex-shrink:0;background:#0f172a}
.mu-tname{font-size:11px;font-weight:700;color:#e2e8f0;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mu-tscore{font-size:16px;font-weight:800;font-family:'Bebas Neue',sans-serif;color:#e2e8f0;flex-shrink:0}
.mu-team-row.winner .mu-tscore{color:#10b981}
.mu-team-row.loser .mu-tscore{color:#475569}
.mu-win-badge{font-size:8px;font-weight:800;padding:1px 5px;border-radius:3px;background:rgba(16,185,129,0.12);color:#10b981;border:1px solid rgba(16,185,129,0.2);flex-shrink:0}

@media(max-width:700px){.matchups-grid{grid-template-columns:1fr}}
@media(max-width:600px){.bk-wrap{flex-direction:column}}
</style>
</head>
<body>
<div id="shell">
<nav id="leftnav"></nav>
<div id="main">
<div id="ln-topbar">
  <button id="ln-mobile-btn" onclick="lnToggleMobile()">&#9776;</button>
  <span class="ln-topbar-title">Sigma Beta Tau Fantasy Football</span>
</div>

<div class="season-banner">
  <div class="banner-left">
    <img src="sbt-logo.png" class="banner-logo" alt="SBT" onerror="this.style.display='none'">
    <div>
      <div class="banner-title">2025 Playoffs</div>
      <div class="banner-sub">Sigma Beta Tau Fantasy Football &nbsp;·&nbsp; Bracket &amp; Results</div>
    </div>
  </div>
  <div>
    <span class="badge-pill badge-season">&#127942; Season Complete</span>
  </div>
</div>

<div class="po-page">
  <div id="po-loading" class="po-loading"><span class="spinner"></span>Loading playoff data...</div>
  <div id="po-content" style="display:none"></div>
</div>
</div>
</div>

<script>
const SEASON = 2025;
const ACCENT = '#10b981';
const NFL_LOGO = t => `https://a.espncdn.com/i/teamlogos/nfl/500/${(t||'').toLowerCase()}.png`;
const FRANCHISE_LOGOS = {
  "Bear Exposures":"bearexposures-logo.jpg","Big Fat Chubby":"bigfatchubby-logo.jpg",
  "Ceaser Salad Tossers":"ceaser-logo.jpg","Clitsburgh Feelers":"clitsburg-logo.jpg",
  "Comeback Kid":"comebackkid-logo.jpg","Cooked To Perfection":"cookedtoperfection-logo.jpg",
  "Gotham Rogues":"gotham-logo.gif","Smease Appeasers":"smease-logo.png",
  "Team Freesh":"freesh-logo.jpg","The MUFF Divers":"muff-logo.png",
  "Trump Train":"trumptrain-logo.jpg","skoot":"skoot-logo.jpg"
};
function tLogo(name){
  if(!name) return '';
  if(FRANCHISE_LOGOS[name]) return `team-logo/${FRANCHISE_LOGOS[name]}`;
  const lower=name.toLowerCase();
  for(const[k,v] of Object.entries(FRANCHISE_LOGOS)){
    if(lower.includes(k.toLowerCase().split(' ')[0].replace(/[^a-z0-9]/g,''))) return `team-logo/${v}`;
  }
  return '';
}
function logoImg(name, cls='bk-logo'){
  const src=tLogo(name);
  return src
    ?`<img src="${src}" class="${cls}" alt="" onerror="this.style.display='none'">`
    :`<div class="${cls}" style="display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:${ACCENT}">${(name||'?')[0]}</div>`;
}

let D={};

async function loadAll(){
  try{
    const [matchupsRaw, playoffGamesRaw] = await Promise.all([
      fetch('data/matchups.json').then(r=>r.json()),
      fetch('data/playoff_games.json').then(r=>r.json()).catch(()=>[])
    ]);
    D.matchups = matchupsRaw.filter(m=>m.season===SEASON);
    D.playoffGames = Array.isArray(playoffGamesRaw)?playoffGamesRaw:[];
    document.getElementById('po-loading').style.display='none';
    document.getElementById('po-content').style.display='';
    document.getElementById('po-content').innerHTML = render();
  } catch(e){
    document.getElementById('po-loading').innerHTML=`<span style="color:#ef4444">Error: ${e.message}</span>`;
  }
}

function render(){
  return renderBracket() + renderRounds();
}

/* ── Bracket ── */
function pStyle(n){
  if(n===12) return 'background:rgba(250,204,21,.15);color:#facc15;border:1px solid rgba(250,204,21,.25)';
  if(n===11) return 'background:rgba(148,163,184,.12);color:#94a3b8;border:1px solid rgba(148,163,184,.2)';
  if(n===10) return 'background:rgba(180,130,10,.15);color:#d97706;border:1px solid rgba(180,130,10,.25)';
  if(n>=9)   return 'background:rgba(100,116,139,.1);color:#64748b;border:1px solid rgba(100,116,139,.15)';
  if(n>=5)   return 'background:rgba(96,165,250,.1);color:#60a5fa;border:1px solid rgba(96,165,250,.15)';
  if(n===1)  return 'background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.15)';
  return 'background:rgba(100,116,139,.08);color:#64748b;border:1px solid rgba(100,116,139,.12)';
}
function gc(g,wp,lp){
  const t1=g.team1||g.team1_name,t2=g.team2||g.team2_name;
  const s1=g.score1??g.s1,s2=g.score2??g.s2;
  const w=g.winner; const isT1W=w===t1;
  function row(nm,sc,isW,pk){
    return`<div class="bk-team ${isW?'bk-w':'bk-l'}">${logoImg(nm)}<span class="bk-name" title="${nm}">${nm}</span><span class="bk-score">${sc!=null?sc.toFixed(1):''}</span>${pk!=null?`<span class="bk-pick" style="${pStyle(pk)}">P${pk}</span>`:''}</div>`;
  }
  return`<div class="bk-game">${row(t1,s1,isT1W,isT1W?wp:lp)}${row(t2,s2,!isT1W,!isT1W?wp:lp)}</div>`;
}

function renderBracket(){
  const pg=D.playoffGames.filter(g=>g.season===SEASON);
  if(!pg.length) return '';
  const wG=pg.filter(g=>g.bracket==='playoff');
  const cG=pg.filter(g=>g.bracket==='consolation');
  if(!wG.length) return '';
  const maxWR=Math.max(...wG.map(g=>g.round));
  const r1L=new Set(wG.filter(g=>g.round===1).map(g=>g.winner===g.team1?g.team2:g.team1));
  const allWks=[...new Set(D.matchups.map(m=>m.week))].sort((a,b)=>a-b);
  const lbRounds=[];
  let lbR1W=new Set();
  for(const wk of allWks){
    if(lbRounds.length>=maxWR-1) break;
    const gms=D.matchups.filter(m=>m.week===wk&&r1L.has(m.team1_name)&&r1L.has(m.team2_name));
    if(!gms.length) continue;
    const mapped=gms.map(g=>({team1:g.team1_name,s1:g.team1_score,team2:g.team2_name,s2:g.team2_score,winner:g.team1_score>g.team2_score?g.team1_name:g.team2_name}));
    if(!lbRounds.length) mapped.forEach(g=>lbR1W.add(g.winner));
    lbRounds.push(mapped);
  }
  if(lbRounds.length>1) lbRounds[lbRounds.length-1].sort((a,b)=>(lbR1W.has(b.team1)&&lbR1W.has(b.team2)?1:0)-(lbR1W.has(a.team1)&&lbR1W.has(a.team2)?1:0));
  const maxCR=cG.length?Math.max(...cG.map(g=>g.round)):0;

  function wRnd(r){
    const gms=[...wG.filter(g=>g.round===r)].sort((a,b)=>(b.round_name.toLowerCase().includes('champ')?1:0)-(a.round_name.toLowerCase().includes('champ')?1:0));
    const last=r===maxWR;
    const lbl=r===1?'Quarterfinals':r===maxWR?'Finals':'Semifinals';
    return`<div class="bk-round"><div class="bk-rlabel">${lbl}</div><div class="bk-games">${gms.map(g=>{
      let wp=null,lp=null;
      if(last){const n=g.round_name.toLowerCase();if(n.includes('champ')){wp=12;lp=11;}else{wp=10;lp=9;}}
      return(last?`<div class="bk-game-lbl">${g.round_name}</div>`:'')+gc(g,wp,lp);
    }).join('')}</div></div>`;
  }
  function lbRnd(idx){
    const gms=lbRounds[idx]; if(!gms) return '';
    const last=idx===lbRounds.length-1;
    return`<div class="bk-round"><div class="bk-rlabel">${idx===0?'Round 1':'Finals'}</div><div class="bk-games">${gms.map(g=>{
      let wp=null,lp=null;
      if(last){const f=lbR1W.has(g.team1)&&lbR1W.has(g.team2);wp=f?5:7;lp=f?6:8;}
      return(last?`<div class="bk-game-lbl">${wp===5?'Picks 5/6':'Picks 7/8'}</div>`:'')+gc(g,wp,lp);
    }).join('')}</div></div>`;
  }
  function cRnd(r){
    const gms=cG.filter(g=>g.round===r); const last=r===maxCR;
    return`<div class="bk-round"><div class="bk-rlabel">${r===1?'Round 1':'Finals'}</div><div class="bk-games">${gms.map(g=>{
      let wp=null,lp=null;
      if(last){const n=g.round_name.toLowerCase();if(n.includes('booty')){wp=1;lp=2;}else{wp=3;lp=4;}}
      return(last?`<div class="bk-game-lbl">${g.round_name}</div>`:'')+gc(g,wp,lp);
    }).join('')}</div></div>`;
  }
  const wHtml=Array.from({length:maxWR},(_,i)=>wRnd(i+1)).join('');
  const lbHtml=lbRounds.map((_,i)=>lbRnd(i)).join('');
  const cHtml=Array.from({length:maxCR},(_,i)=>cRnd(i+1)).join('');
  return`<div class="panel">
    <div class="panel-hdr">
      <span class="ph-title">2025 Playoff Bracket</span>
      <span class="ph-badge">Draft Pick Order</span>
    </div>
    <div class="bk-wrap">
      <div class="bk-sub" style="flex:${maxWR}">
        <div class="bk-sub-title">Winners Bracket</div>
        <div class="bk-sub-sub">Picks 9–12 &nbsp;·&nbsp; Champion picks last</div>
        <div class="bk-rounds">${wHtml}</div>
      </div>
      ${lbRounds.length?`<div class="bk-sub" style="flex:${lbRounds.length}">
        <div class="bk-sub-title">Picks 5–8</div>
        <div class="bk-sub-sub">First-Round Playoff Losers</div>
        <div class="bk-rounds">${lbHtml}</div>
      </div>`:''}
      ${cHtml?`<div class="bk-sub" style="flex:${maxCR}">
        <div class="bk-sub-title">Booty Bowl</div>
        <div class="bk-sub-sub">Picks 1–4 &nbsp;·&nbsp; Champ picks first</div>
        <div class="bk-rounds">${cHtml}</div>
      </div>`:''}
    </div>
  </div>`;
}

/* ── Matchup Results ── */
function muCard(g, label, bracketType){
  const t1=g.team1||g.team1_name, t2=g.team2||g.team2_name;
  const s1=g.score1??g.s1, s2=g.score2??g.s2;
  const w=g.winner||(s1>s2?t1:t2);
  const isT1W=w===t1;
  function teamRow(nm,sc,isW){
    const src=tLogo(nm);
    const logo=src?`<img src="${src}" class="mu-tlogo" alt="" onerror="this.style.display='none'">`:`<div class="mu-tlogo" style="display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:${ACCENT}">${(nm||'?')[0]}</div>`;
    return`<div class="mu-team-row ${isW?'winner':'loser'}">${logo}<span class="mu-tname">${nm}</span>${isW?`<span class="mu-win-badge">W</span>`:''}<span class="mu-tscore">${sc!=null?sc.toFixed(1):'—'}</span></div>`;
  }
  return`<div class="mu-card po">
    <div class="mu-card-label">${label}</div>
    ${teamRow(t1,s1,isT1W)}${teamRow(t2,s2,!isT1W)}
  </div>`;
}

function renderRounds(){
  const pg=D.playoffGames.filter(g=>g.season===SEASON);
  if(!pg.length) return '';
  const wG=pg.filter(g=>g.bracket==='playoff');
  const cG=pg.filter(g=>g.bracket==='consolation');
  const maxWR=wG.length?Math.max(...wG.map(g=>g.round)):0;
  const r1L=new Set(wG.filter(g=>g.round===1).map(g=>g.winner===g.team1?g.team2:g.team1));

  // Losers bracket rounds from matchups
  const allWks=[...new Set(D.matchups.map(m=>m.week))].sort((a,b)=>a-b);
  const lbRounds=[];
  let lbR1W=new Set();
  for(const wk of allWks){
    if(lbRounds.length>=maxWR-1) break;
    const gms=D.matchups.filter(m=>m.week===wk&&r1L.has(m.team1_name)&&r1L.has(m.team2_name));
    if(!gms.length) continue;
    const mapped=gms.map(g=>({team1:g.team1_name,s1:g.team1_score,team2:g.team2_name,s2:g.team2_score,winner:g.team1_score>g.team2_score?g.team1_name:g.team2_name}));
    if(!lbRounds.length) mapped.forEach(g=>lbR1W.add(g.winner));
    lbRounds.push(mapped);
  }
  if(lbRounds.length>1) lbRounds[lbRounds.length-1].sort((a,b)=>(lbR1W.has(b.team1)&&lbR1W.has(b.team2)?1:0)-(lbR1W.has(a.team1)&&lbR1W.has(a.team2)?1:0));
  const maxCR=cG.length?Math.max(...cG.map(g=>g.round)):0;

  const roundLabels=['Quarterfinals','Semifinals','Finals'];

  let html='';
  for(let r=1;r<=maxWR;r++){
    const wGames=wG.filter(g=>g.round===r).sort((a,b)=>(b.round_name.toLowerCase().includes('champ')?1:0)-(a.round_name.toLowerCase().includes('champ')?1:0));
    const lbGames=r>1&&lbRounds[r-2]?lbRounds[r-2]:[];
    const cGames=r<=maxCR?cG.filter(g=>g.round===r):[];
    const roundName=roundLabels[r-1]||`Round ${r}`;
    const isLast=r===maxWR;

    let cards='';
    // Winners bracket games
    wGames.forEach(g=>{
      const lbl=g.round_name||(r===1?'Quarterfinal':r===maxWR?'Championship':'Semifinal');
      cards+=muCard(g,lbl,'winners');
    });
    // Losers bracket games (start from round 2)
    lbGames.forEach((g,i)=>{
      const isLbLast=r-1===lbRounds.length-1;
      let lbl='Picks 5–8';
      if(isLbLast){const f=lbR1W.has(g.team1)&&lbR1W.has(g.team2);lbl=f?'Picks 5/6':'Picks 7/8';}
      else lbl='Losers Bracket';
      cards+=muCard(g,lbl,'losers');
    });
    // Consolation games
    cGames.forEach(g=>{cards+=muCard(g,g.round_name||'Consolation','consolation');});

    if(!cards) continue;

    html+=`<div class="panel round-section">
      <div class="round-hdr">
        <span class="round-badge winners">${roundName}</span>
        <div>
          <div class="round-title">${roundName}</div>
          <div class="round-sub">${r===1?'All 12 teams':r===maxWR?'Championship weekend':''}</div>
        </div>
      </div>
      <div class="matchups-grid">${cards}</div>
    </div>`;
  }
  return html;
}

loadAll();
</script>
