<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign In &middot; Commish</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#0b1120;color:#e2e8f0;font-family:'DM Sans',sans-serif;min-height:100vh}
  body{display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:36px 32px;width:100%;max-width:420px}
  .brand{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:2px;text-align:center;margin-bottom:4px;color:#e2e8f0}
  .sub{text-align:center;font-size:11px;color:#64748b;letter-spacing:1px;text-transform:uppercase;margin-bottom:28px}
  h1{font-size:16px;font-weight:700;color:#cbd5e1;margin:0 0 10px;text-align:center}
  p.help{font-size:11px;color:#64748b;line-height:1.6;margin:0 0 24px;text-align:center}
  label{display:block;font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px}
  input[type="email"]{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:12px 14px;color:#e2e8f0;font-size:14px;outline:none;font-family:'DM Sans',sans-serif;transition:border-color .15s}
  input[type="email"]:focus{border-color:#10b981}
  button{width:100%;margin-top:16px;background:#10b981;color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.5px;transition:opacity .15s}
  button:hover{opacity:.88}
  button:disabled{opacity:.5;cursor:not-allowed}
  .msg{margin-top:16px;padding:12px 14px;border-radius:10px;font-size:12px;line-height:1.5;display:none}
  .msg.show{display:block}
  .msg.success{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.25);color:#6ee7b7}
  .msg.error{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#fca5a5}
  .foot{margin-top:28px;padding-top:18px;border-top:1px solid rgba(255,255,255,0.05);text-align:center;font-size:10px;color:#334155}
</style>
</head>
<body>
<div class="card">
  <div class="brand">COMMISH</div>
  <div class="sub" id="league-sub">Fantasy Football</div>

  <h1>Sign in to the commissioner tool</h1>
  <p class="help">Enter your email and we'll send you a secure one-click login link. No password required.</p>

  <form id="login-form" autocomplete="on">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com">
    <button type="submit" id="submit-btn">Send magic link</button>
  </form>

  <div class="msg" id="msg"></div>

  <div class="foot">
    Commissioners only. If you're a team owner looking for your league site,
    go to <a id="home-link" href="./dashboard.html" style="color:#64748b">the dashboard</a>.
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>
  // If COMM_AUTH (from data/auth-*.js) is loaded, show the league name.
  // We load it async-optional so this page works even if the per-league
  // script is missing.
  (function loadLeagueName(){
    const s = document.createElement('script');
    s.src = './data/auth-sbt.js';  // replaced at deploy per league
    s.onload = function(){
      if (window.COMM_AUTH && window.COMM_AUTH.leagueName) {
        document.getElementById('league-sub').textContent = window.COMM_AUTH.leagueName;
        document.title = 'Sign In · ' + window.COMM_AUTH.leagueName;
      }
    };
    s.onerror = function(){ /* silent — fallback text is already set */ };
    document.head.appendChild(s);
  })();

  const form = document.getElementById('login-form');
  const msg = document.getElementById('msg');
  const btn = document.getElementById('submit-btn');

  function showMsg(text, kind) {
    msg.className = 'msg show ' + (kind || '');
    msg.textContent = text;
  }

  // If already signed in, bounce to commissioner.html (or ?returnTo=)
  (async function checkExistingSession(){
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        const params = new URLSearchParams(window.location.search);
        const returnTo = params.get('returnTo') || 'commissioner.html';
        window.location.replace('./' + returnTo);
      }
    } catch (e) { /* ignore */ }
  })();

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!email) return;

    btn.disabled = true;
    btn.textContent = 'Sending...';
    showMsg('', '');

    // Build redirect URL: back to the same directory, landing on the
    // returnTo page (default: commissioner.html).
    const params = new URLSearchParams(window.location.search);
    const returnTo = params.get('returnTo') || 'commissioner.html';
    const base = window.location.href.replace(/[^/]*$/, '');
    const redirectTo = base + returnTo;

    const { error } = await sb.auth.signInWithOtp({
      email: email,
      options: { emailRedirectTo: redirectTo }
    });

    btn.disabled = false;
    btn.textContent = 'Send magic link';

    if (error) {
      showMsg('Could not send link: ' + error.message, 'error');
      return;
    }
    showMsg('Check your email. Click the link within 60 minutes to sign in.', 'success');
    form.style.display = 'none';
  });
</script>
</body>
</html>
